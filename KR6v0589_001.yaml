也不一致要知道這是佛的方便示現為了適應衆生的根機才有這種種差別並非佛的真實功德不同切勿妄生分別上來讚歎佛寶功德丘井空聚落朽故寂無人彼岸林泉樂禮法離欲尊這是讚歎法寶的功德上二句含著兩個譬喻要分別解説丘井是枯井有人在曠野散步一不小心落在枯井裡虧得一手攀住井裡的枯藤這才不致落到井底井底有四條毒蛇張口吐舌的望著他一隻老鼠正在咬那枯藤説不定就會斷下來在這危急的情況下仰頭見藤上有蜂蜜他伸舌去舐那蜂蜜便什麼都忘了甚至蜂群的飛來螫人他也在甜蜜的享受中忽略了這是説衆生在生死曠野裡由於業力感到了五蘊身枯藤是命根老鼠的咬那枯藤如無常的侵逼一息一息的過去命根快就會斷了無論是丘井枯藤鼠咬都譬説無常的苦迫所以説朽故四蛇是四大四大不調和就會生病而致人於死如毒蛇的傷人蜂蜜如五欲的快樂人在生死無常的苦迫中享受些少的欲樂便忘記了不顧蜂群的來螫如對於五欲而來的苦果也不管生死大苦都不能使衆生警覺真是愚癡極了空聚落是無人的村莊所以説寂無人有人想逃避國王的罪罰路過一無人的村莊他想住下來過一宿再走忽聽見天人説走呀這是盜賊來往地帶如遇見盜賊怕會喪身失命呢這是説有人想脫離魔王的控制修學佛法有的在六根門頭失敗了空村如六根六根見聞覺知一般以為是內有自我而實是沒有自我無人可得此無我的六根觸對六塵境界引起有漏的六識如盜賊六識遊歷六根不應該貪的起貪不應該瞋的起瞋種種煩惱劫奪功德法財有的因此而墮落惡道所以想出離三界的魔王統治修學佛法就不應該為六根所欺誑應該向前進行到達安全的境界上面説起的逃難的離開盜賊往來的空村前進到國境邊沿為大河擋住了去路而追捕的人卻快要追來那時他望見大河彼岸不屬國王的境界有園林流泉真是又安全又快樂他就不顧一切遊過大河這才離了死亡的恐怖真的可以休息了這譬喻説學佛法的不受六根的誑惑渡過生死大河這才越出魔王境界到涅槃彼岸可以享受不生不滅的寂滅樂到達了大休息的境地上面從諸行無常諸法無我説到涅槃寂滅這是三法印是佛法的三大真理而涅槃又是通過無常無我而實現的為一切聖者的究竟歸宿這就是我們要歸依禮敬的法寶如世俗修習禪定的也能出離一部分的煩惱欲但三乘聖者由慧而得涅槃才是究竟離欲在一切離欲中涅槃為最尊最勝所以説離欲尊正法妙難思善淨常安樂依古仙人道能入於涅槃涅槃為一切聖者一切學佛者的歸依處由於證入的程度不同有有餘涅槃無餘涅槃大般涅槃等差別實則涅槃就是正法正法是自證的境地微妙得難以思議所以説如人飲水冷暖自知今依經論的方便開示略加説明一正法是善這是勝義的絶對完善二是淨由於正法不是煩惱等雜染所能污的也不是煩惱雜染等所能緣起的所以名為清淨三是常正法是超越時間性的不生不滅本來如此四是安樂這是沒有生老病死憂悲苦惱的是離繫的絶對樂總之正法不可思議功德也不可思議從智慧的境界説名為正法如從智慧證入正法而得真自由來説名為涅槃所以正法就是涅槃只要依著往古過去諸佛大仙人的正道就能證入於涅槃的解脫説到古仙人道阿含經與楞伽經等都曾説到因為正法是本來如此的能入涅槃的修行正道也是本來如此的過去一切佛無不經歷此正道而得入涅槃這不是釋迦佛所造作的是古佛的常道所以名為古道上來讚歎法寶功德依法以攝僧和樂淨為本事和或理和禮僧衆中尊釋迦佛成佛説法就有好多人隨佛出家佛就把他們組織為僧伽或簡譯為僧僧是群衆是有組織有紀律的集團所以古人義譯為和合衆佛憑什麼來集結僧衆呢不是憑自己的才能所以佛説我不攝受衆佛是依法以攝受他們使之成為僧伽的法是人生的正道究竟的涅槃佛是以此法來感召大衆讓大衆為這人生大事而集合攏來法也是律法制度就是契合於人生正道的規制佛是本著這自他共處的完善法則制為規章法度來組織大衆的依法而組合的僧衆以和樂淨三者為根本的特色一和合這又有事和或理和二種事和又分為六名為六和見和同解大衆有一致的見解這是思想的統一戒和同遵大衆奉行同一的戒律這是規制的共同利和同均大衆過著同樣的生活受用這是經濟的均衡思想規制經濟的和同為佛教僧團的實質能這樣那表現於身心的活動彼此間一定是身和共住語和無諍意和同悅了此六和是出家僧衆所應該一致奉行的還有理和是佛弟子證到的真理法或涅槃內容是彼此完全一致所以説心心相印與諸佛一鼻孔出氣這是聖者所特有的而且是通於在家出家的單是事和是世俗僧理和是勝義僧不過釋迦佛在這五濁惡世依法攝僧成為住持佛教的中心力量卻是著重事和二安樂僧衆在這事和或理和的集團中大衆都能身心安樂精進修行三清淨在和樂的集團中互相勉勵互相警策如有了罪惡也能迅速的懺悔清淨僧團才能做到健全佛制的僧伽原來是這樣完善的集團從自修到身心清淨來説僧伽是使我們得安樂得清淨的殊勝因緣是陶賢鑄聖的大冶洪爐從利他的弘揚佛法來説僧伽是推動佛法的集體力量僧伽為三寶之一佛弟子應歸依敬禮僧伽宗教的大衆集團本不限於佛教如印度的六師沙門團都是有僧衆的但在各教的僧衆中奉行佛法的僧伽最為尊勝所以稱讚為衆中尊敬僧莫呵僧亦莫衡量僧隨佛修行者住持正法城僧寶為歸依的對象所以特為在家的信衆説此一頌在家的信衆們應該尊敬僧伽或是內心的誠敬或是語言文字的讚歎或是身體的禮拜稟承僧衆的意思為比丘僧服務隨僧衆所需要的隨分隨力以衣服飲食醫藥床敷日用品來供養對於僧衆千切不可生輕慢心近代中國信佛信法敬佛敬法的還有而信敬僧伽的實在太少或是但敬歸依師或是敬一二人三寶的歸敬不具足難怪佛法的希有功德不易生長起來僧衆這麼多當然龍蛇混雜有聖僧也有凡僧有持戒清淨的也有毀戒不淨的在家弟子們如見有不清淨的不合法的應承認這是出家人的僧事自有僧伽依照一定的規律去處理切莫隨便呵毀僧伽全體或者呵毀一人或少數人真誠護法的信衆可以向僧伽提出意見處理的責權還是屬於僧伽依佛制沒有逐出僧團以前犯了罪國法也不能隨便處罰遇有諍執國王也只能依律來表決不能以自己的意見來決定否則只有造作毀辱僧伽的重罪或反而增加僧衆的諍執還有凡是出了家的就成為僧伽的一員你不要多生分別年高或者年少男衆或者女衆博學或者淺學精進或者放逸持戒或者犯戒老鄉或者外籍凡是僧伽的成員都應尊重恭敬一律布施因為僧伽猶如大海有大龍也有魚蝦有藻苔也有珍寶大海是不加簡別一樣含容的然世間儘多是這種人或重持戒的或重禪定的或重念誦的或重威儀的或重義學的就此妄生分別説長説短某優某劣擁護誰反對誰信衆們切莫心不平等衡量僧伽僧衆的功德不是一般所能認識的例如一般的偏重老年輕視少年不知生年上座只是皮皴髮白只是六根衰朽想貪著受用而不能與佛法功德有什麼關係呢信衆對於僧衆應該信仰凡是出家而屬於僧伽的雖程度千差萬別但同樣是隨佛修行者只要有出家衆就會有寺院有聖像有經書就有三寶可尊敬佛法始終是由於出家僧而延續下來的所以分別起來不免有高下優劣凡聖的差別而總合起來卻成為一有力的僧團住持如來的正法堅固得金城湯池一般不為天魔外道所破壞大家不妨反省自己對於佛法的最初起信或最初引起興趣不一定都是賢聖吧所以説破戒比丘而服袈裟的還是人天福田真誠的在家信衆應特別尊敬僧伽團體愛護僧伽從旁助成僧團的和樂清淨切不可呵毀嫌責或以權力來從中鬥爭佛世僧伽發生了諍執連佛的話也不肯聽分成二部佛對信衆們説這都是僧都應該供養所以如破金杖為二分二俱是金實可為在家信衆的座右銘上來讚歎僧寶功德三寶真實德無漏性清淨化世真亦俗佛法得長存三寶是我們的歸敬對象在一切宗教的教主教理教徒中三寶是最圓滿最清淨的然佛像與僧衆不一定能符合這一意義吧這應該知道如現在佛是或玉或石或金或銅或木雕或土塑或紙畫的佛像法是三藏經典或古今大德的法義僧是出家衆這稱為住持三寶是佛滅後佛教流傳於世間時的三寶恭敬供養依此而歸向於真實的三寶又如釋迦佛出世時釋迦佛是佛寶佛所開示的教説四諦緣起涅槃等是法寶隨佛出家的凡衆聖衆是僧寶這是化相三寶是佛出人間教化時以此三相為三寶恭敬供養依此而歸向十方一切佛正法一切賢聖僧化相與住持三寶都是佛教在世間的具體形相以此為歸依對象從而更深入一層論究到真實的歸依處是三寶的真實功德這在古來又有好多分別現在略説二類一佛的無漏功德是佛寶依聲聞來説是五分法身依大乘説是無上四智菩提所攝的一切無漏功德正法或涅槃是法寶有學無學的無漏功德是僧寶依聲聞乘説即是四雙八輩的無漏功德依大乘説是菩薩攝得聲聞辟支佛的無漏功德二大乘教所説究竟圓滿所顯的最清淨法界攝得體相業用是佛寶少分顯現清淨法界的是僧寶遍十法界而不增不減無二無別的法界或名真如實相等是法寶平常所説的一體三寶理體三寶常住三寶都不過此一意義的不同解説所以三寶的真實功德真實的三寶是無漏的是不與煩惱雜染相應的也不為煩惱雜染緣起的又是性清淨的無漏的有為功德稱為清淨無為功德不但是離垢清淨在雜染中也還是本性清淨的無漏而性淨的三寶才是真正的歸依處不過從佛法化導世間利益衆生來説不但應該歸敬於真實的三寶功德亦應歸敬於世俗事相的住持三寶佛世為化相三寶因為但歸依世俗自不免流於形式的崇拜而專重勝義真實也不免過於高深不是一般所能明了所以必須歸依現實事相的住持三寶依此進向真實的三寶佛教的重視像教其理由就在此住持三寶為事象的從此表顯真實三寶的功德這才能淺深由之事理無礙佛法才能得長存世間為一切衆生作救護作福田自誓盡形壽歸依佛法僧至心修供養時念諸勝利佛法僧三寶是沒有污染的具足功德的所以是真正的歸依處受歸依的先要懇切懺悔生恭敬心清淨心長跪合掌在歸依本師前依師長教自己立下誓願説我弟子某某盡形壽歸依佛兩足尊盡形壽歸依法離欲尊盡形壽歸依僧衆中尊三説願大德憶持慈悲護念我是優婆塞我從今者乃至命終護生歸依佛竟歸依法竟歸依僧竟三説依大名經及律説凡發願受持歸依的那怕是生死關頭也不能中途變悔就是説笑也不可説我不信三寶或者説我不是三寶弟子如歸依而又棄捨生生世世受苦無窮所以要切記盡形壽歸依的誓言歸依了三寶應該以至誠心來修供養對於佛像佛塔經典僧衆即使是不大莊嚴例如佛像的工巧不妙不大清淨也不可輕慢要一律生尊敬心供養佛如禮拜讚歎右繞及供奉香華伎樂燈明幢幡寶蓋等莊嚴具供養法如書寫印刻或者莊嚴經典以香華等來供養供養僧是衣服飲食坐臥具醫藥日用雜物但必須佛法所認為清淨的僧衆可以用的切勿供養不如法的物品至於最上的供養沒有比依從如來的法教聽從僧衆的指導而切實奉行的了我國的佛教徒都修早晚課誦時間比較長對在家事務忙的信徒多少有些不適合最好依印度舊法日三時夜三時六時修行次數不妨多時間不妨短些修三歸依時要憶念歸依三寶的諸般勝利功德如一成為佛弟子二是受戒的基礎三減輕業障四能積集廣大福德五不墮惡趣六人與非人都不能嬈亂七一切好事都會成功八能成佛道如能時時憶念歸依三寶的種種功德而修習那對於修學佛道成就信心獲得希有功德是非常容易成就的此歸依最尊此歸依最勝不由餘歸依得樂得安隱依上面所説此歸依三寶在一切歸依中最尊最勝如有求歸依的真誠那當然非歸依佛教的三寶不可了不要邪正不分以為歸依什麼宗教都一樣其他宗教的教主教法教徒沒有能究竟離染污的也沒有具足功德的自救不了怎能為他人作歸依處呢所以即使歸依外道也決不會由其餘的歸依而能得到有為功德的安樂得到無為功德的安隱安隱就是安穩指涅槃的究竟常樂而説所説歸依者信願以為體歸彼及向彼依彼得救濟歸依的要求歸依的對象歸依的儀式都已經説過了但所説的歸依到底是什麼呢這是深切的信順信得這確是真歸依處的確是能因之而得種種功德的知道三寶有這樣的功德就立願做一佛弟子信受奉行懇求三寶威德的加持攝受歸依就是以此信願為體性的所以受了歸依就要將自己的身心歸屬彼三寶不再屬於天魔外道了隨時隨地都要傾向彼三寶投向三寶的懷抱例如迷了路的小孩在十字街頭亂闖車馬那麼多不但迷路而且隨時有被傷害的危險正在危急時忽見母親在他的前面那時他投向母親的懷抱歸屬於母親而得到平安了歸依三寶的心情也應該這樣能這樣就能依彼三寶的威德得到救濟在梵語中歸依是含有救濟意義的所以三寶的功德威力能加持受歸依的攝導受歸依的使他能達到離苦常樂的境地總之從能歸依者説歸依是立定信願懇求三寶的攝受救濟從所歸依的三寶説不思議的功德威力加持受歸依的引攝衆生邁向至善的境地若人自歸命自力自依止是人則能契歸依真實義一般説來歸依是信仰希願領受外來的助力從他力而得到救濟一般他力宗教都是這樣的然佛法不只如此而更有不共外道的地方佛在涅槃會上最後教誡弟子説自依止法依止不餘依止這是要弟子們依仗自力要自己依著正法去修學切莫依賴別的力量這正如楞嚴經中阿難説的自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代一切還得靠自己去修習所以歸依的深義是歸向自己自心自性自己有佛性自己能成佛自己身心的當體就是正法涅槃自己依法修持自身與僧伽為一體佛法僧三寶都不離自身都是自己身心所能成就顯現的從表面看來歸依是信賴他力的攝受加持而從深處看這只是增上緣實是激發自己身心願其實現所以説若人自己歸命命是身心的總和歸命是奉獻身命於三寶能依自力自己依止自己而修正法而不是阿難那樣的以為恃佛威神無勞我修那麼是人也就能契合於歸依的真實義了第二章聞法趣入上來歸依三寶歸依以後應該多聞正法這才能趣入佛道有以為佛法在乎修行聽法有什麼用豈不見楞嚴會上阿難尊者一向多聞未全道力不能免脫摩登伽女之難嗎不知道阿難尊者問題在一向多聞而並不是聞一切聖典都説修學佛法非聞法不可如什麼都不聞怎麼會知道了生脫死怎麼知道有極樂世界阿彌陀佛怎麼知道有向上一著怎麼知道這是佛教正法如一切都不聽不聞連歸依三寶也不會呢由聞知諸法由聞遮衆惡由聞斷無義由聞得涅槃這是聖典中讚歎聞法功德頌可説佛法中一切功德都由聞法而來説到聞法龍樹菩薩説由三處聞一從佛聞法二從佛弟子聞法三從經典聞法從佛及弟子聞法是親聞語言的開示所以經上説此方真教體清淨在音聞不過釋迦如來涅槃以後我們只能從佛弟子聞法了雖然十方諸佛東方藥師西方彌陀佛等現在説法但對於此時此地的我們除非已經聞法修行到相當程度是不可能親聆佛説的從經典聞法就是自己以古為師從閲讀經論中去了解佛法所以從佛弟子聞法或者閲讀經教都稱為聞法學佛法就從此下手多聞正法略説有四類功德一由於聽聞正法能知道諸法什麼是諸法如善法惡法有漏法無漏法等聽了才知道這一切知道應該修集或者應該捨棄又法是合法的意義善聽了佛法就知種種善法可以依著去修學二由於聽聞正法能遮止衆惡或是內心的惡念或是見於身語的惡行如聽聞了正法知道什麼是惡的有什麼惡果就能將惡心息下來遮止惡心的現起三由於聽聞正法能制斷種種無意義事有些外道雖有求解脫心卻誤入歧途修種種苦行不食不臥裸形等以為修這些苦行可以得道他們自己修苦行也以苦行來教導學衆這些苦行佛名之為無義就是毫無意義的自找苦吃的愚癡事聽聞了佛説的正法自然就遠離這些苦行正道修行不落外道窠臼了四由於聽聞正法如法修行能得涅槃解脫這樣佛法的一切功德不是都由聽聞而能得到嗎如器受於水如地植於種應離三種失諦聽善思念佛在開示正法時總是告誡聽衆説諦聽諦聽善思念之因為如聽法而不能如法那就不能得到聞法的功德了現在舉兩個譬喻來説明聽法時應離去的三種過失初喻如在天下雨時以應量器鉢或杯盆等承受於雨水應離去三種過失一如將鉢或杯倒覆在空地上那雨水就不能進去二如鉢或杯中有穢汁毒素那即使受到了水不但無用而且還會害人三如鉢或杯有了裂縫那即使清淨無毒也還是漏得一無所有這如聽法的人一如不注意不專心如倒覆那聽了等於沒有聽二雖然專心聽可是心有成見有懷疑有邪執如有穢汁毒素那對於聽受的正法不能生起功德反而會引發邪見毀法的罪惡三心中雖沒有成見疑惑可是內心散亂事務匆忙不久還是忘得一乾二淨像這樣的聽法有了三種過失那就不能得聞法所應得的功德所以説應該諦聽應該善思應該善念第二喻如在地上種植穀豆等種也有三失一落在砂石上那是不會發芽的二落在荊蔓叢生的土內即使能發芽也無法生長不久就枯萎了三落在肥沃的土上沒有莠草障礙可是沒有深藏在土內不久就被鳥雀啄去了如播種而如此有什麼收穫呢聽聞佛法也如此聞法聞熏習就是出世心法種但如不注意領受或領受而與雜染心相雜或心雖清淨而是不久又遺忘了如這樣的聞法是不會有結果的所以聞法而求有利益必須離去三種過失好好的聽聞思惟憶念才得病想醫藥想殷重療治想隨聞如説行佛説法如鏡當聽法的時候要用什麼態度來接受佛法呢釋迦佛説衆生身有三病老病死心有三病貪瞋癡如來為此而出世換言之佛是大醫王法是良藥僧是護病者三寶的出現世間是為了救濟衆生身心重病的所以聽聞佛法的應該有這樣的觀想一病想自己從無始以來就為身心重病所纏繞弄得求生不能求死不得生死死生苦痛無窮自身有重病所以有憂苦這是必須確定認識的如不覺得自己有病或覺得有病而不肯求醫藥那就與佛法無緣了二醫想知道自身有重病非一般人外道所能醫治佛弟子説法師才是能治此重病的良醫所以親近善知識恭敬供養如病人的信賴醫師禮聘醫師一樣三藥想醫生治病不是讀讀藥方就有效要使用治療的針藥説法師也如此開示教導修行方法要依著法藥去服用才能根治身心的重病否則如讀藥方而不服用那有什麼用呢如經上説我雖宣説極善法汝若聞已不實行如諸病者負藥囊終不能療自體病四殷重療治想生死大病真是病入膏肓幸遇良醫良藥也要久服法藥才能見效可是有些學衆希望立刻見效少少修習還不能解脫生死重病就失望而懈怠下來這樣的不能勵力進修那還有什麼希望呢佛法不是知識的傳授更不是作為娛樂的消遣品佛法是認清自己有病而求良醫法藥的所以隨所聽聞的正法應痛下決心如所説而努力修行佛曾説過我説的法如鏡子一樣是要你反照自己的佛法這麼説就得觀察自己有沒有種種過失種種功德如有過失就應該慚愧懺悔遠離過失如沒有過失應生歡喜心如觀見自己有功德應該生歡喜心如沒有功德應努力去修習總之聽聞佛法是作為自己修持的準繩聽法而能見於實行這是最重要的趣入正法者應親近善士證教達實性悲愍巧為説正法雖可以從經典去了解但主要還是要從説法師去聽聞法師的開導比起自己閲誦到底迅速而容易得多所以為了要趣入正法進求佛道應該親近善士善知識尤其是大乘善知識佛曾以親近善士聽聞正法如理作意法隨法行説為預入聖流所必備的四大條件這可見親近善知識的重要了怎樣才算是善知識呢這不是因為他徒衆多寺院大相貌好或者是世法場中多知多識因為他有一證德指三學修證善戒清淨成就定成就觀慧成就二教德深入經藏成就多聞能開示導引學衆進修大乘正道三達實性實性是正法的別名這或者由現證慧通達或是從聞思教理得通達四悲愍有慈悲心不是為了名聞利養而是能清淨為利益衆生説法五巧為説成就辨才能善巧方便的為衆説法所以容易了解容易得益如成就這些功德那就是了不得的大善知識了可是末法時代全德的善知識是難得遭遇的而修學佛法卻又不能沒有師友所以不能不退求其次經上説如有八分之一的功德也可以親近涅槃經説四依四種可以為人依止的師長初依人雖沒有斷煩惱證實性但已能通達佛性義十六分之一總之末世善知識難逢如於佛法的行解有一分長處勝過自己也就不妨如法親近了觀德莫觀失隨順莫違逆佛説滿梵行學者應尊敬無論是全德的善知識少分功德的善知識如不能如法親近都不能得應得的功德所以對於善知識要觀察他的功德莫觀察他的過失如聽受善知識的教導或從舉止動靜待人接物處去學習只要有一分長處就注意他的長處而修學這樣雖然是少分功德的知識也可以得到法益反之如不觀功德專在善知識的缺點上著想不是這樣不對就是那樣不夠那雖然逢到全德的大善知識也毫無利益因為全德善知識也不能一切圓滿沒有一些缺點的所以親近善知識應隨時提醒自己來這裡做什麼不是為了尋求知識的過失而是想學習師長的長處能這樣就到處有師長可親近隨處都能得益孔子説三人行必有我師焉也就是這個意思親近善知識扼要的説要隨順師長的意旨使師長歡喜切莫違逆師命就是師長有所呵責也應受責不可生嫌恨心恚惱心怎麼能使師長歡喜呢一要隨力供養種種財物二為師長服勞務三照著師長的開導教授去修行佛法的恭敬親近善知識完滿的表現尊師重道的精神假使師長要你作種種非法呢那是不應該隨順的但應該婉轉的説明不能奉行的意思修學佛法如不能如法尊敬師長想得到佛法的功德那是完全不可能的如經上説若彼於師住嫌恨心或堅惡心或恚惱心能得功德無有是處某次如來讚歎善知識的功德阿難説半梵行者所謂善知識佛説莫作是言純一滿淨梵行清白所謂善知識阿難的意思親近善知識那清淨梵行可説已完成一半了可是佛的意思親近善知識可説圓滿清淨梵行已經完成佛是怎樣的重視善知識所以學者應該尊敬供養善知識親近善知識的功德華嚴經等都説得非常詳明離彼三途苦不生長壽天佛世生中國根具離邪見古人説善知識難遇佛法難聞遇到這難得的良好機緣切莫看得太容易了要知道得聞佛法要離八難才得一二三要脫離地獄傍生餓鬼三途的苦報如生在這三惡道中就沒有聽法的機緣了雖然大力鬼王龍王等也有來聽法的但是機緣太少而且還不能出家受戒隨佛修行四要不生在長壽天中無色界有四天空無邊處識無邊處無所有處非想非非想處色界有無想天壽命都極長如非想非非想天的壽命有八萬大劫這些都是沒有機緣聽法的據增一阿含經八難品説凡是生天的都稱長壽天都是難得聞法修行的所以上不生諸天下不墮三途唯有人身才能逢此難逢的佛法不過生得人身也還要五生逢佛世佛出世與佛法住世的時代如生在佛出世以前佛法衰滅以後那人身也無緣聞法修行了六還要生於中國中國對邊地而説凡有佛或僧衆弘揚佛法的地方就是中國反之便是邊地如生長邊地沒有佛法那雖然與佛同時也不能聞法修行七還要六根具足如眼盲耳聾舌不能説話心狂或暗鈍到不能明了事理那雖然佛世生在中國也是徒然了八雖沒有上來所説的障難可是生長邪見家或是生長外道教區外道家庭或是顛倒邪見久習成性那也還是與佛法無緣所以説離邪見這八事平常稱為八難是學佛的障難依梵語應譯為八無暇就是八種沒有修學佛法的時機這樣我們不落八難是應該怎樣的歡喜呀生死流轉中人身最難得憶梵行勤勇三事勝諸天有人把人生看得太無意義了或是知能低或是環境壞於是自怨自恨自虐不能發心來修學佛法不知道在這生死流轉的五趣中人身是最為難得的這是希有難得的機會如看輕自己而空過了實在是太不值得人身的難得可從兩方面説一在生死流轉中生惡趣的多如大地土生善趣的少得如爪上的灰塵生善趣的如生天上就長期受樂等到從天殞沒又是墮落的多所以人身的難得譬如盲龜的浮沈大海中海中飄著一塊木板中間有一孔盲龜伸出頭來恰恰在木孔中這是怎樣的難以遇到流轉生死而得到人身也是這樣的不容易還有人身雖有種種苦痛不如意事但實是很難得的據經上説人的憶念梵行勤勇三事不但不是三惡道所及還勝過諸天多多人能憶念過去保存歷史的經驗因而人類的思考力推理力特別發達這叫做憶念勝人能不計功利克制自己修習梵行清淨行使自己的身心清淨合理有利於人群等為了這克己犧牲都願意人類的道德精神非常偉大叫做梵行勝人類為了達成某一目的能忍苦忍難精勤勇猛的做去非達到目的不止這叫勤勇勝儒家説智仁勇為人類的三達德與佛説大體相同所以人為衆生中最可寶貴的成賢成聖成佛作祖都是尊重此人類的偉大而努力向上所作成的經上説如諸天命終其他的天就説願得生於安樂趣中他們所仰望的樂土就是人間人身還是諸天所仰望的樂土怎麼生而為人反倒自怨自卑空過此生呢難得今已得精勤修法行莫使入寶山垂手歎空歸人身難得今已得到了那應該怎樣的歡喜把握這難得的時機精勤的修習正法行呢生命是無常的經説人命在呼吸之間切勿等待明日明年或者將來趁此大好時光在佛法門中勇往直前的行去才能於佛法有所得益莫使悠悠忽忽空過一生等到一息不來於佛法中還是一無所得如入寶山見種種奇珍異寶卻不知急急的揀取受用等到時間到了離開寶山這才垂著一雙手徒然的懊悔慨歎空空的歸去生前不努力臨死徒傷悲這有什麼用呢聞法而發心隨機成差別親近善知識聽聞正法而發心來修學由於衆生的根性不同一味的佛法也就隨機差別而成為種種差別了説到發心就是立定志願所作所行以所願為目標而前進發心並不是偶然的起心動念要發起信願達到堅定如來或大菩薩説法時如聽者為一人那當然應機説法適合聽者的根性授以淺深不同的法門如在大衆中如來有不可思議的神力所以在聽衆聽起來都各以為佛説他能懂的語言説他要聽的法門所以説佛以一音演説法衆生隨類各得解在這種情形下不妨説聞到什麼法門自己便是適應於這種法門的根機了可是一般説法師不易有一音説法的能力也不一定有識別根機的能力那只有弘揚自己所解所行或大多數能解能行的法門聽衆聽到這樣法門便不一定是適應這一法門的根性了有的從經典去聞無論是隨手取來或是循序而讀或是聽人説而選讀都不能説遇到什麼就是什麼根機了例如西藏密法盛行南方小乘盛行中國從前禪宗盛行幾乎到處如此你能説西藏都是密宗根性南方都是小乘根性中國從前都是頓悟的根性嗎所以自己是什麼根性主要依自己所發的心願而定切不要讀誦受持某種法門便自以為是什麼根機了從前西藏有一喇嘛修習成佛的密法結果卻證了聲聞果有人以此事問善知識善知識説修密法而證小果總算還好還有修習密法而成天魔外道呢所以不要偏執什麼法門是大是妙還是檢點自己的發心要緊下求增上生現樂後亦樂中發出離心涅槃解脫樂最上菩提心悲智究竟樂關於向上的發心修學真是萬別千差説不能盡但歸納起來不外乎三類增上生心出離心菩提心這就是彌勒菩薩所説的下士中士上士佛法中下品人這是佛法中的下品在一般世間是上品的發心是求增上生心什麼叫增上生就是來生所得的果報比起今生來要增勝一些上進一些例如相貌壽命名譽財富權位眷屬知識能力身體的健康家庭的和樂朋友的協助等這一切都希望來生比今生好得多在佛法中這是不徹底的但卻是正當的因為這確是以正當的方法求向上的進步這裡面還分為二類一願生人間二願生天上這種人天乘根性求現生樂更求後生樂因為依佛法修持能得現生安樂來生也能得善報不過在某種情形下但求後生福樂就是現生刻苦一些犧牲一些也未嘗不可所以現生樂而後生樂的最為理想不得已現生苦而後生樂也不要緊至於現生享受而來生受苦或者現生冤枉受苦而來生苦痛無邊那不屬於如來正法而是顛倒邪行了以人天的福樂為目標因此發心為此而修行都屬於佛法的下士凡發此增上生心那縱然修持出世法也不過人天福報反之如有此願而卻造作種種惡行那是業力強大下墮三途想求增上而不可得了中品人士發的是出離心增上生心的人天果報雖説不落惡道而且是向上進步但進步又進步終究在三界以內流轉並不能到達究竟地步如生天的從欲界而色界從色界而無色界一直生到非想非非想天再也不能上進一旦業力享盡又開始墮落由此深刻理解感覺得三界無安猶如火宅而發起出離三界生死的志願能這樣發心修集出世的法行那就能了脫生死得涅槃的解脫樂解脫樂是從離去煩惱而得到的與世間樂的樂極生悲樂去苦來完全不同這是徹底了脫生死不再流轉比起下士的人天善果徹底究竟得多這裡面又分二類一聲聞乘二緣覺乘合稱為二乘發心與結果大體相同上面説過發出離心的雖修大乘勝法而充其量也不過證得小果反之如發出離心而不修出離行或者造作非法惡行那又是業力勝過願力連人天善報也不可能呢最上品人發的是大菩提心梵語菩提是覺悟的意思如來果位的一切功德稱為無上正等菩提是以大覺為中心而統攝一切功德的發菩提心就是上成佛道的大志願中士的出離心雖説是究竟的但還不夠高尚這猶如船舶在中途失了事大家落在水裡如有人不顧一切盡力遊登岸上望著水中的難友們無動於衷自己舒適的躺下來休息從脫險來説那人是成功的從人類的德性來説這人是不圓滿的所以有人不願獨善其身不願個己解脫而發願來自救救人自利利他希望能與一切衆生同登彼岸但這要怎樣才有可能呢唯有佛能完成此一大志願佛的大智大悲大願大力才能徹底的救度衆生這樣就以佛為榜樣而發成佛的大志願這就是菩提心菩提心發起了修菩薩行自利利他到究竟圓滿時成佛有大悲大智能得最極究竟的大涅槃樂本著這上成佛道下化衆生的目標而發心修行才是佛法中的上上發心上上品人希望學佛同人大家能以此為目標而修行依下能起上依上能攝下隨機五三異歸極唯一大佛法雖有下中上法的分別但從究竟的意義一切無非成佛之道的立場來説這不是獨立的不相關的而有著相依相攝的內在關係如圖一大乘法上三乘共法中五乘共法下這一三層的高塔由底層到最高層有著相依相攝的關係從相依來説依底層為基礎才能建立中層依下中層為基礎才能建立上層如一心想建最上層而不從下中建起那一定是脫空妄想永不成就這樣在佛法的三類中也是依下士法能起中士法依中士法能起上士法這如龍樹菩薩説以得增上生漸得決定勝決定勝就是中上的究竟解脫法這一次第本是阿含經中所説的諸佛常法提婆菩薩也説先遮止非福中間破除我後斷一切見若知為善巧遮非福是離惡行善的下士法破我是無我解脫的中士法斷一切見是盡一切戲論的上士法能知這一先後次第才能於一切佛法而得善巧所以提婆菩薩又説正等覺説此方便如梯級從相攝來説如三層塔的建立有中層就有下層有最上層就一定有中下層所以在佛法中依上士法能攝得中下士法依中士法一定能攝得下士法如法華經中説二乘為三百由旬大乘為五百由旬然五百由旬中就含攝得三百由旬三百由旬就是五百由旬的中站這一相攝的見地為貫攝一切佛法善巧一切佛法所必須的太虛大師稱下士法為五乘共法中士法為三乘共法宗喀巴大師的菩提道次第廣論稱下士法為共下士道中士法為共中士道這一共字就是漢藏智者不謀而合的正見也就是相依相攝的標幟依上面的道理所以從適應衆生來説佛法是隨機方便有五乘人乘天乘聲聞乘緣覺乘菩薩乘的不同或著重出世法佛説有三乘聲聞乘緣覺乘菩薩乘的別異根機不同法門當然也有不同了然從如來出世本懷來説一切法門無非成佛之道歸宗究極唯有一乘或大乘這不是説一切衆生都要成佛歸根結底有一乘法就得了這是説從佛法歸於究極的立場説一切上中下佛法都是成佛的一乘大乘法例如聲聞乘中士的修出離行得涅槃果而佛在法華會上認為這是方便説其實就是大乘法所以説汝等所行是菩薩道大智度論也説二乘智斷即是菩薩無生法忍又如法華經説一稱南無佛皆已成佛道等一香一華的供養一舉手一低頭的敬禮一稱佛名這些人天善法下在同歸大乘的立場都是成佛的一乘法一乘與大乘有些人覺得不同其實是一樣的如法華經及勝鬘經都説一乘法有時也就稱為大乘不過大乘一名多用在與二乘相對處而一乘多用在一切都要成佛的説明上同樣的情形如著重因位就稱為菩薩乘如著重果德就名為佛乘這只是隨義而立名不同在修學佛道的全體歷程上都先後貫攝而沒有勝劣的差別不滯於中下亦不棄中下圓攝向佛乘不謗於正法佛法的始終次第上來已簡略説明所以修學佛道不應該滯留於中下士的歷程上如滯留於中士下士法就成為人天道小乘道而不能契合如來説法的本意了如從新竹來福嚴精舍停滯在半路上雖説風景幽美但不登觀音坪不到福嚴精舍怎能見山色湖光海波塔影呢發菩提心以成佛為目標也就不應該捨棄中士及下士法因為這一切都是菩薩所行道都是成佛的法門有些人求高求妙以為大乘不需要中下士法不知道棄捨了三百由旬怎能到達五百由旬的寶所呢因此經歷菩提正道的修學者要圓滿貫攝一切中下法而同向於佛乘切不可好高騖遠談玄説妙在一味的無邊法門中橫生枝節以致謗於正法毀謗正法有兩類人一以為某經某法不是佛法這類謗法可説人人都能發覺知道遠離二有人以為我是大根機不需要中下法有以為因果善惡等法門為下愚人説與我無關有以為大乘法中只要某部經甚至是其中的半部某佛某咒就好了有了某經某佛某咒就等於一切佛法再不用其他了有以為只要真實修行不要聞思經教這些人可説是異途同歸都是捨棄了無邊經典捨棄了無邊行門取一滴水而棄大海卻自以為大海盡在於此這在他們個人愚癡錮蔽似乎過失還小而對於佛法的弘揚卻成為大障礙這一類的毀謗正法由於不識佛法綱宗論上説無慧之信增長愚癡愚癡是怎樣可怕呀第三章五乘共法發增上生心修集生人生天的正常法門是佛法中的下士道這也就是出世聖法的根基所以名為五乘共法這是説修出世的三乘聖法雖不求人天果報但不能不具足這人天功德這如從新竹去臺北雖不必在桃園下車卻不能不經歷到桃園的旅程如但以求生人間天上為目標就名為人乘天乘是佛教的共世間法如儒家近於人乘道教耶教回教通於天乘既然一般世間法也可能達成生人生天的目的那麼求生人間天國的人何必一定要歸依三寶修學佛教的五乘共法呢佛法並沒有説求生人間天上非歸依三寶修佛教的人天乘不可可是如歸依三寶而修五乘共法不但更為穩當而且已進入佛乘的大門只要向上勝進就可直入出世法了反之如信其他宗教雖也能生人生天但沒有在三寶中積集善緣或反而引起不必要的固執宗教的成見對依人天法而進入出世法的大道不但不能貫通反而壅塞了所以同是求生人間天國歸依三寶在佛法中修行也比歸信其他宗教好得多正信歸依者應修於正見及修於正命勝進不為難凡正信三寶而受歸依的就成為佛弟子佛教信徒佛弟子修學五乘共法要從那裡入手呢在學佛的理解方面應該先修於正見在學佛的行為方面先要能夠修習正命佛曾説正見與正命的人難得對這二項如能修習成就那勝進也就不為難了向上修學出世法還不難何況求生人間天上呢正見是正確的見解見與知識不同見是從推論而來的堅定主張所以正見是擇善而固執之的學佛要有正見如開始旅行要對旅途先有一番正確的了解而確信這是到達目的地的正路正確的認識不一定成為正見如現在聽説地球繞日而轉可説是知識但伽利略為了這一知識不惜為基督教所迫害囚禁這才是見所以要將正確的知識時時修習養成堅定的正見正見有世間正見出世間正見五乘共法中還只是世間的正見雖只是堅定不移的見地但力量極強如經上説假使有世間正見增上者雖復百千生終不墮惡趣什麼是正命命是生存生活無論是在家出家都不能不生活衣食住行等一切經濟生活合法的得來受用就名為正命正常的經濟生活是非常重要的大部分的罪惡都從經濟生活的不正常而來學佛的在家衆不但要是國法所許可的而且還要不違於佛法的如以殺生如屠戶獵戶等盜淫如賣淫設妓院等妄語以欺騙為生走江湖的多有這一類酒如釀酒設酒家等為職業的佛法中名為不律儀是邪命障礙佛法的進修出家衆凡依信衆布施而生存的是正命如兼營醫完全義務不犯卜星相等為生或設法騙取信施就是邪命如法的經濟來源不奢侈不吝嗇的消費態度是正命要這樣才能與佛法相應否則人身也許不保還説得上了生死嗎在抗日戰爭初期香港某居士念佛極虔誠有一所廣大而幽靜的別墅他函請印光大師離開戰區來香港安住印老問他才知他世代以釀酒起家印老説你把酒業歇了我才能來香港可是這位老居士捨不得學佛而不修正命也許就是中國佛教衰落的原因學佛法一定要職業合法寧可短期內因職業改變而受到苦痛決不能長此邪命下去自害害人所説正見者人生之正觀上面所説的正見到底是什麼依人世間的正見來説就是人生之正確見解也就是正確的人生觀觀察人生的意義人生應遵循的正道從正確觀察而成為確信不移的定見便是正見對於修學佛法正見是太重要了如航行的舵一樣佛曾説得正見的特別是在家信衆極為難得如有人虔誠的信仰三寶樂善好施明白佛理看來是一位典型的良好佛弟子可是到了衰老到來有的就聽人胡説為了什麼營養問題素食幾十年又重開殺戒了有的遇到疾病纏綿一時不得全愈於是求神問卜扶乩求耶穌什麼也去試試看有的經濟情形不好就去求財神為了想中獎券去仙公廟求夢有些人修持精進到了晚年為了愛著那必朽的身體就去修精煉氣向外道看齊幾年前臺北一位佛弟子聽説有修有學可是為了長壽與健康去接受移殖猴子腦下垂腺的手術結果送了命這都是正見不具足不能修成堅定不移的確信這才身體與環境不良就動搖而轉向了學佛的慢談了生死開悟先修成正見再説心淨或不淨利他或損他善行不善行佛子應諦察佛説的世間正見經中説有一定的文句現在略分為四類一正見有善有惡確信我們的起心作事有善的與不善的也就是道德的與不道德的佛法的正見從確見世間出世間有道德的定律著手如堅決的否定道德那便是邪見了如印度的六師外道懷疑哲學唯物論的順世外道等什麼是善不善呢從自己的內心説心淨是善的如或不淨那就是不善的我們的內心經常有一些煩動惱亂煩惱的不淨因素如不起雜染的煩惱而心起清淨的因素就是善這如與貪瞋癡相反的無貪無瞋無癡崇尚賢善而輕拒暴惡的慚愧使心安定清淨的信心實現止惡行善的精進這些都是淨的善的反之如貪瞋癡無慚無愧不信放逸等就是不淨的不善了從見於事行的對他影響來説那麼如有利於他的是善如或有損於他的是不善人與人人與衆生都有著關係應該是互助共濟的合作遵行自他共處的和樂法則如所作為而有害於他那即使有利於己損他利己也是不善而不可為的如有利於他那即使有損於己損己利他也是善的而應該做的從內心與對外影響決定善行與不善行的差別行是動作內心的動作名意行身體的動作名身行語言的動作名語行這都是有善與不善的所以説善行不善行這一切佛弟子或繼承佛陀家業的佛子應該審諦的觀察不但要確實信有善與不善而且要分別什麼是善什麼是不善修成堅定不移的正見作為我們起心作事的準繩有報必由業微小轉廣大能引或能滿決定或不定現生或後報諸業不失壞二正見有業有報有善有惡這除少數的邪見而外一般人都是信認的可是善與惡約行為的價值而説自有他應得的果報如不能對此有定見那在某種環境下善惡的信解就會動搖了從前有位忠君愛國的大臣被帝王處了死刑臨死時他對兒子説我要教你作惡可是惡是做不得的我要教你行善我可沒有作惡呀他自己行善而沒有好報於是對善惡就發生了疑惑所以不但要正見善惡還要正見善惡的業報一切衆生所有的一切果報必然是由於業力所招感有業然後有報有種種不同的業所以有各各不同的報業是非常多非常復雜的所以果報也是極多而又是極復雜的什麼是業什麼是報呢業是事業是動作我們的內心身體與語言的動作凡由於思力意志力所推動的都是業但現在所要説的指從我們身口意業的或善或惡的活動而引起的一種動力這是道德與不道德的價值行善作惡等事業如農工的工作勞動業力如勞動所得的工價貨幣憑工作所得的貨幣代表勞動價值就能拿來換取適當的用品所以有某種業力就能感得某類的果報説到報嚴密的意義是異熟異類而熟這在因果系中屬於因果不同類的因果如為善而得天國的福樂作惡而墮受地獄的苦痛依所作的業力感受苦或樂的報這是正見的重要項目唯有這樣善惡才有一定的價值關於業報的意義應該略説幾項重要的微小的業力是可以轉化為廣大的這是説小小的善業或惡業如不斷的造作就會積集而成重大的業力如法句説莫輕小惡以為無殃水滴雖微漸盈大器善業也如此這與古人所説勿以惡小而為之勿以善小而不為意義一樣還有如造作害人的惡業本來算不得重大可是自己對於這一惡業時時覺得害得巧妙害得滿意這樣的不斷隨喜惡業小惡的力用會廣大起來與大惡一樣同樣的雖只是小小的善業如自己能時時生歡喜心小善也就漸漸的成為大善了所以我們不應該忽略輕業不可隨喜惡業而應該隨喜善業才好在種種業中有一類特強的業力能引我們感到五趣中的一趣報體或生天上或墮地獄或墮傍生其中又有種種類別如傍生中或虎或魚等凡由強業而感得一趣的總報體得蘊得處得界成為某趣的衆生叫引業還有一類業並不能引我們感得生死的總報體卻能使我們對於這一報身的種種方面得到圓滿的決定叫滿業如生而為人儘管萬別千差而同樣是人人是引業所感的總報餘如六根有具足與不具足相貌有莊嚴與醜陋容色有黑白目睛有威光或無威光音聲有優美或粗俗嘹亮或低滯這種人各不同的差別都由不同的滿業而感得不過其中還有業報與現生功力長養的差別如人類的目光望遠有一定的限度也是人各不同的這是業力經藥物營養保護訓練使達到限度中的極限或老年而目力很好這就有賴現生功力的長養了業又有決定或不定二類其中又有時與報的不同有的業要感什麼報是決定了而在什麼時候受報現生或來生是不決定的有受報的時間是決定了而所感的什麼報還沒有決定有所感的果報受報的時間都定了這如造作五無間業殺父殺母殺阿羅漢出佛身血破和合僧的來生一定要墮落地獄也有時與報都不決定的這大致是輕業依古德説一切業都是不決定的換言之一切業都有改善可能性的所以只要能痛下決心什麼惡業都有化重為輕或不定受的希望鹽喻經説犯了重大惡業的只要有足夠的時間如老死迫近就難了但依觀無量壽佛經還有念阿彌陀佛的一法痛下決心修身修戒修心修定修慧重業是可以輕受或不定受的這如大量的鹽投入長江大河中水是不會鹹的反之雖造作較小的罪卻不知道修身修戒修心修慧還是要招苦報的這等於少量的鹽放在小杯裡水還是鹹苦的這是業不決定的有力教證大乘法中觀業性本空能轉移懺除重罪也就是修慧的意義所以犯了重惡業的不必灰心應深切懺悔修學佛法從造業與受報的時間來説可分為三時業現報業是這一生造業現在就會感果的生報業要等身死以後來生就要感報的後報業是造業以後要隔一生二生或經千百生才受報的所以造業受報不能專在現生著想如説行惡見樂為惡未熟至其惡熟自見受苦行善見苦為善未熟至其善熟自見受樂在這三時業中的現報可能是輕業報也可能是重業的華報因為現生的果報是以前善惡業力所招感決定了的沒有死是不能有根本或重大改變的輕業為什麼可以受現報呢因為輕業不致改變這一生的重要報果例如政府現由某黨主政自有其根本政策不能作相反的重要變革在野黨如有不重要的意見現政權是樂意採用的重業為什麼現受華報對將來的果報而説呢因為業力太重對現有報體起著重大的影響這等於在野黨的勢力太強大了現政權不能不接受多少意見只要不危及政權的存在與該黨的主要政策就好至於生報業及後報業都是有輕有重的總之業是有種種不同的但有一點是絶對相同的就是諸業在沒有受報以前如不是修證解脫那是怎麼也不會失壞的有業就會有果報今生不受報來生不受報就是千千萬萬生業力照樣存在只要因緣和合還是要受報的三昧水懺的緣起中説西漢時因袁盎的中傷而殺害了鼂錯袁盎所作的殺業教他殺一直沒有受報直到後身為悟達國師時那已是晚唐了悟達國師因貪染沈香座惡業才感報而患人面瘡這傳説也就表示著業力不失壞的意義隨業報善惡五趣常流轉隨重或隨習或復隨憶念由業往後有薪盡火相傳三正見有前生有後世善惡有報多數人是能信受的但有些人只信現業現報不信後世可是行善作惡現報的只是少數那就不能不錯覺為天道無知了有些人只信善惡業的報在子孫如説積善之家必有餘慶積不善之家必有餘殃中國人談陰騭的大致不出此二者不知世間儘多是父賢而子不肖父不肖而子賢的而且如沒有子孫那他的善惡業豈不是就落空了有些人只信今生到來生不信前生如耶穌教等這雖能依此使人離惡向善但不明過去世對於現生果報的萬別千差就無法説明也就無法使人生起合理的正信耶穌説生盲的是為了神要在他身上顯現權力其實耶穌並不能答覆這一問題因為現世界中生盲的人多著呢所以不但要正見善惡業報還要進一步的對於前生後世有堅定的信解發生正見衆生造作了種種的業善業惡業引業滿業生報業後報業等隨著這樣的業力而感到來生的果報善業其報是在善趣的人間天上惡業就報在惡趣的地獄傍生餓鬼地獄傍生餓鬼人天總名為五趣衆生從無始以來就隨著業力的善惡常在這五趣中流轉一生一生的延續不已趣是趣向就是隨業而往生的所在有此五類所以名五趣或者加上阿修羅譯意為非天為六道道就是趣的別譯大小乘經論中或説五趣或説六趣阿修羅多住在大海中為數不多所以如攝在鬼趣或傍生趣就合為五趣了流轉即是輪回這不是説五趣升沈前生後生有著一定的次序是説上升或下墜轉來轉去總之不出這五趣的範圍以今生來説造作的業多得難以計算而過去生中未了的業力又積壓到現在真是前業未清後業又來這樣的越來越多如今生死了那到底那一種業招受後報呢這是不能確定的但不出三大類有隨重的或造作重大的善業或造作重大的惡業如五無間業等業力異常強大無論意識到或者沒有意識到重業一直占有優越的地位一到臨命終時或見地獄或見天堂那就是業相現前是上升或下墜的徵兆接著或善或惡的重業起用而決定招感未來的果報或有隨習的既沒有重惡也沒有大善平平的過了一生在這一生中雖無顯著的重業但所作的善惡業在不斷的造作狀態下對於某類善業或惡業養成一種習慣性這也就很有力量了到了臨命終時那種慣習了的業力自然起用而決定招感來生的果報從前大名長者問佛我平時念佛不失正念可是有時在十字街頭人又多象馬又多連念佛的正念也忘了我想那時候如不幸而身死不知道會不會墮落佛告訴他説不會墮落的你平時念佛養成向佛的善習即使失去正念而死還是會上升的因為業力強大不一定與心相應的如大樹傾向東南而長大的一旦鋸斷了自然會向東南倒的所以止惡行善能造作重大的善業當然很好最要緊的還是平時修行養成善業的習性臨終自然會因業力而向上或有隨憶念的生前沒有重善大惡也不曾造作習慣性的善惡業到臨命終時恍恍惚惚大有不知何往的情形到末後如忽而憶念善行就引發善業而感上升人天的果報如忽而憶念生前的惡行就能引發惡業而墮落對這種人臨命終時的憶念非常重要所以當人臨終時最好能為他説法為他念佛説起他生前的善行讓他憶念善行引發善業來感果淨土宗的臨終助念也就是這一道理不過這是隨憶念的如隨重隨習的衆生到臨命終時業力最大如重業與習業是惡的那就很難使他憶念三寶或施戒等功德了學佛修行到底平時要緊衆生在生死中是不得自在的聽由業力擺布現在的生命經過了死亡階段就轉而開始一新的生命往後有這樣的死而又生前生與後世之間不一不異不斷不常的延續確是甚深而不容易明見的由業感報死生相續在聖者是毫無疑問的特別是得了天眼通外道也能得到所以外道也有多少信解業報的前生後世對這是看得明白不過可是一般凡夫沒有清淨智對於生前死後不免黑漆一團什麼也不知道雖有極少數的不昧前因能知道前生也被庸俗的唯物論者所抹煞所以最好是依佛法修學得清淨智發天眼通去親自證實這一問題此外唯有仰信如來的教説及從推理去信解了教理的説明初學還是不容易現在姑且舉一薪盡火相傳的比喻來説明莊子説薪火傳也不知其盡也廬山遠公大師就曾引用來比喻死生相續的道理如前薪燃燒發光等到薪盡火息時又延燒到另一薪火又旺盛起來前薪不是後薪後火也不是前火而後火不能不説由於前薪的火而來這等於説前生的生命活動停止時又展開一新的生命前生不是後世而後世確是依前生的業力而來然而從死到生時間與空間都可能有距離的所以死後生前的如何延續還是需要解説的依佛法的深義説身心活動顯現為生命的形態當死亡時身心剎那滅去顯著的身心活動現在的停頓了然而過去了的身心活動不是沒有這就是業滅過去功能不失這不妨説是生命的潛在等到因緣成熟時過去的業力就引發一新的身心活動開始一新的生命現在再以薪火相傳來比喻火燒物時發為熊熊的火光這如生命的顯現活動等到燒完了發光的火焰沒有了這等於一期生命的結束死亡火息了熱灰也似乎冷了如遇到易燃的物件加上微風的吹拂又會死灰復然起來又重新發出熊熊的火光這等於因緣和合時過去的業力又會引發一新的生命死灰復然的火光不是前火而與前火有著不可分離的關係這如後生不是前生而後生與前生的行業有關從前火到後火時間上可以有一間隔這如後生與前生間時間與空間都不妨有距離的不過這到底是比喻而已如約佛法來説過去了的業力在如幻的法性空中本不可説有時空的間隔只要因緣和合如人生要有父精母血的和合等就能在另一時間另一空間忽然的引發一新生命身心活動的又一新開始生死常相續聖者得解脫凡聖縛脫異深信勿疑惑四正見有凡夫有聖人能正見有善惡業報前生後世雖然是難得的但如不信聖者解脫的自在境地那人生可真苦了五趣流轉生死死生一直這樣的升沈下去這幕演不完的人生悲劇如何得了人生決不是這樣無希望的確信聖者的自在解脫才能向上邁進衝破黑暗而開拓無邊的光明所以還要正見有凡夫有聖人衆生無始以來生死死生常在五趣中相續流轉這是一般的凡夫經修行而得證的聖者能得到生死的解脫怎樣才算是聖者凡能現起無漏淨智體證法性一切法的真如就是聖人勿與世間的假名聖者相混聖人也有好多階位但與凡夫的根本不同點就在乎有淨智證真理什麼叫解脫解是解除脫是開脫衆生在生死中不得自在如在羅網中被繫縛了一樣聖者得了淨智就斷去生死根本的煩惱這才從生死得解脫得大自在得真安樂凡夫與聖者本來同樣的報得有識之身只因凡夫愚癡以無明為主這才繫縛在生死中不得自在聖人因修持而得淨智以般若為主這才解脫生死的繫縛這一凡聖縛解脫的差異一定要深切信受切勿存絲毫疑惑因為能信就知道有聖者有解脫也能信聖者有真智慧大能力對於聖者的功德如三明六通十力四無所畏十八佛不共法等都能信受能這樣就是奉行人天乘法門現時還不能進求出世解脫的佛法也能漸漸養成出世法種否則聖者與聖者的一切功德都不信了這不但誹毀事實熏成邪法種子也障礙了自身的進修有些人自作聰明以凡夫的知見來衡量一切覺得自己不是聖者沒有淨智沒有神通人就不過如此那裡會有聖者呢這種人的愚癡真是可憐極了如同樣的用黏土做成的瓶子沒有經過火的鍛煉遇水要化風吹日晒會分裂破壞如經過火的鍛煉成為磁瓶遇水不會化風吹日晒也不會裂了世間粗事經過鍛煉還大大不同何況自稱萬物之靈的人呢難道依法修行經般若智火的熏煉還是凡夫那樣的嗎凡夫與聖人的存在一定要從深切信解中引發堅定的正見上來説明世間正見的主要內容為修學佛法者所必不可缺的見地流轉五趣中身心多苦迫衆生在流轉五趣之中實在不大理想身心方面常受很多的苦迫不過從大苦而到小苦也會覺得輕鬆而舒適得多三惡道苦多不消多説人間也是不如意事常十九諸天享福也還有憂苦尤其是一旦命終自己知道要墮落時那真是説不出來的憂苦呢大地獄極熱近邊遍遊歷八寒及孤獨是諸苦中極先説地獄趣苦地獄梵語捺洛迦是苦處的意思地獄分四類共為十八地獄一主要而根本的是八大地獄由於猛火的燒燃受著極熱的苦迫所以也叫八熱地獄依經論説八大地獄在此地層底下地球中心確是充滿烈火的如有時火山裂口就會噴出火來佛經與基督教的舊約都有大地裂開陷身地獄的記載所以八熱地獄決在地下地球中心無疑有人懷疑這樣的火熱怎會有生命存在呢不知道衆生業力不可思議有的入水而死有的卻要在水裡才能生活有的埋在土裡會死有的一直生長在土裡衆生不可思議切勿專憑自己的生理情形去推想一切八大地獄是等活黑繩衆合號叫大號叫炎熱極熱無間這些地獄有二種特點一都受著猛火的焚燒及為烈火燒熱了銅鐵近於岩漿所迫害鐵地鐵室鐵鏊鐵槽鐵山鐵繩鐵刀鐵鍱鐵椎鐵串鐵炭鐵釘鐵鉗鐵丸這些火熱的銅鐵種種的方式來苦迫罪人二身體又大壽命又長無間地獄壽長一中劫所以地獄的最苦痛事不是求生不得而是求死不能在業力沒有盡以前怎麼也死不了燒成灰也要活轉來地心深處的無間梵語阿鼻地獄猛火燒燃苦痛的迫身連一絲毫的間斷都沒有這是罪大惡極的受報處二近邊地獄也叫遊增地獄這在八大地獄的附近邊緣是熱地獄的流類每一大地獄都有四門從每一門出來又都有同樣的四種地獄這樣每一地獄有四門每門有四地獄就共有十六地獄八大地獄都如此就總有一百二十八地獄八大地獄的衆生受苦完了從每一門出來就又必然的周遍遊歷這四地獄從一處到一處增受苦迫所以也叫做遊增四地獄是一煻煨這是火熱的灰坑二尸糞這是糞泥坑坑中有類似糞蛆的利㭰蟲三鋒刃這又有三處刀刃路劍葉林這裡有惡狗鐵刺林這裡有鐵㭰的大鳥這三處同受刀箭的苦害四無極河這是沸熱的灰水落在裡面如油鑊中煎豆一樣三八寒地獄或説從八大地獄地球中心橫去到外邊或説在鐵圍山的那邊鐵圍山為這一世界地球的邊緣據説是日月所不易照到寒冷無比所以推斷寒地獄在南北極大概是不會錯的八寒地獄是皰皰裂喝哳吒郝郝凡虎虎凡這三處依寒冷的呼號聲得名青蓮紅蓮大紅蓮這三處依膚色及破裂情形得名壽命也極長所以也苦痛不堪如説無比嚴寒侵骨力遍身栗戰而縮屈百皰起裂生諸蟲嚼抓脂髓水淋滴寒迫齒戰毛髮豎眼耳喉等悉寒逼身心中間極蒙蔽住寒地獄苦最極四孤獨地獄這可説是人間地獄或在深山或在海島或在曠野或在深林到處都有這不是衆多和集一處而是少數或一或二的衆生由於個別的業力感到這地獄一般的苦報所以叫孤獨最近報載臺灣某處有一父親虐待他的生女關閉在無空氣無陽光的暗室中食不能飽衣不蔽寒整整的十五年還是小孩的樣子發育不良不但面無血色皮膚浮腫簡直不像人樣衆生的業力不可思議在這光天化日繁榮鬧熱的所在會有身受這樣苦報的人存在這該是近於孤獨地獄的了這四類十八地獄是諸受苦的一切衆生中最極苦痛的地方在沒有解脫生死以前人人有此墮落可能性的應該生大怖畏勿作惡業旁生種種異吞噉驅使苦再説旁生趣的苦迫旁生或作畜生實包括了人類以外近代人所説的一切動物他們的形態顏色住處生活壽命是種種別異的佛法每分為無足的如蚯蚓等兩足的如鳥類四足的如獸類多足的這又有六足八足以及更多的足都是蟲類從住處來説原本住在大海中後來分移到各處這才有在水中的陸上的空中的差別其中也有兩棲的還有可以飛空可以著陸也可以入水的他們智力的高低壽命的長短享受的苦樂都相差得很遠如龍與金翅鳥等有的享受還勝過人類呢然從一般來説這是非常苦痛的惡趣經上説鳥等心種種故色種種由於近代的研究對這已部分的得到證明如鳥獸的眼睛引發眼識能分別認識青紅紫等顏色那他身上的毛羽就有種種艷麗的顏色如不能認識紅等那毛羽就是灰色的暗黃的又如昆蟲的保護色有的形態也還像樹枝敗葉這無非因為常住在這一環境時時認識這些因而熏習內心由心理影響生理的組織以及外表的顏色旁生趣的苦迫主要是互相殘殺互相吞噉大魚吃了小魚大蟲吃小蟲這是到處可見的事蜘蛛布網在屋角就為了捕殺飛蟲青蛙與鳥類的吞食昆蟲食量都相當驚人躲在樹心的小蟲也有啄木鳥來吃他螞蟻平時好吃別的昆蟲就有穿山甲以螞蟻為唯一食品龍王也還有被金翅鳥吞食的厄難人類對於旁生也有殘殺吞噉的惡習有的為了他們的皮毛牙角大量捕殺還美其名為生産旁生界實在是無時無刻都是相互殘殺的屠場還有如牛馬等為人類所繫縛鞭策牠驅使奴役牠絲毫不得自在旁生界的苦迫是僅次於地獄的從前釋迦佛為太子時一天去田裡察看農耕見農夫辛苦得很農夫又鞭策犁田的牛身上出血血流到地上很快的生出蟲來犁過了田地下的蟲類也被暴露到上面天上的鳥就飛來噉食小蟲太子見到旁生界的殘殺吞噉因而悲憫衆生發起出家修行的大願一般人不但沒有警覺沒有同情還吞噉他們這與旁生有什麼差別呢餓鬼常飢渴不淨以為食三惡趣中的餓鬼依字面而説就可知道是受著常患飢渴苦迫的衆生餓鬼是五趣之一與我國俗説的人死為鬼不同佛法中説餓鬼有三大類無財的少財的多財的無財鬼也有三類炬口就是焰口飲食入口就化為火焰針口咽喉細小如針飲食無法咽下去臭口滿口腐爛發臭不能飲食少財鬼是多少可以飲食的也有三類針毛臭毛癭都因身體的特徵得名有的遇到飲食就化為膿血不淨或專食痰唾尿屎等不淨依這一類説所以是吞噉不淨以為食物的多財鬼享受得相當豐富的也有三類棄者專受人類祭祀而生活的這與我國傳説的神道相近失者是以人間遺失的物品為生的這二類有時也還要遭遇飢渴的苦迫大勢那是夜叉羅剎等大力鬼王享受與天福相近雖有這種種而多數的無財少財鬼都是患著極度飢餓的因此總名為餓鬼悉由三不善惡行之所感上面所説的三惡趣悉是由於煩惱的三不善根造作殺盜邪淫等重大惡行之所感得的欲界的貪欲瞋恚邪見癡三者為不善法的根源由此煩惱的發動就會做出種種邪惡的行為惡行成為惡業這才感到這惡趣的苦報如殺生有從貪欲而引發的如為了謀財而害命有由於瞋恚而引發的如報怨復仇或者一時的怒火上沖就把對方殺害了也有從邪見而引發的如外道的為了祭天而殺牛羊臺灣的為了拜拜而殺大豬殺生如此偷盜邪淫等也如此在這三不善根引發的惡業中上品極重的就感地獄報中品的受旁生報下品的墮在餓鬼總之不起深重煩惱不作重罪大惡是不會墮落這三惡趣的人中苦樂雜升沈之樞紐人本誤鬼本習俗謬相沿現在要説到善趣的人身這是我們所最能親切了解的受報在人中不像三惡趣的苦迫也不像生天的福樂人身是苦樂參雜有苦有樂忽苦忽樂的這對於修學佛法卻是良好的環境因為惡趣苦多沒有修學的間暇天上太安樂一味享受智慧就會減損也與佛法不相應在人間如以刀磨石愈磨愈利生天如以刀切土就愈切愈鈍了在五趣中人是升沈之樞紐如生天是由於人身的積集善業修習禪定如由天而更向上生或由惡趣而生天這都是過去世中人身所作的善業墮落惡趣也大半由於人身的惡業如從天而墮惡趣這不是由於天