body:
  text: 第一章歸敬三寶學佛就是向佛學習我們以佛為理想以佛為師範不斷的向佛學習如達到了與佛平等那就是成佛了佛是大覺者大悲者功德圓滿者究竟無上的大聖者想從薄福無智的生死凡夫修習到這樣至高無上的佛果並不太容易這一定要修學應修的法門遵循成佛的正道才能由近而遠自淺入深到達成佛的目標所以發心學佛應該修習成佛的法門遵循成佛的正道成佛的法門正道就是成佛之道佛法為了適應不同的根性所以有種種道福德道智慧道難行道易行道世間道出世間道聲聞道菩薩道然究竟説來並無二道一切無非成佛的法門無非是欲令衆生開示悟入佛之知見所以説一道一清淨一味一解脫方便有多門歸元無二路如長江大河從發源地起有種種溪澗種種湖泊種種江河都匯入而同趣大海一樣一切法門無非是成佛之道所以阿含經與法華經中稱佛法為一乘道三寶是佛法的總綱歸敬三寶是進入佛門的初基三寶的功德真是無量無邊不可思議但如不能歸向三寶就不能得到無緣受用正像不進入公園的大門就不能領略林園花木的幽勝一樣所以發心學佛首先要歸依三寶有海無邊際世間多憂苦流轉起還沒何處是依怙歸依要有求歸依的誠心如人落在大海中隨波逐浪四顧茫茫在這生死邊緣見到草束浮漚也會伸手攀援聽到風響鳥鳴也會大聲呼救求救護的心情懇切萬分可説唯有此求生的念頭那時如有船隻經過拋下繩索或救生圈來還不立刻抓住盡力攀登船隻嗎求歸依的誠懇應該如落海者的求生一樣這才能圓滿成就歸依的勝妙功德現在就以浮沈苦海來譬説世間以衆生為本有情識有生命的衆生是世間的現存事實所以佛經稱衆生為有每一衆生向過去看一生又一生無邊無際在沒有了脫生死以前未來也還是一生又一生沒個邊際衆生的生命流有無限延續如大海的茫無邊際一樣現在這一生不過生命大海中泛起的一個浪頭而已從過去到現在從現在到未來一世又一世在這時間推移的過程中名為世間衆生在世間苦多樂少樂盡苦來實在是多憂多苦所以佛説為憂悲惱苦純大苦聚充滿憂苦的衆生世間如海中的漩流一樣轉來轉去忽而上生天上人間忽而下墜地獄傍生餓鬼三途升起還要沈沒沈沒又會浮起轉來轉去始終轉不出去這樣的流轉苦海頭出頭沒還有比這更可悲可痛的嗎人類如落在大海中隨波逐浪四顧茫茫還知道求救求護衆生浮沈生死苦海怎麼不求救求護尋求解脫自在超登彼岸呢想到這裡求歸依救護的心情油然而生自會懇到迫切起來然而何處是真歸依處何處是可恃怙處呢總不能亂抓草束浮漚為救生圈呀積聚皆銷散崇高必墮落合會要當離有生無不死國家治還亂器界成復毀世間諸可樂無事可依怙有的不知道求歸依有的求歸依而誤信邪師外道為什麼不求歸依死心眼兒迷著了現世的事情以為極有意義充滿福樂等到事到臨頭從金色夢中醒來時悲哀失望再也來不及了迷戀的現事很多主要的有六種一財富的積聚有些人以為經濟第一有了錢什麼也行得通甚至説有錢使得鬼推磨不知無論富有到什麼程度財富終歸要銷解散失的不要以為這是他們不會經營過分浪費財富是個人所不能自主的所以佛説五家所共逢到大水大火遇到盜賊惡王還有生了不肖的兒女財富是轉眼就完了積聚財富不但為了經營與保存引起種種憂苦有時財富更成為苦難的直接原因明末李闖入北京對一般富有的大臣宰官用夾棍與腦箍來追索金銀金銀是完了腿也斷了腦骨也破了有的連命也丟了這就是佛説盜賊與惡王的實例財富本身多憂多苦而無法保存還能説有錢就有辦法嗎二崇高的名位與權位這是一般所迷戀的在位時叱吒風雲得心應手大有一切由我的氣概然而崇高必然墮落近一些説慕尼黑時代的希特勒那還了得可是等到柏林失陷前夕也就一籌莫展只有一死了事史達林主宰蘇聯三十年一切榮耀歸於史達林可是尸骨未寒就被他的黨徒清算在佛教傳記中頂生王統一四洲上升忉利天與帝釋共同治理天宮但末了墮落人間不免憂愁而死那位自稱天地之主人類之父的天帝也還是不免墮落驢胎馬腹去崇高的地位實在是不足依怙的三親愛眷屬的合會或是父母兒女夫婦的會合洋溢著家庭的溫暖或是學校中的師生同學社會上的同事意氣相投互相扶助結成深厚的友情人是被稱為社會的動物能有親人益友共住合作這是極理想而又安心的事然而由親愛的而變為冤家這姑且不説不論是怎樣的親愛共住總要當來分離的一旦生離死別到來拋下父母丟下妻兒孤苦悽惶的各奔前程誰還顧得了誰呢四生存經驗告訴我們凡是有生的無有不死的死亡的事實鐵一般的到處都是可是人類對於自己總好像是不會死的生存一切才有意義於是為名為利爭取一切來屬於自己就是口頭説到要死而對人對事還是毫不覺悟人生不滿百常有千歲憂這是顛倒的不死覺永生與長生的邪見都由此而來然而你真聽説有不死的嗎上面四句是有名的四非常偈五國家的繁榮國家對於我們可説是安全的保護者國家的強盛繁榮對於國民的安樂與自由是有密切關係的因此有的以為只要國家強盛我們便有了著落可是國家的強盛不一定等於自己自己的家的安樂不但政治上的派系起伏不完全以是否忠於國家為標準而國家一直在一治一亂的流轉中治平而還為紛亂中外歷史是無可置疑的實證所以以國家為唯一依怙是不正確不安全的六社會進步有的以為人是社會的動物社會的文明一直在進步中這就是人生的真正意義何必為個己著想求覓空虛的歸依這是見群體而不見個己的偏見社會文化的進步姑且看作人生的真正意義然人類社會的活動依於所住的器界我們住的世界地球是不能離開這一據點的即使轉移到另一世界也還是一樣但器世界是在凝成而復毀壞壞了又成立的流轉過程中請設想一下地球一旦壞了那時的人類文明人生的真正意義何在以社會進步為人生真正意義的人物才是真正空虛的幻想者總之一般人不能引發求歸依的熱心是由於迷惑了眼前的短暫意義在人世間諸般可樂事上生起錯覺經上面一一的論究證明了這些無有一事是真正可依怙的一切都是非常非樂那什麼才是可歸依處呢鬼神好凶殺欲天耽諸欲獨梵依慢住亦非歸依處知道求歸依了可是又每為外道邪宗所誤歸依的對象不但是依賴他也是以他為典型而效法他就是沒有這種自覺的心境也是會受熏染的所以這是不能不謹慎的歸依的宗教對象形形色色現在略説三類從他們的缺點中説明他不是真正的可歸依處一鬼神照中國的説法天神地祇人死為鬼人死而有功德的也成為神這是各式各樣的風神雨神山神水神土地神五穀神山精木怪魑魅魍魎易經所説的精氣為物即魅遊魂指無人祭祀的孤魂為變都是據佛經説鬼是餓鬼神是四大王衆天所統攝的主要是夜叉羅剎那伽龍摩睺羅伽蟒神迦樓羅金翅鳥等或是大力鬼王或是高等畜生還有基督教所傳的魔鬼大龍蛇鬼靈生著翅膀的天使等這些鬼神確有一些功德有一些神力也有向善而為高級天服役的在某種情形下確能給人以多少助力所以常為人所崇拜懇求賜福求他驅逐邪惡或者請求不要傷害然鬼神都充滿煩惱他們的德性有時還不及人類特別是瞋恚成性嗜好凶殺傷害他們所要人類供給的是犧牲血肉甚至要求以人為犧牲如人而不恭敬供養或者冒犯了他就會用殘酷的殺害來報復狂風大雨冰雹瘟疫等這等於人間的黑社會惡勢力在你不幸時也許會拔刀相助慷慨解囊可是你可不能得罪他或者使你就此落入罪惡淵藪從前大勇法師在北平想去西藏學密宗依照密宗規例請得一護法神據説是廣濟寺的狐仙狐仙來護法了卻反對大勇法師去西藏要去他就非搗亂不可真的是來時容易去時難費了好大力量才把他趕走俗語説引狼入室引鬼入門鬼神的崇拜者每每為了得罪鬼神弄得家敗人亡這真是何苦呢孔子到底是人類的偉人他的敬鬼神而遠之不失為聰明的辦法二欲天欲是物質的五欲微妙的色聲香味觸男女的性欲天是光明的意思即一般的天帝在這三界中欲界共有六天最下是統攝八部鬼神的四大王衆天向上是忉利天三十三天夜摩天兜率天化樂天他化自在天這六天同有物質的貪欲男女的淫欲所以稱為欲天欲天中與人類關係最切的要算忉利天王釋提桓因帝釋了他崇尚和平愛好道德希望人類進步雖為了天國的統治偶爾也發動戰爭但寬恕敵人以不殺為主他成為多神王國的大帝通過鬼神而統治人間天女圍繞與中國傳説的玉皇大帝相近比起鬼神來欲天當然高尚得多毛病就出在迷戀耽著諸般欲事上在物欲與性欲的享受中不免驕奢淫佚沈醉於糜爛的生活而智慧與德性的精神生活反而會退落下來從前帝釋曾請佛説法可是回去不久連佛説的是什麼也忘記了欲為苦本這種物欲享受而容易墮落的諸天自身不保還需要求歸依呢三獨梵欲界以上叫做色界色界分四禪初禪又分三天梵衆天梵輔天大梵天梵是清淨的意思與聖潔的含義相近梵衆天如人民梵輔天如官吏大梵天如獨一無二的帝王所以稱為獨梵梵天是非常清淨的沒有淫欲也不再貪戀世俗的物欲德行方面慈悲博愛的精神非常高尚這在一般宗教中可説是佼佼者了據佛經説大梵天出現還沒有臣民也還沒有欲界地球等住處大梵天想有天地欲界也就漸漸凝成了想有人人也恰好出生了由於大梵天心依憍慢而住不免引生狂謬的知見以為天地由他而創造人類由他而出生他生存一較長的時間一劫半便向他的臣民宣説自己是常住不變無始無終印度的大梵天與基督教的耶和華相合梵王的淨行克制世俗的情欲與慈愛精神原是可稱讚的可惜狂慢的邪説奴視一切成為信我者生不信我者滅亡的大獨裁者一神教的邪毒泛濫世界成為罪惡的一大根源試想如不是誇大狂增上慢這位流轉生死苦海的大梵天王或耶和華憑什麼説創造萬有呢憑什麼説常住而無始無終呢梵天以上還有二三四禪天以上還有無色界天但與人類沒有什麼接觸只是極少數人能信受奉行不能成為社會共信的宗教所以也就不説了一般的宗教不外乎鬼神多神教的大神一神教如上所説都是不離煩惱不出生死都還是自救不暇的苦惱衆生所以説亦非歸依處歸依處處求求之遍十方究竟歸依處三寶最吉祥人們感到生死的苦迫想尋求歸依處處去求雖然求之不息遍十方四方四維上下都求過了卻盡是些鬼神鬼神王國的大神創造神都不是真正的歸依處這才知道究竟的真歸依處唯有佛教的三寶佛法僧三者都是希有難得的價值無上的妙用無比的所以都稱之為寶歸依三寶使我們化凶為吉化難成祥離惡向善轉黑暗為光明離苦痛得安樂這一切吉祥事都能夠成就所以説最為吉祥一切都值不得歸依唯有三寶才是真歸依處這不是自讚毀他而是從事實與理由兩方面得來的結論事實是釋迦佛成佛不久創造神梵天王從天上下來懇請如來説法他覺得他對於他的兒女自以為是他的兒女實在是毫無辦法了釋迦佛答允了他這才大