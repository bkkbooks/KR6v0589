如能切實信解那麼如遭逢苦痛逆境不會失望悲觀因為知道這是惡業所招感而惡業的力量有限苦果終於要過去的就是淪墜地獄也是會超脫的何必為苦痛而擾亂自己應該努力修善以求得當來的福樂如遭逢喜樂順境也不會得意忘形驕奢放逸因為知道這是善業的果報善業力是有限量的福樂也是不久要過去的生非想非非想天還是不免墮落怎麼可因喜樂而放逸這譬如年逢荒歉生活艱難但這唯有努力耕耘播種施肥灌水去蟲挨過了飢荒新穀登場就可得豐樂了如年歲豐收儘管倉廩充足也唯有努力耕耘播種施肥灌水去蟲因為不這樣坐吃山空等到沒有可吃的時候那可就苦了所以依於深信業果的正見厭苦而求樂那不要管現況怎樣而但知修善宜積極能確立這不問現況如何但知努力行善的人生觀才是得到了佛法的正見若時能行善而未作善業一旦苦果臨爾時復何為這是警策及時修善的論頌若現時不墮八難不是幼稚老耄又不是殘廢顛狂或者有知識有能力有資財有權位有名望著實能修行善業這是多麼難得的機會如不知自愛浪費光陰未能努力修作善業豈不可惜現在的人身樂果是過去善業所招感的業力有限量不能長此維持既沒有行善那麼一旦老死到來當然惡業成熟苦果臨頭試問到爾時復有何善可作為呢所以人生應該趁早行善不可等待不可因循求人而得人修天不生天勤修三福行願生佛陀前依上來所説知道應該努力行善求得人天樂果但在人乘天乘中修學那一乘更好呢什麼才是報生人天的善業呢怎樣才能不為人天福報所拘或因作惡而墮落呢本頌就是解答這三個問題一人乘與天乘都是善報依福報來説天報比人報要勝妙得多所以應該修人乘法最好能修天乘法可是如上面所説人有三事比諸天還強佛出人間諸天命終也以人間為樂土在這適宜於修學佛法的立場人間比天上好人乘法也就比天乘法更可貴我們以人身來學佛切不可羡慕天國的福樂應該修學人乘正法為了求得人身而修行人乘正法當然依業受報得到了可貴的人身至於天乘法不是完全不可修但要不是為了生天並且不願生天這樣的修行天法由於願力不致隨業力而報生天上願力是不可思議的不過高深的天法禪定還是不修為妙恐怕願力不敵業力為業力所牽而上生天國這就落於八難之中成為學佛的大障礙了二要修集人乘天乘的善業才能得生人生天的樂果生人生天的正業佛説為三福業就是布施持戒修定所以唯有勤修三福業行才能得人天樂報有些人不明因果不修正業妄想生人生天如祈求天帝希望天帝能救度他達到生天的目的佛曾呵斥他們不修善業而祈禱生天猶如將大石投在大池中而在池岸上禱告希望大石能浮起來一樣古德曾説生天自有生天業未必求仙便得仙然世間不知正因正果不知正路修行妄想求生人間天國的人實在不少真是可憐三修集人天善法怎麼能不為人天福報所拘或者因作惡而墮落呢這只要發願求生人間逢佛陀出世能在佛前聞法修行就得了如能生逢佛世見佛聞法就與佛有緣與法有緣與無量學佛法的師長道友有緣不但熏集佛法善根而且能廣結法緣這樣來生生在人間當然會蒙師友的引導啓發歸向三寶見佛聞法修行又與佛法及無量學佛法的法侶有緣這樣的展轉增上功德增長不會因作惡而失卻人身人身而墮落大多是不曾歸依修學佛法而且善根增長法器成熟自然會由此而進入出世大乘法為佛道作階梯了所以凡未能發出離心發菩提心的學衆應勵行人乘正法日日發願惟願三寶慈悲攝受願得生生世世見佛聞法發此見佛聞法的正願修人乘的正行保證會不失人身由此而進入佛道依資具得樂依施得資具故佛為衆生先讚布施福以下解説三種福業先説布施福業如來説法不像我們現在一開口就是了生死生淨土即有即空即心即佛對於一般衆生如來總是先説施説戒説生天修定法如對此五乘共功德人天善業能信受奉行又能透發出世善根這才進説出世法門在這三福業中如來又總是先説布施這有著非常重要的道理月稱菩薩頌給豫明確的開示出來人類要依衣食住行醫藥等必須的資生具才能得到福樂旁生中最低級動物也要依資以為生的食物才能得生存的福樂所以我們的福樂樂是由生理所引發的樂受不能離物質的資生具而存在精神上的種種喜樂一般也是要依此為基礎所以古人説倉廩足而後知禮義富庶而後興教化這種物質生活的福樂是衆生人類最基本的欲求佛也從不曾反對人類這種物資欲樂的正當要求而且是看為首先的適應衆生而説永斷貧窮根本的佛法物質的資具從何而來世人但知勤勞工作發展科學這是但知當前的現緣而不知往昔的宿業佛説依於物質的布施善業所以得今生種種物質的資具我們所有的物資如藏而不用一死對自己就等於零如自己享用或浪費也就從此沒有了如將部分的物資布施在福田中就能感後世物資的福樂布施功德有大小福樂也就有差別這等於將穀子播在田中將來能得十倍百倍的果實自然界的一切物資是衆生共業所感的又依往昔的業力各攝取部分為自己的而加工享用業力所感的物資福報雖需要現生的功力去採集開發製造但如沒有施業沒有物資如貧乏地區或缺乏某些物資那一切現緣的功力也就無法可施了所以物質的福樂實在是依於往昔的布施善業而來這樣物質的資生具為人生福樂所必須的這是基本而首先的正當欲求此資生具依於布施的福業所以佛為衆生説法總是先讚布施的福報勸人修集布施功德以免來生