行者所無有於此二邊心所不隨正向中道謂緣生老死緣無明故有行這是不一不異的緣起中道又如説自作自覺受則墮常見他作他覺則墮斷見義説法説離此二邊處於中道而説法所謂此有故彼有又如説若先來有我則是常見於今斷滅則是斷見如來離於二邊處中説法所謂是事有故是事有這都是不常不斷的中道佛説中道都是依緣起而立論的最重要的要算不有不無的緣起中道了佛為刪陀迦旃延説過不落有無二邊的緣起中道迦旃延是不著一切相而深入勝義禪的大師大乘龍樹的中觀論彌勒的瑜伽師地論都引證這阿含經的教授來説明諸法的真實相所以這一教授在抉擇佛法的緣起正見中有著無比的重要性佛對迦旃延説世人顛倒依於二邊若有若無佛的聖弟子呢正觀世間集者則不生世間無見如實正觀世間滅則不生世間有見迦旃延如來離於二邊説於中道所謂此有故彼有此生故彼生此無故彼無此滅故彼滅換言之世人不知緣起義的顛倒妄執不能脫出二邊有見與無見的窠臼佛弟子依緣起法正觀那就不起有見與無見了譬如説世間人見人生了出來就執為是實有的而起有見等到死了大都是執為實無而起無見的又如在生死流轉中一般人是執為實有的聽見了生死入涅槃就執著以為是無了世人因此大都是怕無我怕空怕涅槃的但是佛弟子依著緣起中道去觀察時如見到世間滅也就是生死解脫了就不會起有見因為緣起如幻的相對性在涅槃寂靜中是不能安立的而且既是可滅的在生起時也就決非實有實有是不會依緣而滅的如見到生死世間的集起就不會起無見因為緣起的如幻假有不是什麼都沒有的而且既是可生的在滅時也決非實無了還有了解緣起的此有彼有此生彼生世間集所以生起現前時知道緣起的流轉相續不會覺得一死了事而起無見的了解緣起的此無彼無此滅彼滅當生死解脫時也不會執有實我得解脫的總之一切是緣起的唯是緣起的集滅並沒有實我實法所以不起有見沒有實我實法所以也不會起無見的真能正觀緣起就能不著有見無見依中道正見而得解脫了三學的增上慧學甚深般若八正道的正見都是緣起的中道觀所以佛弟子能不著常我不落斷常一異有無的執見破無明而了脫生死又復正見者即是四諦慧如實知四諦應斷及應修惑苦滅應證由滅得涅槃出世的解脫道是以緣起及四諦法門為綱要的所以説到正見除知緣起的集滅外還有四諦的正見這是經中特別重視的正見流轉還滅的緣起法是依因而起依因而滅的正見但這不是空洞的因果觀有空觀而是無明緣行等的依緣而有無明滅就行滅等的依緣而無因果相依的必然性從中道的立場如幻假有緣起觀中正確的體見它深入到離惑證真的聖境四諦也是因果的苦由集而生滅依道而證這是世間與出世間兩重因果觀察的對象還是現實苦迫的人生從苦而觀到集如從老死而觀到愛取為緣到無明為緣一樣然後覺了到集滅則苦滅的滅諦如知道無明滅則行滅老死滅一樣但怎能斷集而證滅呢這就是修道了道是證滅的因也是達成集苦滅的對治這樣知四諦與知緣起並非是不相關的十二緣起也可以作四諦觀如老死老死集老死滅滅老死之道經中説為四十四智所以緣起正見也即是知四諦慧不過在説明上緣起法門著重於豎的系列説明四諦著重於橫的分類而已佛在鹿野苑最初為五比丘大轉法輪就是四諦法門也就是稱為三轉十二行相的法輪明白表示出對四諦的次第深入當時佛先指示了那些是苦那些是集什麼是滅什麼是道這應該是剴切分別詳細指示不但要知道那些是苦的那些是苦的集因苦必從集生有集就有苦等事理而且要知道這些苦是真實的苦決無不苦的必然性這是第一轉四行是開示而使其了解深信的接著佛更説苦是應知應該深切了知體認的能深切信解世間是苦迫性才會發生厭離世間求向解脫集是應該斷的不斷便生苦果不能出離生死了滅是應該證得的這才是解脫的實現道是應該修習的不修道就不能斷集而證得滅諦這是第二轉四行是勸大家應該知苦斷集證滅修道從知而行從行而去實證的接著佛再以自身的經驗來告訴弟子們苦我已是徹底的深知了集已經斷盡滅已經證得道已經修學完成也就是説我已從四諦的知斷證修中完成了解脫生死體現涅槃的大事你們為什麼不照著去實行去完成呢這是第三轉四行是以自身的經驗為證明來加強弟子們信解修行的決心佛説四諦法門不外乎這三轉十二行相的法輪在弟子的修學四諦法門時首先要如實知四諦從四諦的事相四諦間的因果相關性四諦的確實性苦真實是苦等從有因有緣世間即是苦的集有因有緣這就是道世間滅的緣起集滅觀中知無常無我而流轉還滅證入甚深的真實性應這樣的如實知也就能知集是應斷的道是應修的惑苦滅應證的依正知見而起正行最後才能達到已知已斷已滅已修的無學位由於苦集滅而得涅槃對於四諦的如實知見引起了見諦真實得道的問題在四諦中體見什麼才算得證由於學者的根性修持方法的傳承不同分為頓漸二派觀四諦十六行相以十六或説五心見道的是漸見派見四諦得道是西北印學派的主張而中南印度的學派是主張頓見的見滅諦得道當然這是千百年來的古老公案優劣是難以直加判斷的依現有的教説來參證從佛法本源一味的見地來説見四諦應該是漸入的但這與悟入緣起空寂性也就是見滅諦得道是不一定矛盾的經説沒有前三諦的現觀直覺的體驗是不能現觀道諦的四諦是漸入猶如梯級的這都是漸入漸證的確證但四諦現覺的深見深信也稱為證信不是證入四種真實理體諦是審諦不倒的意思所以是指確認那四類價值而説如苦這些生死有為是無常的不安穩的是無我而不自在的這種生死事實的苦迫性能深知深信而必然無疑就是見苦諦煩惱與引生的善惡業是能起生死使生死不斷生起的真正原因也就是惑業的招感性深知深信而必然無疑便是見集斷了煩惱不起生死那種寂靜微妙出離的超越性更沒有任何繫縛與纍著的自在性深知深信而不再疑惑便是見滅八正道有了就有出離沒有就決不能出離八正道的能向涅槃所必由的行迹性能深知深信而不再疑惑名為見道諦這種印定苦集滅道的確信無疑是四類價值的深知深信當然是先後生起而印定的但這無礙於緣起空寂性滅諦的體見緣起空寂性就是甚深廣大無量無數永滅這是超越緣起相對性的正法本來如此必然如此普遍如此而稱為法性法住法界的見滅諦不是上面所説的價值確信而是體見那超越相對性的寂滅性自身這是平等不二的沒有次第可説學者在正觀緣起的集滅中達到離愛無欲而體見寂滅性就是得道四諦也當然證得了但在智見上應有引起的次第意義如一下子發見了寶藏又一樣一樣的點收一樣這是古德所説的一種解説頓入漸入應該就是這樣的見寂滅而證道為古代無數學者所修證的是不容懷疑的事實稱此為滅諦的體見是寂滅性自身的體見與見四諦的見四類價值的確認不同先得法住智後得涅槃智依俗契真實正觀法如是在中道的正見中有著一定的程序主要是先得法住智後得涅槃智佛為深摩説不問汝知不知且自先知法住後知涅槃這是怎樣的肯定必然什麼是法住智什麼是涅槃智依七十七智經説一切衆生的生死緣起現在如此過去未來也如此都是有此因如無明而後有彼果如行的決不離此因而能有彼果的這是法住智所以法住智是對於因果緣起的決定智這雖然是緣起如幻的俗數法如不能了解緣起的世俗相對性假名安立性而只是信解善惡業報三世等就是世間正見不名為智但卻是正見得道所必備的知見經上説如依此而觀緣起法的從緣而生依緣而滅是盡相壞相離相滅相名涅槃智這是從緣起的無常觀中觀一切法如石火電光才生即滅生無所來滅無所至而契入法性寂滅這就是諸行無常是生滅法生滅滅已寂滅為樂由無常入無我而契入寂滅是三乘共法中主要的解脫法門還有從空及無相而契入的觀門所以法住智知流轉知因果的必然性涅槃智知還滅知因果的空寂性法住智知生滅涅槃智知不生滅法住智知有為世俗涅槃智知無為勝義依俗諦的緣起因果而後契入緣起寂滅的真實這是解脫道中正觀法的必然歷程一定如是而決無例外的説到這裡覺得佛教中每有一種錯誤的傾向就是不求法住智而但求涅槃智特別是備有世間一般知識年老而求佛法的對於因果緣起的必然性四諦的價值決定常是並無希求有的以為這早都已經知道而不知夢都沒有夢想過卻以為需要的是開悟是明心見性不知道沒有修成法住智涅槃智是不會現起的由於偏向證悟弄到一開口一下手似乎非説心説性談修談證不可於是乎失去了悟入的必要過程空談些心性空有理事弄得內外也不辨了過去的大德們就有錯認定盤星以為孔顏樂處大學明明德孟子致良知就是祖師西來大意因此有的就高唱東方聖人此心焉西方聖人此心焉好像儒佛融通起來其實儒門大師即使翻過語録用過存養功夫那一位是確認三世因果的那一位從緣起的流轉還滅中求正見的那一位體見一切衆生平等的根本都沒有三世因果決定的法住智必然是漂流於佛法的門外理學大師都不能贊同佛法而要以拒楊墨的態度來排斥佛老為什麼就是於佛法沒有正見不知佛法的涅槃智是依緣起因果的法住智而進修得來所以如以為只要談心説性或者説什麼絶對精神之類以為就是最高的佛法那真是誤入歧途自甘沈淪了正思向於厭向離欲及滅無漏的八正道支是同時成就的但在修習過程中有次第引生的意義從先後的引生來説正見以後是正思惟是對正見所見的作更深入的正確思惟正見可説是從聞或從佛及佛弟子聞或從經典聞而來的慧學正思惟是從慎思明辨而來的慧學有正見的一定成就正信有信的一定有要求實現的意向所以從正見而來的正思是引發了向解脫的真實欲求也就因此古譯正思惟作正志或正欲從無常的正見中引發正思就向於厭衆生對於自我及世界是熱戀著的正思的向於厭就是看到一切是無常是苦而對於名利權勢恩怨等放得下這是從深信因果中來的所以厭於世間卻勇於為善勇於求真而不像一般頽廢的灰色人生觀什麼也懶得做從無我的正思中向於離欲於五欲及性欲能不致染著如聽到美妙的歌聲聽來未始不好聽可是秋風過耳不曾動情歌聲終了也不再憶戀如手足在空中運動一樣毫無礙著從涅槃寂靜的正思中向於滅心向涅槃而行道一切以此為目標這三者表示了內心的從世間而向解脫也就是真正的出離心出離心貫徹了解脫道八正道的始終不過正見著重於知厭知離欲知滅而已以下六支都是向此而修習的正語業及命淨戒以為性正見與正思是慧學依於正思的要求實踐必然的引發正語正業及正命三正道支正語是不妄語不兩舌不惡口不綺語合法的語言文字正業指不殺不盜不淫合法的身業正命是合法的經濟生活有正確的見地進求解脫生死一定會表現出合法的行為這三者都是以清淨的戒學為體性的在家弟子的正命是要有合法的職