住入菩薩位頂位乙發心成佛轉法輪初地丙發心般若相應成熟衆生莊嚴佛土地上一如乘羊而行的發心前進走了很久時間有的還是不能到如説菩薩發大心魚子菴樹華三事因時多成果時甚少這也許是最一般的根性了二如乘馬經説如乘象而行的或修三大阿僧祇劫或者百大阿僧祇劫才能得阿耨多羅三藐三菩提三如乘神通行的其中又有三類甲經説如乘日月神通而行龍樹又分為二類有的初發心就上菩薩位有的多少修行就上菩薩位菩薩位雖有多種解説然依般若經説是頂位再不墮惡道下賤家二乘地了如約華嚴經的行位説是發心住乙經説如聲聞神通行初發心就成大菩提八相成道初地分證能於百佛世界現身八相成道丙經説如如來神通行初發心就般若相應成熟衆生莊嚴佛土這是方便道菩薩初地以上到八地這可見初發心就圓滿成佛這是怎麼也不會的但發心就入初地證阿耨多羅三藐三菩提是有的還有更高的初發心就自利圓滿以方便道度衆生了第二類或修三大阿僧祇劫圓滿菩提是漸機釋迦佛就是這樣的根機後三類是頓入的利根但是希有難得的為什麼根機有漸有頓成佛有遲有速問題在發心以前的準備不同一是先世福德因緣薄而復鈍根心不堅固難怪發心以來久久都不能達到目的如從來不曾修學就發心去應考一樣二是前世少有福德利根這如學歷差些但在長期的服務中經驗豐富只要不斷學習每年應考就有録取的機會三是世世已來常好真實惡於欺誑是菩薩亦利根堅心久集無量福德智慧這才初發菩提心就能直登高位這如學歷高研究深一考就中所以學佛的最好不談頓哪漸哪這都是空話最好是問問自己的準備如何現代的中國佛教界思想怪僻得很不曾考慮自己福德因緣怎樣根機怎樣福慧資糧怎樣發心學佛非頓入不可非立即成佛不可不問自己不問自己的發心卻以為這是大法這個法門成佛容易這如不問自己的學歷及經歷只想競選總統一下子就位居元首一樣還有些人更可笑了承認自己的根機鈍業障重智慧淺卻以為非修容易成佛的法門不可這些思想都與正法不相應真正想發心而學佛的應從集資糧成利根心志堅固去努力修學不問頓漸更不問什麼時候成佛但知耕耘才是菩薩的正常道三僧祇劫滿登於妙覺地修行到三大阿僧祇劫的功德圓滿就從菩薩地而進登妙覺地佛地佛的大菩提稱為無上正等正覺正也譯為妙所以佛果是等覺又妙覺從初地以來到第八地菩薩斷盡了三界的煩惱障而習氣所知障從初地以上一分分的除去約心境説習氣是由於戲論相的顯現於法不能得無礙知見有愚昧的意義也因為無始來的煩惱慣習煩惱障雖斷了而還有煩惱的氣息這些習氣聲聞稱之為不染污無知大乘是染污的無明住地這些習氣由於無相智的進修達到不現愈來愈薄法空性也愈來愈明淨等到盡淨銷融智慧也能更悠久更廣大更深細的了達一切到終了時淨治了於一切所知境界極微細著愚癡及極微細礙愚癡及彼麁重這才究竟圓滿成佛永無障一切相不顯現最清淨真實顯現也就是最清淨法界顯現般若經説一念相應妙慧斷一切煩惱習氣而成佛發心修學到此才真正是功德圓滿了佛身最寂滅平等無分別如彼摩尼珠妙用利群生敘讚佛地功德略依三身一佛自性身也叫法身是與一切佛法相應的一切佛法所依止的法身約圓滿覺證説是出離了煩惱藏所顯的最清淨法空性圓明自在究竟無上從菩薩地修行以來到達了永離諸障一切相不現行所以最為寂滅約佛與佛説平等平等從佛而觀一切依正生佛人法智如一切一切都是平等的法空性無分別菩提也無分別所以説如如如如智是名法身法身的如智不可分別如寶珠與寶珠的光明不能分別為二一樣經論中用種種的詞句形容讚歎佛身都不過倣佛而已約利他功德説如摩尼寶珠一樣有微妙的神用能利益一切衆生摩尼珠就是如意珠能適應衆生的需求出種種的寶物滿足衆生的心寶珠並沒有思惟也不起加行功用只是自然如此佛果的利益衆生也是這樣法性所流身念念現一切佛事菩薩事二乘衆生事三世盡十方依正悉無礙於一現一切一切入於一二佛的法性所流身或稱法性所生身就是平常所説的報身在很多大乘經裡法身與法性所流身並沒有嚴格的分別二身説只是約大菩薩所見的顯現無邊功德的莊嚴相所以又從法身中別出這報身這是因契證法性而有的功德身流是流類等流無邊的功德莊嚴都是法性的等流如光與熱為太陽的等流一樣功德圓滿的法性所流身現在略為解説法性所流身是念念顯現一切的一切是什麼呢如佛事如佛身的功德相好佛土的清淨莊嚴佛的法會圓滿佛的音聲遍布佛的壽命無量佛的智慧神通利益衆生八相成道等菩薩事如初發心受菩薩戒行六度四攝遍遊十方世界親近供養十方諸佛聞持十方佛説法度一切衆生種種難行苦行種種本生等二乘事如聲聞與緣覺的初心修行住阿蘭若行頭陀行遊化人間入涅槃等衆生事六道衆生有種種住處種種名字種種形態各式各樣的生活各式各樣的苦難等這四類就是十法界凡聖的事還有三世事約時間説前生今生後生一念無量劫等盡十方事約空間説十方的無量無數不可説不可説世界或大或小或正或側或苦或樂山河大地草木叢林等這一切不外乎依報器世界正報衆生與佛這一切有各式各樣的事從一念到無量無數不可説不可説劫從一微塵到十方無量無邊不可説不可説世界無限時空中的無限依事正事在念念中顯現都是無礙的因為法性所流身遍一切處無處不在也就無一法而不在法性所流身中法性所流身是無差別的盡虛空遍法界等真如的所以不離法性所流身的一切也展轉無礙而無二無別隨舉一點都是顯現一切那一切也就是入於一了古代天臺與賢首宗師都曾擬出了重重無盡的境界這如華嚴經廣説十力四無畏十八不共法大悲三不護妙智佛功德清淨圓滿的法身與一切功德相應但約證法性而成就佛功德來説為法性所流身所攝佛的果德難以思量或説一百四十不共功德等現在舉幾項共知的來説一佛有十力德以降伏魔外的勝能而安立十力是處非處智力業異熟智力靜慮解脫等持等至智力根勝劣智力種種勝解智力種種界智力遍趣行智力宿住隨念智力死生智力漏盡智力二又有四無所畏德表示自利他利的絶對自信四無所畏是説一切智無所畏説漏盡無所畏説盡苦道無所畏説障道無所畏三又有十八佛不共法德約不共凡夫小乘而立十八佛不共法是身無失語無失念無失無異想無不定心無不知已捨欲無減精進無減念無減慧無減解脫無減解脫知見無減智知過去無著無礙智知未來無著無礙智知現在無著無礙身業隨智慧行語業隨智慧行意業隨智慧行四又有大悲德五三不護德三不護是如來的三業清淨現行決無過失不用怕人知而藏護自己六妙智德就是如來的無師智自然智一切智一切種智等這些佛功德都是最清淨最圓滿的佛住於淨土十八事圓滿與諸菩薩衆受用於法樂法性所流身佛是一定住於淨土的但這是遍法界土以十八事圓滿來表顯的不可説東方西方多大多小的這圓滿淨土如佛地經解深密經序品説薄伽梵住最勝光曜七寶莊嚴放大光明普照一切無邊世界無量方所妙飾間列周圓無際其量難測超過三界所行之處勝出世間善根所起最極自在淨識為相如來所都諸大菩薩衆所雲集無量天龍人非人等常所翼從廣大法味喜樂所持作諸衆生一切義利滅諸煩惱災橫纏垢遠離衆魔過諸莊嚴如來莊嚴之所依處大念慧行以為遊路大止妙觀以為所乘大空無相無願解脫為所入門無量功德衆所莊嚴大寶花王衆所建立大宮殿中這一段淨土的敘述中有十八圓滿一顯色圓滿二形色圓滿三分量圓滿四方所圓滿五因圓滿六果圓滿七主圓滿八輔翼圓滿九眷屬圓滿十任持圓滿十一事業圓滿十二攝益圓滿十三無畏圓滿十四住處圓滿十五路圓滿十六乘圓滿十七門圓滿十八依持圓滿十八圓滿淨土的佛是法性所流身又可分為二約佛説又名自受用身約大菩薩所見來説又名他受用身為什麼叫受用呢如前任持圓滿説廣大法味喜樂所持佛住在淨土中自受用法樂而為大菩薩説法菩薩們也就受用法樂在這圓滿的淨土中法喜充滿所以説佛與諸菩薩衆都在淨土裡受用大乘微妙的法樂諸法真實義及證真實慧無變異差別是故無別乘住於圓滿淨土的法性所流身為大菩薩説法是五乘三乘還是一乘呢當然是一乘法佛是覺者以大菩提為體性一切自利利他都以覺為本佛出世説法的大事因緣就是要人開示悟入佛之知見大菩提所以佛法是以覺證為宗本的説到覺證分別來説所證的諸法真實義是離妄想的法空性衆生以為真實的都是自性見戲論相法無性空才是一切法的真相所以經上説諸法無所有性是諸法自性在這真實義中沒有差別可説就是我空性與法空性也是如草火與炭火一樣雖所燒不同而火性並沒有差別能證真實義的智慧呢一得永得得到了就不會失去無為般若依無漏習氣而顯發不是剎那生滅法所以這所證真如與能證的正智都是無變異的真如雖在纏而還是這樣離垢清淨也還是這樣沒有變異正智是法性相應的無為功德也沒有變異這都是無差別的如與智也只是依世俗而安立而在現覺中沒有如與智的對立佛法的真實是這樣沒有變異沒有分別這那裡還有五乘三乘呢故佛為大菩薩開示大法無有別乘唯是一道一清淨的一佛乘雖然菩薩要知權知實所以於一乘説無量乘但在菩薩法中一切都歸於一佛得不動身悲願化三有示淨或示穢咸令入涅槃三化身化身是為地前菩薩二乘凡夫而現起的佛身依法身而起法性所流身如依太陽而有光與熱光與熱遍一切處但不能離於太陽化身卻不同了如水中的月影一樣只是經水的反映而現起月的影子法身佛是常住的沒有來去也沒有出沒所以説得不動身但由悲願所熏發為了化度三有衆生能無功用地現起化身有來有去有生有沒如長者入火宅那樣化身的化導衆生示現的佛身有高大身千丈百丈或者丈六身示現的壽命或千劫百劫或八十歲示現的國土或是淨土或示現穢土雖然圓滿報土遍一切處只要衆生的智慧增進什麼地方當下就是圓滿的淨土如娑婆世界是穢土但在螺髻梵王看來是寶莊嚴淨土如極樂世界也是化土但依往生淨土論説如圓修五門成就智慧慈悲方便回向功德成就也就能入圓滿報土但約適應部分衆生的善根成熟而現起來説凡國土而可説東方西方南方北方的佛壽與佛身的長短可説有限量的都是化身化土化身佛為什麼示現這些差別呢因衆生根性不同有的應以苦切語三惡道是這樣的苦衆生界是這樣的苦能因此發心修行這是折伏門有的應以愛語這麼清淨那麼自在就肯發心修行這是攝受門化身佛就是以這折攝二門來成就衆生的隨機適應如藥能治病就是妙藥所以不應該生優劣想如釋迦佛出穢土彌勒佛出淨土佛法並沒有什麼差別又如穢土修行不容易佛勸人往生淨土容易成就但維摩詰經無量壽佛經卻説穢土修行一日勝於在淨土修行百歲穢土比淨土修行更容易又如經中釋迦佛讚歎淨土使大衆羡慕而淨土菩薩來參加釋迦佛的法會淨土佛總是告誡大衆不要生輕慢心所以這是佛的悲願應化三界衆生的二大方便目的都是令入涅槃出離生死同歸佛道為除衆疲乏化作可愛城終示真實相故唯一佛乘化身佛的説法是不盡一致的有的佛土雜説五乘三乘法有出家與在家有的但説一乘法沒有出家衆有的佛也不現出家相的傳説天王佛如此有的説三乘而終歸於一乘法的有的説三乘法因為聽衆的根機不成熟沒有説一乘而佛就入了涅槃傳説多寶佛如此以釋迦佛應化娑婆世界而説法來説起初説三乘法末後才會歸一乘佛在法華經中開示這為實施權開權顯實的教化歷程説有些發了菩提心的但在生死道長衆生性多的情形下忘失了退失了像這類根性越是給他説佛道的高深偉大越是不敢修學所以佛設方便説有聲聞與緣覺乘容易修行容易了生死又快又好能得究竟的解脫大家這才發心修學了這如商隊遠行經不起長途跋涉的疲勞有的不願前進商主為了解除大衆的疲乏免得大衆退回所以方便化作可愛的城市向大衆宣告經商的目的地到了就在前面大家這才鼓起勇氣前進在都市中衣食起居一切都得了滿足等到大衆休息一番疲勞恢復了商主這才對大衆説這是化城真正的目的地寶城還在前面大衆精神飽滿再向目的地前進這如佛等弟子依法修行證了阿羅漢果終於又説明二乘是方便的開示為令衆生悟入佛之知見的真實相故佛雖説三乘其實唯一佛乘唯有佛是大涅槃二乘的涅槃也不是真實的佛説一乘經論中雖約種種的意義説然總不外乎如實道無二無別所以終歸於一極一切諸善法同歸於佛道所有衆生類究竟得成佛從一佛乘的立場來説一切諸善法都是同歸於佛道的不但是出世的三乘善法歸於佛道就是人乘天乘善法世間的一切一念善心一毫善行都是會歸於佛道的所以佛法是善法的別名到底什麼是善法向於法的順於法的與法相應的就是善就是佛法所以凡隨順或契合緣起法性空的無論是心念對人應事沒有不是善的因此善的也叫法不善的叫做非法有些論師於法起自性見這才説這是有漏善法這是無漏善法這是二乘善法這是佛善法隨衆生的情執來分別善法就被分割為不同的性類雖然現實衆生界確是這樣的但約契理來説就不是這樣善法就是善法善法所以有有漏的無漏的那是與漏相應或不相應而已如加以分析有漏善是善與煩惱的雜糅如離煩惱就是無漏善了所以古代有善不受報的名論衆生的流轉生死是由於煩惱及業生人及天並不由於善法而是與善法相雜的煩惱一切衆生初一念識異木石生得善生得惡生來都是有善的所以都有向上向樂向光明的趣向不過沒有以佛道為宗時就演成種種歧途種種外道生人生天如一旦發見究竟目標歸心於佛乘時這一切都是成佛的方便所以向佛一舉手一低頭一稱南無佛皆已成佛道這如民族而缺乏賢明領袖沒有正確國策雖人民還是那樣的人民也還是想求進步而結果往往走入歧途國計民生都很不理想如有賢明領袖提示完善政策大家向這而集中力量齊一步伐就會進入理想的時代一樣所以一切衆生類不是沒有善法而只是還沒有貫徹但有了善法向上向光明終究會向佛道而邁進的也就究竟要得成佛的一切衆生同成佛道是了義的究竟的所以修學佛法的應不廢一切善法攝一切善法同歸於佛道才是佛法的真實意趣末了謹祝讀者必當成佛
