就犯重應該是合於佛意的三殺生極重戒指殺人而説這包括自己下手或派人去殺以及墮落胎兒等這在五戒十戒中也一樣是禁止的四大妄語是妄語中最嚴重的如沒有證悟的而自稱證悟沒有神通的而自説有神通或者妄説見神見鬼誘惑信衆或者互相標榜是賢是聖或者故意的表示神祕使人發生神聖的幻覺這都是破壞佛教正法毫無修學的誠意最嚴重的惡行犯了這四重戒就破壞失去了沙門的體性也就是失去了沙門出家人的資格沙門是梵語義譯為勤息是勤修道法息除惡行的意思如犯了這四重戒雖然出家已完全失去出家的資格了在佛制的僧團中如有人犯重就逐出僧團取消他的出家資格不但不是比丘連沙彌也不是犯重的是會墮落的不過如犯淫而當下發覺心生極大慚愧懇求不離僧團的仍許作沙彌受持比丘戒不過無論怎樣現生是不會得道成聖的了餘戒輕或重犯者勿覆藏出罪還清淨不悔得安樂除了不準懺悔的極重戒而外不容許懺悔而留在僧團內犯了其餘的戒或是輕的或是重的都應該如法懺悔輕與重也有好多類最輕的只要自己生慚愧心自己責備一番就得了有的要面對一比丘陳説自己的錯失才算清淨嚴重的要在二十位清淨比丘前懺悔才得出罪但總之是可以懺悔的應該懺悔的這裡有一要點就是犯戒者切勿覆藏自己的罪過懺悔意義是乞求容忍再將自己所有的過失發露出來如犯戒而又怕人知道故意隱藏在心裡這是再也沒法清淨了依佛法來説誰沒有過失或輕或重大家都是不免違犯的只要能生慚愧心肯懺悔就好了這正如儒家所説的過則勿憚改凡是犯戒而又覆藏的過失是越來越重一般人起初每是小小的過失犯而不懺悔就會繼續違犯下去久了就會恬不知恥的犯極重戒舉喻説如甕中藏有穢物毒素如把它倒出來暴露在日光下很快就清淨了如蓋得緊緊的生怕穢氣外泄那不但不會清淨而且是越久越臭所以佛制戒律對於犯重罪而又覆藏的給豫加重的處分同時凡有慚愧心慈悲心的比丘見到同學師長弟子們犯罪應好好的勸他懺悔如不聽就公開的舉發出來但也要在適當的時候這才是助人為善才能保持僧團的清淨在僧團中切勿互相隱藏而誤以為是團結的美德懺悔佛制是有一定方法的如依法懺悔了就名為出罪像服滿了刑罪一樣出了罪就還復戒體的清淨回復清淨的僧格凡是出罪得清淨的同道們再不得舊案重翻譏諷評擊假使這樣做那是犯戒的關於懺悔而得清淨可有二種意義凡是違犯僧團一般規章的大抵是輕戒只要直心發露承認錯誤就沒有事了如屬於殺盜淫妄的流類並非説懺悔了就沒有罪業要知道犯成嚴重罪行的不但影響未來招感後果對於現生也有影響力能障礙為善的力量如一落入黑社會中就受到牽制不容易自拔一樣發露懺悔能消除罪業對於今生的影響真是昨死今生一樣從此過去的罪惡不再會障礙行善不致障礙定慧的熏修就可以證悟解脫這如新生一樣所以稱為清淨回復了清淨的僧格假使不知懺悔那惡業的影響心中如有了創傷一樣在深夜自思良心發現時總不免內心負疚熱惱追悔熱惱憂悔只是增加內心的苦痛成為修道為善的障礙所以一經懺悔大有無事不可告人言的心境當然是心地坦白不再為罪惡而憂悔也就自然能心得安樂了儒家説君子有過則人皆見之又説君子坦蕩蕩這都是心無積罪心安理得的氣象這才有勇於為善的力量出家衆的戒極為深細學者應研求廣律才知開遮持犯還出還淨的法門能持於淨戒三業咸清淨以下兩頌論意義也是在家弟子所應學習的但從事相來説是佛特別為出家弟子説的這是世間道向於出世離欲道的必備資糧著重在戒行為習定的方便在家出家的七衆弟子在修學世出世道中首先要安住淨戒以淨戒為根本凡能持於淨戒的身口意三業都能清淨這才能生能證世出世間的一切功德如遺教經説若人能持淨戒是則能有善法若無淨戒諸善功德皆不得生如約比丘比丘尼的具足戒來説那就要一守護所受的別解脫戒如犯了不可覆藏立刻生慚愧心如法懺悔二對佛制的軌則行住坐臥等威儀衣食等應守的規定尊敬師長護侍病人聽法修定等一切善行這些都要如法學習做到合於律的規定又適應世間才能不被社會的正人君子教內的高僧大德所呵責三不要到歌舞娼妓淫坊酒肆政治機關去走動因為這是容易生起不淨心行的地方四就是小小的罪也不可看為輕易而要謹嚴的護持能這樣受持學習就能安住於淨戒引生一切善功德了密護於根門飲食知節量勤修寤瑜伽依正知而住這包含了四項修法一密護於根門就是遺教經的制伏五根及制心六根眼耳鼻舌身意是認識的門路也是六識劫功德賊的入門所以叫根門五根是見色聞聲嗅香嘗味覺觸的意根是知一切法的為六根中最主要的在我們的日常生活中不外乎見色聞聲知法這可要嚴密的守護像看門人見到雞犬亂闖小偷等進來就加以拒絶或立刻驅逐出去一般人在見色聞聲等時總是取相合意的就取相而引生貪欲等不合意的就取相而引生瞋恨等不能控制自心跟著煩惱轉就會造業而墮落像牛的亂闖踏壞苗稼了所以在見色聞聲等時要密護根門這並不是不見色不聞聲而是在見了聞了時能制而不隨煩惱轉如見美色而不起淫意見錢財而不作非分想這要有正知正念才得對於外來的境界或內心的境界要能正確認識它的危險性是好是壞叫正知對於正知的時時警覺時時留意叫正念如沒有正知外境現前心隨煩惱轉認賊作父歡迎都來不及那怎麼能制伏劫功德賊呢如沒有正念時時忘失如小偷進門大箱小籠搬了走還呼呼的熟睡沒有發覺那怎能制伏呢能謹密的守護根門才能止惡才能惡法漸伏功德日增説修行在平常日用中要從這些地方著力二飲食知節量對於出家衆依賴施主依賴乞食而生活的這是特別重要的生在人間為生理所限制飲食是免不了的沒有便無法生活所以佛説一切衆生皆依食住但依賴施主而生活的應該思量到飲食是維持生活所必須的不可在美味上著想落下咽喉還有什麼美呢在家人為了物資的取得保存發生了種種的苦難戰爭原因也大半為了這個現在施主為了福德而施捨不應該好好修行報施主的恩德嗎所以飲食不是為了淫欲也不是為了肥壯勇健無病或者長生不老更不是為了面色紅潤端嚴只是為了生存為了維持短暫的生存就是維持營養的需要不致因飢渴疾病而苦惱身心有力才能修行出離生死如不知節量貪求無厭不但專在身體上著想滋味上著想對施主也會起顛倒心生嫌恨心多生煩惱多作惡業在家人對於經濟生活尚且要知節量何況依施主而生活的出家人呢三勤修寤瑜伽這是有關睡眠的修持法為了休養身心保持身心的健康睡眠是必要的依佛制初夜以六時天黑夜分十二小時計初夜是下午六時到十時後夜上午二時到六時出家弟子都應過著經行及靜坐的生活中夜下午十時到上午二時是應該睡眠的但應勤修覺寤瑜伽換言之連睡眠也還在修習善行的境界中睡眠時間到了先洗洗足然後如法而臥身體要右脅而臥把左足疊在右足上這叫做獅子臥法是最有益於身心的在睡眠時應作光明想修習純熟了連睡夢中也是一片光明這就不會過分的昏沈不但容易醒覺也不會作夢作夢也不起煩惱會念佛念法念僧等到將要睡熟時要保持警覺要求在睡夢中仍然努力進修善法這樣的睡眠慣習了對身心的休養最為有效而且不會亂夢顛倒不會懶惰而貪睡眠的佚樂佛制中夜是應該睡眠而將息身心的頭陀行有常坐不臥的俗稱不倒單其實是不臥並非沒有睡眠只是充分保持警覺而已遺教經説中夜誦經以自消息無以睡眠因緣令一生空過然依一切經論開示中夜是應該睡眠將息的在初夜靜坐時如有昏沈現象就應該起來經行如還要昏睡可以用冷水洗面誦讀經典所以不可誤會為中夜都要誦經整夜都不睡眠這也許譯文過簡而有了語病把初夜後夜誦經譯在中夜裡或者誦經以自消息就是睡眠時聞思修習純熟了的法義的正念不忘四依正知而住出家人在一般生活中無論是往或還來無意的睹見或有意的瞻視手臂支節的屈或伸對衣鉢的受持保護飲食行住坐臥覺寤語默解勞睡等都要保持正知在每一生活動作中知道自己在做什麼應該做不應該做適當或是不適當的時候做得好不好總之在這些事情中能事事正知就不會落入錯誤過失中去知足心遠離順於解脫乘修學出世道的要能夠隨遇而安不可多求多欲俗語也説人到無求品自高對衣服飲食醫藥日常用品隨緣所得的就要知足不但多得了心意滿足就是少得了或者得到的不太合意也能知足能這樣煩惱就少了心也安了容易修行人不能離群有群就有人事如歡喜談話歡喜事務歡喜人多就障礙遠離有的整天忙碌碌的在事務上轉有的與人聚談言不及義整天説些王論賊論食論飲論妙衣服論淫女巷論諸國土論大人傳論世間傳論大海傳論總之這都是增長愛染不能身心遠離在靜處修行的所以要心遠離不歡喜世論世業才能專心佛法説到遠離一般是遠離群聚住在清淨處或者一個人住獨住如閉關就是這一作風但主要還是心遠離心不能遠離住茅蓬閉關都是徒然過去大陸上常見閉關的有些精神失常有的託名病緣中途出關這都由於心不遠離過不了安靜修行的生活這怎麼能解脫生死呢所以對物欲要知足對人事要心遠離這才能順於解脫的三乘法門能趣向出世解脫的道果此能淨尸羅亦是定方便這是結前起後現在要從戒增上學説到心定增上學了上面所説的密護根門飲食知量覺寤瑜伽正知而住知足遠離都是能淨尸羅的能這樣去行戒學一定會如法清淨雖然戒以殺盜淫妄為根本但如在日常生活中貪求飲食貪樂睡眠不能守護根門不能自知所行對物欲不滿足對人事不遠離那一定會煩惱多犯戒作惡所以佛制戒律不但嚴持性戒並且涉及日常生活團體軌則舉止威儀將一切生活納入於如法的軌範犯戒的因緣自然就少了犯戒的因緣現前也就能立刻警覺防護了這樣自然能做到戒法清淨所以説到戒學切勿輕視這些飲食等日常生活以為無關緊要才是這樣的戒學清淨也就是定學的方便這是修定所必備的基礎也可説是修定的準備工作經上説戒淨便得無熱惱追悔無悔故歡歡故生喜由心喜故身得輕安身輕安故便受勝樂樂故心定這因為持戒清淨的一定心安理得自然能隨順趣入定學如從日常生活的如法來説不會貪求滋味飲食過量不會貪著睡眠終日昏昏的隨時能防護根門正知所行這都就是去除定障所以戒清淨的寢安覺安遠離一切身心熱惱無諸怖畏心離驚恐身心一直在安靜中如加修定學自然就順理成章易修易成一般人只是愛慕禪定功德卻不知從持戒學起不知道自己的身心一直在煩動惱亂中如狂風駭浪一樣就想憑盤腿子閉眼睛數氣息等一下子壓伏下去這就難怪不容易得定了就使有一些定力由於戒行不淨意欲動機等不正也就成為邪定結果是為邪魔非人所嬈亂自害害人進修於定學離五欲五蓋為了修定而持戒叫做增上戒學那麼戒學清淨當然要依戒而進修於定學了首先要肯定