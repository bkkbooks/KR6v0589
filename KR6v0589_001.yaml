脅無恐怖的和樂與自由如持不殺戒的不是不殺甲不殺乙或今天不殺明天不殺而是從今以後於一切衆生離殺害心持不殺戒的什麼時候誰也不會對他有被殺害的威脅與怖畏了這是約律儀戒説就有積極的利生意義能這樣才能説得上攝善法戒饒益衆生戒失戒衆患本惡趣亦貧困持戒三善本增上決定勝為他淨尸羅則入於大乘為什麼不能受持淨戒因為不知道犯戒的過失持戒的功德重戒性戒不問有沒有受戒犯了都是罪惡的所以有的聽了犯戒的過失而不敢受戒極為可笑實際上外依三寶的加持內發深切的誓願而受戒是更能做到清淨不犯的從違犯而失戒的過失來説這是衆患的根本主要是墮落三惡趣及受貧困的果報平常説慳吝不捨得貧窮報犯戒得墮落惡趣報這是約特殊的意義説生在鬼畜有墮落而受福報的在人中有貧苦不堪的這是施與戒的不同果報如犯重戒而墮地獄一定貧乏得什麼都沒有如持世間上品淨戒而生天一定是非常富樂的可見犯戒也是貧乏因持戒也是富樂因了要知道專知私德而潔身自好的如不布施才會生人而得貧乏報如與慈心相應而持戒充分表現積極利他的意義生天是一定能得富樂尊榮的從持戒的功德來説那是三善的根本三善是一以增上生心而持戒的能得增上生生人天而得富樂自在的果報二以出離心而持戒的能得決定勝果決定是證得聖果勝法的一得永得決定不再退墮生死三如以菩提心持戒為利樂他而持清淨的尸羅戒這就入於大乘名大乘戒為成佛的因所以優婆塞戒也好沙彌戒也好比丘戒也好七衆的別解脫戒從菩提心出發而受持的就是菩薩的別解脫律儀有人以為七衆別解脫戒是小乘的我是大乘學人所以不用受持聲聞的別解脫戒有人聽到持戒就以為是小乘這是大邪見為佛教衰落與混亂的原因受持淨戒者如護於浮囊不輕於毀犯持犯俱不著受持淨戒而又毀犯不是環境的誘惑力太強就是煩惱的衝動力太強但重要的還是自己淨戒的力量太弱否則如城防堅固的雖有強大的敵人來侵襲也能堅持而不致陷落的所以護持淨戒而使戒力增強是重要的修習沒有犯重戒以前一般總是忽視輕微的過失而不知這是大失敗的遠因如涓滴不塞會造成堤防的潰決一樣舉不肉食來為例如素食成了習慣內心有對肉食腥臊的厭惡心這是不容易犯的如本沒有不肉食的決心或者會想到肉食而生快感那雖然素食很久了由於戒力的羸弱不堪還是容易破戒的如持戒而時有微小的違犯不知道警覺不知道懺悔而使淨戒清淨積小成大就隨時有犯重的危險了所以戒經有如護浮囊的比喻浮囊是遊水所依而不致沈沒的如現代的橡皮圈這應該特別珍惜愛護它如小小泄氣不知道補救一定會滲水而有滅頂的危險菩薩在未得忍力以前在生死大海中常願生在人間見佛聞法利益衆生淨戒就是確保人身而不致失敗墮落的浮囊所以菩薩的受持淨戒輕重等護比聲聞人的持戒還要謹嚴得多菩薩淨戒是不離三心而修的所以菩薩雖自己嚴持淨戒而決不輕視毀犯戒法的衆生從大悲心來説這是可憐憫而不是可輕視的雖然犯戒不是不可能還復清淨不是不可能成佛的凡輕視毀犯的一定是自以為持戒自己是怎樣的清淨如法不知道這早落在我執我慢的分別心中不成菩薩的戒波羅蜜多了而且如輕視毀犯由於意識上的對立不容易教化他也就失去菩薩利他的方便倒不如不輕毀犯憐愍而安慰他容易把他感化過來所以菩薩的淨戒是無所得的空慧為方便對於持戒犯戒都是不著相的能達持戒犯戒不可得故就是三輪體空的淨戒波羅蜜多了其餘如上面菩薩學處中説攝護於衆生菩薩修忍度耐怨安受苦及諦察法忍再説忍度菩薩行是為了成佛成佛一定要攝化衆生護念衆生修集攝受衆生的布施護念衆生的淨戒才能利益衆生而後成佛但衆生是愚昧的可能會給豫布施而不知感恩或反而相仇害的護念衆生而持戒衆生卻偏要來嬈害的如不能堅忍施與戒的功德都是會因而破壞的世間尚且要相忍為國小不忍則亂大謀何況在無量生死中度衆生而成佛的大事那有不修忍而能成就呢所以菩薩非修忍度不可而忍成為菩薩的大行之一了忍是忍耐忍辱不過是忍的最重要的一項忍是意志堅定經得起打擊受得了磨難不問怎樣艱苦都能保持自己不受外來的影響而改變宗旨或者引生罪過從前舍利弗六十劫修菩薩行有人來乞求眼睛舍利弗對他説這並無用處他卻一定要乞化等到給了他他又嫌它腥臊丟在地上很不滿意的走了舍利弗覺得衆生難度因此退了大心這就是不能忍而失敗的一例忍分為三類一耐怨害忍如有怨仇來損害或是刀杖傷害或是挾怨誣害或者是惡意誹毀因而損害名譽利養這是一般人最難忍受的菩薩應修安忍憐憫對方覺得他為煩惱所驅迫為惡勢力所轉動忍受怨敵的傷害而不生瞋忿不加報復二安受苦忍苦是各式各樣的有從外界的無情物來的如風雨寒熱等苦有從外界的有情來的如蛇蠍蚊蝨等苦有從自身發生的就是出家乞食遊化修行也都是會引生苦痛的這都要磨練心志安心忍受不能忍那不是引起煩惱罪惡就是障礙自己的修行三諦察法忍法是佛法審細諦察而悟入佛法忍是安心入理的意思如浮光掠影不能安心深入就不能獲得深廣的法益了瞋他有何益自他增憂苦瞋火燒善根忍則五德具受到名譽財産事業身體的損害是一般人所最難忍的所以特再為開示受人損害時會引起瞋忿的反應取敵視反抗報復的行動這確是凡夫的本性但在人類德性的進展中尤其是通達甚深法義忍就被發現而尊重起來因為如不忍而瞋他向他報復這到底有何利益呢這真是不必要的要知自身的失敗決不單是為了他人的損害破壞主要還在自身的不健全換言之自己才能損害自己古人説君子有終身之憂而無一日之患眼前的受損害受冤屈在自己如法的進修中沒有不被了解而恢復的唯有自己不向上到死而德業無成才是可憂慮的依佛法不要説一日之患就是一生的冤抑屈辱犧牲在無盡的生死過程中這算得什麼唯有不能趣向佛道永遠在生死中頭出頭沒才是可悲哀呢所以不應該瞋忿報復而應該安忍而且向怨敵瞋忿報復並不就是恢復已受的損害不忍而瞋忿報復徒然使自己與他人增長種種的憂苦向他報復他當然受到憂苦而自己瞋心發作身心煩躁不安有時會不顧一切造成更大的錯誤招致更大的損害以怨報怨這是不能解決問題的所以説不可怨以怨終已得休息行忍得息怨此名如來法修集布施持戒好不容易但由於一念的不忍瞋忿心發全部都被摧壞了如説若有瞋恚諸佛子百劫所修施戒善一剎那頃能頓壞所以形容瞋是火一樣的能焚燒一切功德善根非下決心修忍不可假使能知道瞋恚的過失安忍的功德多多的考察自會以理智來制伏瞋忿煩惱那麼瞋恚有什麼過失呢一壞色瞋心一起全身血脈沸騰面色會立刻變成醜惡的樣子研究美容學的説如人而多起瞋怒面貌是很快的衰老了二失辨瞋心一起情感壓倒了理智有的連對方説話的意義都聽不明白衝動緊張當然失掉了論辨的才力為自己申訴有時也會説錯了三善士遠離凡性情暴躁多起瞋忿的人良善的朋友都會為了不值得結怨而離去的四毀戒瞋忿發作只圖達到報復目的什麼都顧不得了殺盜淫妄無惡不作五墮落這樣的積集瞋業一旦老死到來還有什麼善報只有墮落惡趣的一路了一念的不忍産生這樣的惡果怎可不加以制伏反之如能忍怨那麼相貌端嚴辨才明晰善友共聚不犯禁戒死後上升而向佛道五德都具足了在五乘共法中雖也有忍但真能難忍能忍就只有菩薩行了施戒及安忍多為在家説廣聚福資糧是佛色身因上面所説的布施淨戒安忍三度現在要綜合的敘述一下也就説明了六度為成佛所必修的法門這有三個意義一出家人的修持重心是禪慧熏修所以這三度雖也是出家人所修的但在經中佛大多是為在家人説的尤其是財物的布施為在家弟子的要行出家人僅可隨分行施如像在家人那樣積聚財物來作種種布施就會過失叢生非佛制所許可了二佛是福德與智慧圓滿被稱為兩足尊的福慧圓滿的佛果從修集福慧的因行而來如遠行一樣要備足資糧旅費糧食等才能到達目的菩薩久劫修行而成佛福慧就是成佛的資糧前三度在二資糧中是廣大積聚福德的資糧為成佛必備的勝行三説到佛經中有四身三身二身等分別扼要的可分為法身與色身大菩提的圓證法界體現絶對真理而成佛是法身佛的相好莊嚴是色身色身是無邊福德所莊嚴的所以前三度是佛的色身因緣知道了前三度的特性如此後三度是多為出家人説的是智慧資糧是佛的法身因緣也就可以知道不必再説的了佛説精進度福智之資糧無厭心如海力盡而不止現在要説到精進度精進是能普遍策發一切善行的與一切功德相應所以在福智二資糧中雖説精進是屬於智資糧而實佛説精進度是通於福智二資糧的三乘共法中已説到正精進大乘的精進有著更深遠的意義修菩薩行是以無盡的法界為境的親近供養一切佛聞持修習一切法莊嚴一切國土度脫一切衆生斷盡一切煩惱圓滿一切功德窮虛空遍法界什麼都是一切的一切心量的廣大真可説是虛空一樣的廣大大海一樣的淵深這樣的大願大行大果如沒有無限的精進是不能成就的所以菩薩的精進度應有無厭足的心量求一切佛法而不滿足證得功德而不得少為足如海一樣的吞納百川無窮無盡的進趣唯有這樣的無厭足心才能發為大乘的精進因此一大乘的精進度不是有限的精進如農夫下田某甲盡力收穫得到了一些就回家去休息享受某乙也盡力收穫要收割圓滿了才告一段落在工作的努力方面也許某甲更緊張然而某甲到底是工作的懶惰者某乙才是精進的這樣聲聞的急求自了如喪考妣在大乘法中不能説是真精進二精進是持之以恆而不是不自量力的急進如二人上山一人急急的跑不到半路心跳足酸只好停止而退下來一人是大踏步前進不是急進的但能保持體力而不休息的這樣才能登上高山總之無厭足的不休止的善行才是大乘的精進在修學的進程中有時會山窮水盡無法再進有的就中止退失了但是菩薩的精進現有的體力智力財力能力力量雖是可盡的而內心的無限精進卻是永不停止的古人説哀莫大於心死承認失敗放棄努力是真正的失敗了故事説有旅客在山中前進被山鬼障住了路旅客舉左手去打他可是左手被捉住了再用右手左足右足末了用頭去撞他頭又被鬼縛住了山鬼説好勇敢的旅客你現在還有什麼能耐呢旅客説我的心將永遠不受束縛而要求前進山鬼佩服他的膽量與毅力就讓路而讓他過去在修菩薩行的歷程中如由於力量不足而無法進行時也應這樣的保持那前進的決心推延著世樂自輕心怯弱對於大乘佛法不能精進修學不出於二種障一不想進修二不敢進修佛道有這樣的功德為什麼不想進修呢不是推延懈怠就是染著世樂有的懈怠成性什麼好事都不能努力去做總是推延又推延今天推明天今年等明年這樣根機是難得猛進的如能多多憶念人命在呼吸間死亡是不分老年與少年的人身難得多念無常才能警策修行有些是貪染世間樂事專在聲色貨利中過日忙得不亦樂乎這也就不想進修佛道如能思察世樂的不究竟多引起未來的苦果如刀頭蜜一樣減少世樂的貪染就會進修法利了為什麼不敢進修呢因為自己輕視自己覺得現在是末法時代自己是根鈍障重深廣無邊的佛道實在無法成功這樣的心生怯弱就不敢承當下來當然不會精進的修學了這類心性怯弱衆生容易退取小乘走那迂回的路子滿果亦難行久處於生死資糧廣無邊練心勿退屈心性怯弱不敢進修深廣圓滿的大乘佛道每從三方面怯弱退屈下來一聽説圓滿的佛果是永盡一切過失圓滿一切功德的就自己覺得不行我怎能得到那麼圓滿的佛果呢這就退屈下來了應該想十方無量數菩薩都能修行圓滿而成佛我為什麼不能所以説彼既丈夫我亦爾不應自輕而退屈從前曾經墮惡道的現在已經成佛現在在惡道中的將來也要成佛惡道衆生都會成佛自己現在難得的生在人間能知道正理能奉行善行為什麼反而怕不能成佛呢二聽説菩薩要修難行苦行施捨手足頭目等覺得太難太苦自己做不到就不敢進修而退屈了這也不對從無量世以來每墮落在惡道中説不盡的苦都受了為什麼為佛道而修行反而怕起苦來如長病痛苦不堪受一次手術就能徹底治療因受手術而來的小苦難道都不能忍受嗎況且菩薩的難行與外道的苦行不同菩薩修行有方便善巧次第學習忍力成就悲心增勝有利益時才施捨身分並非專以受苦為修道的三聽説菩薩修行要長久的處在生死海中度衆生時間這樣的長要積集的資糧又那麼的廣大無邊覺得自己修不了也就不敢進修了這是更不應該的菩薩能通達生死如幻才能長在生死中度衆生並非長在生死中墮落受苦而且無邊資糧是無邊的功德還會嫌多嗎誰會聽説財富多而怕計算的麻煩呢對這些如由於心性怯弱而有退屈心應以上面的理論多多訓練自心讓自心堅強起來精進的荷擔佛道而勿使退屈才是不過世間也有把成佛看得輕易的以為修習微少功德就會成佛這或是從怯弱懈怠中來或是不知天高地厚如初生犢兒不怕虎一樣如自以為然等到覺得不是這麼一回事也許要懊悔不及了怯弱下劣者希求易行道雖然一切衆生畢竟成佛但就現實的衆生性來説根機是種種不一的在發心向道的衆生中有是適宜於菩薩行的有與菩薩法是格格不相入的也有想學菩薩而不敢修的適宜於菩薩行的根性佛當然為説無上道了與菩薩心行格格不相入的是鄙劣怯弱的根性如法華經的窮子喻窮子回到故鄉望到財富無量的長者驚慌失措嚇得逃走都來不及對於這類根機不得不為説方便法門聲聞緣覺乘法漸漸的引攝化導他想修菩薩行而不敢修的知道羡慕佛果的究極圓滿但對於菩薩的廣大心行卻不敢擔當精進修行這也是怯弱衆生缺乏自信生怕退墮小乘或沈淪苦海對於這類衆生二乘方便是不適用的佛只有用特別的方便來化導了這類怯弱下劣的根性想成佛而不願修學菩薩的大行難行所以希望求一簡單易行而又迅速的方便道但這是不順菩薩的菩提願行的因為求成佛道是決無不修菩薩大行的道理這如龍樹菩薩十住毗婆沙論易行品説問曰是阿惟越致不退轉菩薩行諸難行久乃可得或墮聲聞辟支佛地若爾者是大衰患若諸佛所説有易行道疾得至阿惟越致地方便者願為説之龍樹答曰如汝所説是儜弱怯劣無有大心非是丈夫志幹之言也何以故若人發願欲求阿耨多羅三藐三菩提未得阿惟越致於其中間應不惜身命晝夜精進如救頭燃佛有勝方便攝護於初心希求簡易迅速的方便道雖缺乏大丈夫大丈夫即菩薩提婆菩薩有大丈夫論的志行但佛有無量善巧別説殊勝方便攝護怯劣的初發心學人使他不致退失信心趣入大乘這就是易行道法門了這如龍樹在十住毗婆沙論裡雖呵責了一番仍攝受他説汝若必欲聞此方便今當説之佛法有無量門如世間道有難有易陸道步行則苦水道乘船則樂菩薩道亦如是或有勤行精進難行苦行或有以信方便易行疾至阿惟越致易行道就是以信願而入佛法的一流易行道的真正意義是一易行道不但是念一佛而是念十方佛及阿彌陀等佛及諸大菩薩稱名一心念亦得不退轉二易行道除稱佛菩薩名而外應憶念禮拜以偈稱讚三易行道不單是稱名禮拜而已如論説求阿惟越致地者非但憶念稱名禮敬而已復應於諸佛所懺悔勸請隨喜回向所以易行道就是修七支及普賢的十大願王四易行道為心性怯弱的初學説重在攝護信心龍樹論如此説馬鳴論也説衆生初學是法欲求正信其心怯弱當知如來有勝方便攝護信心五易行道的攝護信心或是以信願修念佛等行而往生淨土到了淨土漸次修學決定不退轉於無上菩提這如一般所説或者是以易行道為方便堅定信心轉入難行道如説菩薩以懺悔勸請隨喜回向故福力轉增心調柔軟於諸佛無量功德清淨第一凡夫所不信而能信受及諸大菩薩清淨大行希有難事亦能信受愍傷諸衆生無此功德深生悲心以悲心故為求隨意使得安樂則名慈心若菩薩如是深隨慈悲心斷所有貪惜為施勤精進這就是從菩薩的易行方便道引入菩薩的難行正常道了於中殊勝者往生極樂土彌陀佛力持不退於菩提以信願而趣入佛道是樂行的他力的法門如大乘經論所説法門也是很多的但其中殊勝的為中國佛教界所特重的不能不説是稱念阿彌陀佛往生極樂淨土了極樂世界在西方十萬億國土以外阿彌陀佛現在那邊説法教化佛佛道同功德願力是不能説有優劣的那到底彌陀淨土有什麼殊勝呢在佛佛道同的平等一法界中確也不礙差別而顯出諸佛的特勝在大乘經中雖廣説十方淨土稱揚種種易行道而確是多稱揚讚歎彌陀淨土的阿彌陀佛所表顯的特色是因中立二十四大願或作四十八願以無邊的悲智功德現起極樂世界肯定的宣説不論什麼人只要信賴彌陀願力願生極樂世界稱念阿彌陀佛不問一日二日以及十念做到了專誠虔敬一心不亂就能為彌陀的佛力所加持死後往生極樂世界在極樂世界中物資非常豐富所以沒有所求不得苦與諸上善人在一處精勤佛道所以沒有怨憎聚會恩愛別離的苦惱蓮花化生在這生中一定會悟得無生法忍所以沒有老病死苦往生極樂淨土的上品上生當下就華開見佛悟無生忍其餘中品下品根機雖還沒有了生死而可説生死已了也就是必了無疑雖還沒有得不退轉但可説已得不退總之在極樂淨土修學的不論時間多長一定要了生死不退於無上菩提的所以如覺得自己心性怯弱菩薩道難行恐怕會墮落二乘或者隨業力而漂流不能趣向佛道那麼稱念阿彌陀佛是最穩當的了也就是最能攝護初心衆生不致退失信心的妙方便了稱念阿彌陀佛應該禮拜讚歎懺悔勸請隨喜回向依往生淨土論的五門漸次成就來説應從禮拜讚歎而進入止觀回向也就是漸成智慧慈悲方便這所以能速得不退轉於無上菩提與龍樹的論義一樣求阿惟越致地者非但憶念稱名禮敬而已不捨現法樂而向於菩提藥師大悲願東方現淨土在易行道的淨土中釋迦佛宣説彌陀佛的極樂淨土以後又説東方藥師佛的淨琉璃淨土這是適應另一類根性的彌陀佛的極樂淨土法門是厭棄現實人間的韋提希夫人深感世事的痛苦不願再生此世界所以佛為説極樂淨土弘揚彌陀淨土法門的也説不厭娑婆不生極樂由於厭此人間所以專重死後往生的但有些適於易行道的根性對於現實人間如身體健康家庭和樂社會繁榮國家富強天下澄平並沒有厭棄的心情為了攝護這一類不捨現法樂的初心學人使他也能向於菩提所以釋迦佛又開示藥師佛的淨土了藥師淨土在東方象徵生長彌陀淨土在西方象徵歸藏中國佛教界為了超薦死亡就稱念彌陀佛為了消災延壽就稱念藥師佛充分顯出了後世樂與現法樂的差別經上説藥師琉璃光王佛在因地中以大悲願發十二大願目的在開發知識促進事業救治身體殘廢貧病無依大家獲得豐富的衣食康樂不信邪外不犯法受刑男女平等一切衆生成佛以這樣的願行在東方世界現起與極樂世界一樣清淨一樣莊嚴的淨琉璃淨土以此淨土法門攝護信心使衆生能得人天增上益往生淨土益終於成就無上菩提從前玉琳國師見到了藥師經稱歎為無上的方便因為有厭離心的人太少了與彌陀淨土不相應有了藥師淨土法門那些不捨現法樂的沒有厭離心的多數人也有往生淨土而成佛的可能所以玉琳國師稱歎藥師淨土為人間亦有揚州鶴但泛如來功德船勝解堅固力歡喜休息力能修於四力精進不為難怯弱懈怠衆生不敢精進的直入大乘所以以易行的方便道信願為方便引入大乘的精進道其實如能得善巧方便精進也並非難以成就這應該修集四種力來助成精進一勝解力勝解是深刻的信解信解善惡業報的因果道理及菩薩行的功德與違犯的過失若能深刻信解就會生起樂欲要求遠離一切惡成就一切功德從這樣的勝解欲樂就能引發精進而使之修行所以説信為欲依欲為勤依越是信解深徹也就越能精進修行二堅固力在進修中要有堅固力這有二種意義第一有些人隨隨便便修這修那無決心無恆心結果是養成惡習慣什麼都修不成所以要審慎而行可以不行行就要行得徹底有始有終不能中途放棄這才能養成意志的堅定第二進修時要尊重自己強化自力成佛大事要自己力行不能希望他力所以説解脫唯依於自修楞嚴會上阿難的失敗病根就在此要肯定自己是能修行的能戰勝煩惱的堅決的負起菩薩大行的重擔非達到目的不止三歡喜力在修學的過程中法喜充滿如嘗到美味而沒有厭足心越是進修越是有興趣這才能精進修行愈入愈深四休息力如身心感到疲勞了應該休息一下否則會引起厭倦心而障道的或某一功德修成了雖略略休息也意不滿足如這樣能修於四力那就如泉源長流精進不息而不太為難了三乘諸勝德悉由定慧生以下先總説禪那及般若二度禪那譯義為靜慮一般稱為禪定為定的一名般若譯義為慧一般稱為智慧定與慧在修習成就的聲聞菩薩行中是相應不離的稱為止觀雙修定慧均等也就因此聲聞及菩薩法中每以禪及三摩地等定來稱那與慧相應的禪定聲聞法中如空三摩地勝義禪等大乘如首楞嚴三摩地如來禪等但從下手學習及定慧的特殊性能來説定與慧是有分別的所以聲聞法的三增上學心增上學以外有慧增上學大乘法的六波羅蜜多禪波羅蜜多以外有般若波羅蜜多從修習來説多稱之為止觀止與觀也是不同的大乘的修學者必須肯定定與慧的特性否則就會以禪為慧以修得四禪為證四果得定德而以為得慧成佛了其次定與慧不但為大乘行果的心髓也是聲聞行果的要目菩薩的修行雖重在菩提願大悲心回向等功德但如沒有定慧這一切都是不能成就的所以解深密經説若諸聲聞若諸菩薩若諸如來所有世間及出世間一切善法應知皆是此奢摩他及毗鉢舍那止觀所得之果止與觀是定慧所攝的從修習方便得名對於定慧止觀的尊重修習為修學大乘行的要著所以稱讚説三乘諸殊勝功德悉由定慧所生修習止觀者應先修習止止成觀乃成次第法如是説到定慧的修習就是止觀的修習什麼是止是觀什麼是定是慧慧是以簡擇為性的梵語毗鉢舍那譯義為觀經説觀是正思擇最極思擇周遍尋思周遍伺察所以慧是以觀察抉擇為特性的有人以為明了就是觀慧這是不合經義的梵語奢摩他譯義為止經説止是心一境性內心相續定是平等持心的意思所以止是安心一境而不散動的止與觀不同若修習止觀就應該先修習止這不是説把定修好了再來修習觀慧事實上止與觀有互相助成的作用在沒有修止成就以前也是有散心觀察慧的那怎麼説先修止呢在止與觀的修習過程中一定先修止成就止成就了然後才能修觀成就如定心不成就那觀慧也是不會成就的依這個意思所以説先修止經中説到止觀定慧禪慧也總是先定而後慧的這是修習的必然次第不管你橫説豎説頭頭是道如真的修習止觀那法定有如是次第的這樣現在就先説止就是禪度的修習依住堪能性能成所作事為什麼要修止而得禪定因修止而能得定就能成辦種種有義利的事業所以説制心一處無事不辦修止而得住心時身心引發輕安身心都輕快舒適而有行善離惡的力量衆生一向在散亂心中對欲境的抗拒力煩惱的制伏力善事的進修力都非常薄弱總覺得有心無力如逆水行舟那樣的艱難身體也如此身體健康的也時有煩勞不堪的感覺如久病一樣身心都滯重遲緩軟弱無力如修止而能住正定依住心而發生堪能性就是從身輕安而生身精進從心輕安而生心精進過去無能不堪的情形全部改觀依止這樣的堪能性就能勇於進修作成所要作的事業什麼是要作的事聲聞人依定才能得現法樂住得殊勝知見天眼得分別慧得漏盡解脫大乘行人依定才能引發身心輕安引發神通等功德能深入勝義更能作饒益衆生的種種事業總之佛法的殊勝功德都是離不了定的所以應專心修習禪定由滅五過失勤修八斷行依慈住淨戒為修定所不可缺的資糧調身調息等略如五乘共法中説要怎樣用心修習才能引生正定這要由滅五種的過失而成就五過失是懈怠忘聖言惛沈掉舉不作行作行怎能滅除這五失呢這要勤修八種斷行八斷行是信欲勤安念知思捨修八斷行滅五過失自能成就定心了如破除了障礙才能平安的到達目的地一樣五過失與八斷行以下會分別解説現在總列一表如下欲懈怠精進信輕安所滅五過失忘聖言正念能治八斷行惛沈掉舉正知不作行思作行捨懈怠為定障信勤等對治禪定是修所成的勝德要有信心有耐心不斷的學習才能成就所以從初學到學習成就懈怠為習定的大障礙非修信勤等對治行不可懈怠是對善事缺乏勇氣敷衍泄沓為障精進的煩惱要滅除懈怠非精進不可但定的修習精進要從對於禪定的希求願欲而來如一心想成就禪定功德非得不可自然就樂意修習而不疲懈了但這要從信心中來深信禪定的功德深信定是可以修習而成的更信自己能切實修學一定能成就有了這樣的信念自然信為欲依欲為勤依而勤修不懈怠了在禪定的信心中第一要深信定境的輕安自在身心勇鋭使自己的身心進入一新的境地如於定的輕安而能深信實為引發精進的要著修信欲勤安四種斷行滅除懈怠過失實是貫徹於修定的始終過程而在開始修習時這是應特別重視的學程正念曾習緣令心不餘散明記不忘念安住而明顯在修止時主要是使心在同一境相上安定下來使心繫住一境的是正念的力量正念如繩索一樣使心繫在一境上不致流散開去念什麼境呢是曾習緣緣是所緣境曾習緣是曾經慣習了的境相如修念佛的先要審視觀察佛相修習時憶念佛相使佛相在心上現起來如修不淨念的就要先取青瘀膿爛等不淨相念就是曾習境的憶念修念才能成定所以定是不能以幻想而修習成就的有了正念就能對治忘聖言的過失聖言是聖者所開示的法義作為修止的所緣念念不忘於所緣就能令心不向餘處馳散心就漸漸安定了衆生的心明了時就散亂了心一靜就昏昧了睡著了昏昧而不明了的是無力的明了而散亂的心如風中的燭光一樣動搖不定也是沒有大用的所以修止成定的主要目標是心力增強能作常人所不能作的大事這就要修習這個心明顯而又安住安住而又明顯怎樣才會安住又明顯呢這要以正念為主正知為助來修習此心能明白的記憶所緣不致於忘念忘念是障於正念的使心忘失所緣的修習時如心以正念力能安住所緣不向餘境流散就讓他安住而相續下去但安住而要求明顯就要以正知來時時觀照確知住在所緣境如念佛的不但要心住佛相而且要明了佛相佛相漸漸的明顯現前這樣的安住而又明顯明與靜為修止學程中的重要內容切勿以為專心一境就得了落入無記昏昧中去有以為我是不取相而修的是無分別的不用繫心一境也還是有修有證的這當然是有些誤會了即使是不著相無分別也還是對此有一解了然後專心向著修去這還不是繫念所緣嗎如什麼都不想初學是無此可能的幽靈似的茫無著落那能成什麼呢例如中國的禪者提起一句念佛的是誰拖死尸的是誰雖然由此激起疑情方便小小不同但由此使心打成一片撥落無邊妄念這還不算繫念於一嗎聖説是所緣能淨惑障者或順於正理能向於出離到底應住心於什麼所緣才能修習成定呢聖者説是所緣是沒有一定的沒有一定這不是説什麼都可以而是説在可為念境的種種緣中沒有一定而已瑜伽師説有四種所緣周遍所緣淨行所緣善巧所緣淨惑所緣總之聖教中所説的種種所緣一定是合於二大原則的一是能淨治惑障的二是契順於正理的凡緣此而修習住心就能使煩惱漸伏或者斷而不起這才能引生正定定是離煩惱欲而修得的這或是共世間的或是出世的能向於出離道的斷惑證真這才是值得緣以為境的如緣荒謬悖理的反增煩惱的如緣淫欲緣怨敵或是緣土塊木石無意義物那不發狂成病就算萬幸不要説得定了對治煩惱而漸伏的如不淨治貪欲慈悲治瞋恚緣起治愚癡界治我執持息治尋思散亂這是隨煩惱的增強而施以不同的對治法門順於正理的如以蘊界處緣起處非處五種善巧為緣這五者都是契順於正理而能滅除愚癡的出世斷惑的總相所緣是一切法無我一切法性空這些所緣都是通於止觀的如繫心於這些所緣持心令住不使流散不加觀察這就被稱為無分別影像而是奢摩他止的所緣了大乘多修習念佛與念息可作為修止的所緣境雖然很多聲聞法是多修不淨與持息念的因為這是對治貪欲及散亂而最易發定的但大乘佛教界多修習的是念佛與念息念息多少有著重身體的傾向大乘以成佛為標的所以念佛為大乘要門如易行道的稱名念佛若得一心不亂也就是念佛三昧不過念佛法門的重點是念佛的身相與功德舊稱觀相與觀想念佛如依此而念佛由心起念佛如實相那就是實相念佛趣入出世的勝義禪觀了淺一些念佛有懺業障集善根的功能深一些就緣相成定更進而趣入證悟念佛法門是由淺入深貫徹一切所以在大乘五淨行中早就有以念佛來替代界分別了念佛還念菩薩如文殊觀音普賢等菩薩並可依相攝心而修習進一步金剛夜叉是佛菩薩的化現所以也可依以修習但這就成為修天了因為佛再不是解脫相慈和相而化為忿怒相貪欲相到此佛與天幾乎合一不過大乘並非天乘修止並非修觀所以儘管也稱為念佛但到底重定而流入天乘還是化天乘行而入佛乘那就要看有否依大乘的特質三心相應而修了念佛由意念真佛非像佛觀相而持心善識於方便繫念佛為所緣而修習時應知這是由意念的一般散心的稱名念佛也還要重在意念何況緣佛相而修止在起初審取佛的相好而修習切勿因為佛相的不易現起現起而不易堅定就置佛像在前望著佛像而修習修止成定是定中意識不是屬於五識的所以如眼識取色相而修就是心由外門轉這是怎麼也不會入定的要知繫念所緣相是向內攝心的是由意識所安立的影像所以止觀的所緣相也叫做影像凡是修止的都是意識所安立的影像相而使他安住不但念佛是這樣的有些修止的略得安定前五識相續等流沒有隨念及計度分別就以為無分別定極為可笑還有初學時從石刻的或木雕的紙繪的佛像取相明了然後再緣此攝心而修習但在修時應覺得所念的是真佛並非木石等佛像這才能修習成就時佛現前住放光説法等如作為佛像而修就失去這些功德了總之觀佛相為境而持心令住應該知道的方便是很多的所以説善識於方便例如初取佛相而修習時不必過求細微能略現佛相大體就得等到佛相現前漸漸堅定如某部分特別明顯就不妨緣此而修如破竹能破了初節餘節就可迎刃而解觀佛相等也一樣如粗相安住明顯了再觀細相心力愈強就是華嚴經等所説的佛相也都有修習成就的可能所以起初必須專一切勿念此念彼或急求明顯急求細微反而成為定障又如佛相是意識現起的影像隨心力而成所以必須是因果相應的如緣阿彌陀佛相而釋迦佛現前緣佛相而菩薩相現緣立佛而坐佛相現修的與現起的不一致都是不相應切不可跟著現起的境相而住應該仍依起初修習的所緣相而攝心念息數隨止非風非喘氣以念息為方便而修止也是容易得力的法門一呼一吸叫做一息息是依緣身心而轉的對身心的粗動或安定有密切關係所以安定身心的定學對修息極為重視修息的有六門數隨止觀還淨但後三者是依止起觀的觀法一數息以息為所緣吸入時以心引息而下達於臍下呼出時心又隨息而上自鼻中呼出這樣的一呼一吸為一息數入息的不再數出息數出息的不再數入息一息一息的默數下去到十數為止再從一數起數息如念佛的捏念珠一樣使心在息所緣上轉不致於忘失初學的如中間忘記了那就從一數起以做到一息一息的不加功力憶念分明為限二隨息久久心靜了不再會忘失就不必再數只要心隨於息心息相依隨息而上下覺息遍身等這樣連記數的散亂也離去了三止息久久修息漸成心與息如形影的不離忽而心息不動身心泯然入定也就是修止成就凡修息的以細長為妙但初學不可勉強以免傷氣又息須均勻切勿忽長忽短佛法的持息本意在攝心入定所以不可在身體上著想修習久了如少腹充滿發熱或吸氣時直達到足跟趾端或覺臍下氣息下達由尾閭而沿脊髓上升或氣過時幻覺有光色音聲等這都是氣息通暢生理上的自然現象切勿驚奇誇眩落入氣功及丹道的外道窠臼又修息以微密勻長為準所以非風相息出入時如風的鼓蕩一樣出入有聲那是太粗而要不得的也非喘相這雖然出入無聲但不通利艱澀如刀刮竹一樣一頓一頓的有形可見也非氣相雖然通利了但口鼻仍有氣入的感覺離此風相喘相氣相微密勻長古人形容為悠悠揚揚若存若亡才合於息相的標準覺了沈與掉正知不散亂以正念攝心達到了安住所緣的階段那就要以正知來滅除惛沈與掉舉的過失了掉舉是貪分是染著可愛境心不自在引起心的外散惛沈是癡分是身心沈重引起攝心所緣的力量低弱不大明顯初修時妄想紛飛或者惛沈暗昧與修止全不相應的重大過失容易覺知不是這裡所説的這裡所要説的是念既安住所緣了應覺了微細的惛沈與掉舉如不能覺了或誤以為定力安穩那就會停滯而不再進步日子一久反而會退落下來這是非常重要的如在修習中覺得影像不安定不明顯或覺得心力低弱不能猛進這就是微細沈掉存在的明證這只要正念安住相續憶念綿密的照顧就能生起正知知道沈掉已生起了或要起來了能使心不向散亂流去為斷而作行切勿隨彼轉覺了到微細的惛沈與掉舉假使由它去或因沈掉過失的深重不容易遣除就不設法對治這種不作行的過失要以思來對治它才能達到滅除沈掉的目的思是推動心心所而使有所作為的所以這就是為了斷除沈掉而以思來作行切勿隨彼沈掉等流或增長下去要怎樣的作行呢如沈掉不太嚴重的那麼沈相現前就舉心而使它明了有力或修觀察如掉相現前那就下心而使它舒緩或專修安住所以在修止的過程中舉心或下心止修或觀修有隨心的情況而應用以達平衡中正的必要這如騎馬的馬向左就拉牠向右馬向右就拉牠向左總以使馬向中馳去為標準但沈掉嚴重的不容易遣除就應該修特別的對治如沈沒重的修光明想或修菩提心等可欣喜的功德相如掉舉重的應修無常等可厭患相等沈掉息去再依本來所修的安住所緣而進修滅時正直行斷於功行失如修習到沈掉息滅了心就能平等正直那時就應該不太努力讓心平等正直而行就得了這叫做捨捨時不加功用讓心在平等正直的情況下自由進行這就能斷於功行的過失這如騎馬的如馬不偏向左不偏向右就應放寬韁繩讓牠驀直的向前去這時候如依舊把馬韁拉得緊緊的馬反會因不適意而走向兩邊去修止的也如此如心已平等安住還是為了防護沈掉而作行結果反而使心散亂了所以到這階段應修捨舒緩功用這是第八斷行的捨能滅第五過失的作行能這樣心就快要得定了內住亦續住安住復近住調順及寂靜次最極寂靜專注於一趣等持無作行聖説止方便不越九住心從初學的攝心到成就正定有九住心也就是住心的修習過程可分為九個階段一內住一般人一向是心向外散儒者稱為放心如雞犬的放失而不知歸家一樣修止就是要收攝此外散的心使心住到內心所緣上來不讓它向外跑二續住起初攝心時心是粗動不息的如惡馬的騰躍一樣不肯就範修習久了動心也多少息下來了才能心住內境相續而住不再流散了三安住雖説相續而住但還不是沒有失念而流散的時候但修習到這能做到妄念一起心一外散就立即覺了攝心還住於所緣中到這階段心才可説安定了四近住這是功夫更進了已能做到不起妄念不向外散失因為妄念將起就能預先覺了先為制伏這樣心能安定住於所緣不會遠散出去所以叫近住五調順色聲香味觸五欲貪瞋癡三毒加男女為十相這是能使心流散的現在心已安住了深知定的功德也就能了知欲的過失所以以靜制欲內心柔和調順不會因這些相的誘惑而散亂六寂靜十相是重於外境的誘惑還有內心發出的不善法如不正尋思國土尋思親里尋思不死尋思欲尋思恚尋思害尋思等五蓋貪欲瞋恚惛沈睡眠掉舉惡作疑對這些也能以內心的安定功德而克制它免受它的擾亂到這內心是寂靜了寂靜如中夜的寂無聲息一樣並非是涅槃的寂靜七最極寂靜上面的寂靜還是以靜而制伏尋思等煩惱還不是沒有現起現在能進步到尋思等一起就立即除遣立刻除滅前四住心是安住所緣的過程但修止成定主要是為了離欲惡不善法所以定力一強從五到七就是降伏煩惱的過程必靜而又淨這才趣向正定了八專注一趣心已安住不受內外不良因素所動亂臨到了平等正直持心的階段就此努力使心能專注於同一能不斷的任運的自然而然的相續而住九等持這是專注一趣的更進步功夫純熟不要再加功用無作行而任運自在的無散亂的相續而住修習止而到達這一階段就是要得定了修定的方法不一到達的時間也因人而不同住心的教授也説有種種如八斷行等都是但從最初攝心到成就正定敘述這一完整的學程依聖者所説修止的方便過程不會超越九住心的也就是不外乎九住心的法門所以修習止應依此修習而認識自己的進程到了什麼階段以免增上慢而貽誤了自己若得輕安樂是名止成就在修止過程中早就有些輕快舒悅的身心感覺而也一定有熱觸動觸等發現但一直到第九住心能無分別無功用的任運還只是類似於定不能説已成就定這一定要若得生起身心的輕安樂引發身心精進於所緣能自在有堪能這才名為止成就也就是得到第一階段的未到地定發定時起初頂上有重觸現起但非常舒適接著引發身心輕安由心輕安起身輕安這是極猛烈的樂遍身體的每一部分徹骨徹髓當時內心大為震動被形容為身心踴躍等到衝動性過去就有微妙的輕安樂與身相應內心依舊無功用無分別的堅固安住所緣這才名為得定從此出定以後在行住坐臥中都有輕安及定的餘勢隨逐好像常在定中一樣如再修止入定持心不散一下子就能入定生起身心輕安而且能不斷增勝起來明顯無分別及妙輕安樂是道內外共由觀成差別成就定的能得由定所發的殊勝功德通遍的定德有三一明顯二無分別三及微妙輕安樂明顯是心極明淨所緣於心中現也極為明顯如萬里無雲空中的明月一樣無分別是心安住而自然任運了了分明不曾有什麼作意的功用所以當時的心境澄淨得如波平浪靜的大海一樣真可説惺惺寂寂寂寂惺惺了而在這樣的定境中又有微妙的身心輕安因而離惡行善非常有力又極其自然不像平時的逆水行舟那樣於欲境自然不起染著大有染著不了的情況最低階段的定境就是那樣的深妙然而這樣深妙的定在世出世道中大小乘道中還是內外共的還只是共世間的定也是凡夫所可以修得的有些偏好禪修的不讀不誦三藏教典以為這只是增長知解於修持沒有多大用處在這種遠離顯了教典專心修習憑自己的一些修持經驗就以為了不得由於這是離欲的所以覺得自己不起煩惱欲界的就以為斷煩惱而不為煩惱所染了由於任運的無功用無分別心就以為無分別智的證悟了由於起定而定的餘力相隨就以為動靜一如常在定中了看作解脫的有如説修得四禪以為得了四果看作成佛的也有不知這還是共世間定的初步呢其實有這樣修驗的人也並不太多有些還在修止過程中有些身心特殊經驗就狂妄得不知自己真面目修禪而不修觀慧以為禪那就是般若這是永不能深入出世法中真是可悲愍的這還是共世間的定道初階要由觀慧而成為差別這是世間的出世間的小乘的還是大乘的這是説得此未到地定後如修欣上厭下的六行觀就次第上升而成世間的色無色定如以無常為觀門漸入無我我所觀才是聲聞乘的定如依此觀法性空不生不滅與大乘般若相應就成大乘禪定所以但修禪定不修觀慧是不能解脫生死的更不要説成佛了如修此定與無所得慧相應就是三輪體空的禪波羅蜜多般若波羅蜜最尊最第一解脫之所依諸佛所從出以下説般若波羅蜜多般若波羅蜜多在一切無漏功德中要算是最尊貴最第一了經中以無邊讚歎來讚歎它到底什麼意義值得這樣的尊敬呢佛法的無邊功德各有特勝都可以有值得被尊重的價值但般若卻有一特殊的意義值得尊重這就是佛法的根本般若是凡夫與聖者世法與出世法的差別所在所以一切無漏功德一切三乘聖者都依般若而有如經中説欲學聲聞地亦當應聞般若波羅蜜欲學辟支佛地亦當應聞般若波羅蜜欲學菩薩地亦當應聞般若波羅蜜總之沒有般若就沒有出世聖者沒有無漏功德所以佛法超勝於世間法的特質也就唯是般若了般若是出世聖法的根本依處所以是三乘解脫的所依處三乘聖者都是依般若而解脫生死的一切諸佛所從而出生的也是般若所以般若經稱般若為佛母如經中説般若波羅蜜能生諸佛智度菩薩母方便以為父這樣般若為二乘聖者的生母又是佛菩薩的生母那般若到底是小乘法大乘法呢約般若的廣義説也就是專約能生聖法説般若是三乘共學的法門依般若證入空性來説聲聞如毛孔空菩薩如太虛空並非質的不同三獸渡河唯香象才能徹底唯佛與佛乃能究盡諸法實相淺深不同而同樣的契入法性流中約這個意思説三乘的觀慧可以有方便淺深不同而根本特質是不許差別的然約般若的深義説如與國王和合而生王子母以子貴也就與生育常人不同依此般若是與菩提心相應大悲為上首的般若是五度所莊嚴的般若是能攝導一切功德而趣向佛道的般若這樣般若但屬菩薩能生諸佛般若現證法性空不但不會如二乘那樣的趣入空寂反而是方便善巧成為一切功德的攝導者成為一切波羅蜜多的總相不論約那一方面説般若決定是出世聖法的特質非布施禪定等所及而為了生死與成佛的必修法門現證由修得修復由思聞善友及多聞實為慧所依般若有勝義般若世俗般若真實的般若是由修習所得的現證般若親切體證的般若如説般若定契合而如如不動的意思實相甚深極重智慧輕薄是故不能稱要知道般若本是世間固有的名詞是以簡擇為性的理智但現證實相的般若為世間所從來沒有的當然也就不是世間固有名詞所可以稱呼的這要叫做什麼好呢佛有善巧使衆生依著世間固有的慧性使他向高深處進展進展到超越世間理智的現證實相這是依簡擇的慧性所引發來的所以雖不是世間固有的慧也就叫做般若了其實修持而得的真般若決非世間理智所可比的佛法的現證不是脫空而來的有方便有因緣那就是離不了聞思修三慧現證慧由修所成慧進修而得的修所成慧是與定相應的觀慧修也不是盲目的修習又要由思所成慧對法義作深刻的思惟抉擇才可以作為觀察的所緣思慧又要從聞所成慧得來聞是若從佛聞若從弟子聞若於經中聞聞思修三慧的詳細敘述就是十法行一書寫二供養三施他四若他誦讀專心諦聽五自披讀六受持七正為他開演文義八諷誦九思惟十修習佛法都要依佛菩薩的開示而修習也就是三慧的修學過程特別是般若非從聞思修入手不可綜合起來這就是平常所説的三種般若現證慧是實相般若是勝義般若修思慧是觀照般若思聞慧是文字般若思慧是依文的也可不依文的聞思修是世俗般若因為可為勝義般若的因緣因中説果也就假名為般若了修學般若所以般若經論為聞思對象也是必要的資糧了修學般若的初方便是聞思所以親近善友及多聞熏習是必要而不可缺的實為修學慧所依止的這有二點應注意一多聞並非廣識名相而已依聲聞法聞無常無我是多聞所以説若人生百歲不解生滅法不如生一日而得解了之大乘法中多聞是聞空性不生不滅如楞伽經等説所以能通達實義的才是多聞的善知識二在十法行中聞只是聽聞讀誦解説等也就是依文達義所以如以聞慧為對於修習般若無用是不合佛法的是會漂流於三藏教典以外的但是這雖是必要的但還是初步的還要依此而向思修前進般若本無二隨機行有別般若諸經論於此最親切佛所開示的般若學是依緣起法而顯勝義法性的法門這樣的聞思又這樣的修觀以到達現證從般若的內容體證的內容來説本來是無二無別的一切菩薩所分證的十方諸佛所圓證的平等平等所以説與