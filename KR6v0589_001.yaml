我慢的特性相應與他對立起來名假這是根本沒有的妄執薩迦耶見對人有補特伽羅我執對自己有補特伽羅我執更有薩迦耶見的我執衆生的世俗心境都是執我的俱生我執但這是直覺來的極朴素的實我到底我是什麼大都不曾考慮過這到了宗教家哲學家手裡就推論出不同樣的自我來分別我執但作為生命主體輪回實體的我一定認為是實有的這是與他對立而自成的輪回而我體不變的實有實自有一常有常為自我內含的特性這與執法有自性的自性定義完全一樣所以約法説無自性約衆生説無我其實是可通的所以説為法無自性空我無自性空又説為法無我人補特伽羅無我可是薩迦耶我執又在這實一常的妄執上進而説樂覺得自身為獨立的就覺得是自由自在的從我妄執的本性説我是樂的從我所表現的作用説是自我作主由我支配主宰是我的定義的權力意志所以薩迦耶我是以主宰欲而顯出它的特色不過如通達無自性通達實一常的我不可得主宰的自在我也就失卻存在的基石而遣除了這些是觀我空所必應了達的意義從凡情所執的我來説不外乎即蘊計我離蘊計我二類然以正理觀察起來自性有的我不能説即是五蘊的我到底是什麼一般所説的我走我拿我歡喜我想像我作為我認識都是不離身心五蘊的所以一般的我執都是執蘊為我的但五蘊是衆多的生滅無常的苦的這與我的定義是一是常是樂並不相合如真的五蘊就是我那就不成其為我要使大家失望了一般宗教家經過一番考慮大都主張離蘊計我認為離身心五蘊外別有是常是樂微妙而神祕的我但以正理推求也決非是離蘊而有我的因為離了五蘊就怎麼也不能形容不能證明我的存在不能顯出我的作用怎麼知道有我呢衆生的執我都是不離身心自體的並不如神學家所想像的那樣有的固執離蘊有我又另為巧妙的解説有説是相屬的以為五蘊是屬於我的是我的工具我利用了足就能走利用了眼睛就能見利用意識就能明了認識有説是相在的如我比五蘊大五蘊就在我中如五蘊比我大我就存在於五蘊中這既然都是離蘊計我的不同解説當然也不能成立所以不是相屬的也不是相在的相屬如部下的屬於長官相在如人在床上這都是同時存在可以明確的區別出來但執相屬相在的我執如離了五蘊怎麼也不能證明為別有我體所以都不能成立經這樣的觀察故知是無我的並沒有衆生妄執那樣的我體我不過是依身心和合相續的統一性而假名施設而已我執本不出這二類後來佛法中的犢子部等執有不即蘊不離蘊的不可説我這是誤解世俗的施設我為自相有執假為實的分別妄執若無有我者何得有我所諸法性尚空何況於彼我我空與法空在般若經論中常常是互相證成的我空所以法也是空的法空所以我也是空的依此若了達衆生而無有我那何得有我所法呢我所是我所有法我所依法如我的身體我的財産我的名位我的國家凡與我有關而繫屬於我的就是我所有的法又如我是受假是取身心而成立的所以如五蘊六處六界六識等都是我所依的法假我所有的我所依的都是法無我就沒有我所所以我空也就法空了反之諸法的自性似乎是真實的尚且是空的何況那依法而立的我這更不消説是空的了本頌含有非常的深義唯有大中觀者才能如實的開顯貫通這是説佛在聲聞法中多説無我明説法空的不多因此在佛法的流傳中就分為二派西北印度的一切有系以為佛但説無我法是不空的如毗曇家中南印度的大衆系中有説佛説我空也是説過法空的如成實論大乘佛經不消説是説一切法性空的但對於我空及法空如從有部系而來的瑜伽宗就以為小乘但説我空大乘説我法二空中觀宗近於中南印的學派所以認為小乘有我法二空大乘也是我法二空今依龍樹論而抉擇貫通小乘弟子鈍根故為説衆生空大乘弟子利根故為説法空不大利根衆生為説無我利根深智衆生説諸法本來空大小乘經確是明顯如此的但這不能説聲聞弟子沒有法空因為若了了説則言一切諸法空若方便説則言無我是二種説法皆入般若波羅蜜相中以是故佛經中説趣涅槃道皆同一向無有異道這明白説破了衆生空的無我與法空只是説明的顯了一些或含渾一些其實都是般若正觀一乘一味的解脫道所以説我我所法尚不著何況餘法以是故衆生空法空終歸一義這是説能得無我我所的一定能通達法空因為觀空的意義都是無自性觀我無自性而達我空如以此去觀諸法法當然也是空的不過聲聞者但破吾我因緣生諸煩惱離諸法愛畏怖老病死惡道之苦不復欲本末推求了了壞破諸法但以得脫為事這就是急求證悟直從觀無我我所入手不再去深觀法性空了但這是不去再深求佛也不為他説法空而決不會執法實有的如若無衆生法無所依無我無我所自然得法空這樣聲聞的無我是可以通法空而不與法空相違反的依中論觀法品的開示雖廣觀一切法空不生不滅而由博返約的正觀還是從無我我所悟入這正是生死的癥結所在出世的解脫道決不會有差別的不過根機不同説得明了或含渾些廣大或精要些而已這樣凡是通達我空的一定能通達法空可以不深觀法空不開顯法空而決不會堅執自性有而障礙法空的如執法實有那他不但不解法空也是不解我空的不但不除法執也是不除我執的所以經上説若取法相即著我人衆生壽者若取非法相即著我人衆生壽者龍樹論也説若見陰不實我見則不生由我見滅盡諸陰不更起陰執乃至在我見亦恆存誰説聲聞聖者知我空而説一切法實有呢不解法空不離法執誰説能離我執呢這可以推知佛説本來一味只是淺者見淺深者見深淺深原是一貫的到了偏執者手裡才分為彼此不同的解行惑業由分別分別由於心心復依於身是故先觀身空是要觀衆生與一切法都是性空的龍樹繼承佛説的獨到精神以為初學的應先從觀身下手這有什麼意義呢因為生死是由於惑業惑業由於分別這已如上面説過此惑亂的妄分別是由於心從人類衆生能發心學佛的來説心又是依於身的從依心而起惑造業來説佛法分明為由心論的人生觀重視自心的清淨當然是佛法的目的然心是依於身的此身實為衆生堅固執著的所在貪愛喜樂阿賴耶所以生死不了而阿賴耶的所以愛著確在此識於身攝受藏隱同安危義的取著人類在日常生活中幾乎都是為了此身身體是一期安定的容易執常執常也就著樂著淨這是衆生的常情反而心是剎那不住的所以如執心為常住的依此而著樂著淨可説是反常情的這只是神學與哲學家的分別執論稱為如梵天王説也就是婆羅門教的古老思想所以如衆生專心染著此身體是不能發心不能解脫的大障礙是故先應該觀身佛説的道品以四念處為第一稱為一乘道四念處又以觀身為先觀身不淨觀身為不淨苦無常無我就能悟入身空對身體的妄執愛著能降伏了再觀身心世界的一切法空無我無我所就能趣入解脫佛法中有的直捷了當以心為主理解是唯心的修行是直下觀心的這與一般根性愛著自身的衆生不一定適合因為這如不嚴密包圍不攻破堡壘就想擒賊擒王實在是説來容易做來難的自身的染著不息這才有些人要在身體上去修煉成佛呢無我無我所內外一切離盡息諸分別是為契真實大乘行者以無我無我所的正觀觀察內而身心外而世界知道這一切都是似有真實而無自性的觀我無自性名我空觀觀法無自性名法空觀由於空觀的修習成就能離一切法的戲論相也就不於一切而起我我所執因此盡息所有的諸分別無漏的般若現前所以説諸法不生故般若波羅蜜應生又如説語言盡竟心行亦訖不生不滅法如涅槃現證的般若現前就是契入一切法的真實相這名為空性法性法界真如等都只是假立名言這實是超脫一切分別妄執超越時空性質量性而證入絶待的正法同樣的無我無我所那二乘與佛菩薩有什麼分別呢悟入無分別性依華嚴經十地品説這是二乘所共得的般若經論也説二乘智斷即是菩薩無生法忍但菩薩有菩提心大悲心回向利他以本願力廣度衆生這怎能與二乘無別這是説大小乘以願行來分別不以慧見來分別雖説同證無分別法性也有些不同聲聞於一切法不著我我所斷煩惱障而菩薩不但以我法空性慧證無分別法性斷煩惱障更能深修法空離一切戲論盡一切習氣得純無相行圓滿最清淨法界而成佛這那裡是二乘所及的呢真實無分別勿流於邪計修習中觀行無自性分別現證的般若名無分別智證悟的法性名無分別法性在修習般若時經中常説不應念不應取不應分別證悟的且不説修習般若而不應念不應取不應分別那怎麼修觀分別抉擇尋思呢這也難怪有些修持佛法的勸人什麼都不要思量直下體會去也難怪有些人以無觀察的無分別定看作甚深無分別智證了所以無論是無分別智證無分別的觀慧真實的無分別義應善巧正解切勿似是而非的流於邪外的計執故意與佛説的正觀為難要知無分別的含義是多種不同的不能籠統的誤解如木石也是無分別的這當然不是佛法所説的無分別了無想定心心所法都不起也是無分別的但這是外道自然而然的不作意也叫無分別這也不能説是無分別慧因為無功用不作意的無分別有漏五識及睡悶等都是那樣的又二禪以上無尋無思這種無尋思的無分別二禪以上都是的也與無分別慧不同所以慧學的無分別不是不作意不尋思或不起心念等分別那到底是什麼呢修習中觀行的無分別是以正觀而無那自性的分別從自性分別不可得而入於無分別法性的現證自性分別是對於非真實而似真實的戲論相著相而以為自性有的上來已一再説到自性有是我我所執的著處如起自性分別就不能達我法空而離我我所執了所以應分別抉擇觀察此自性有是不可得的一絲毫的自性有都沒有才能盡離自性有分別離此自性有分別就是觀空無自性分別分別不一定是自性分別而分別自性分別不可得空觀不但不是執著而且是通向離言無分別智證的大方便經説的不應念不應取不應分別是説不應念自性有不應如自性有而取不應起自性有的分別不是説修學般若什麼都不念不思不分別如一切分別而都是執著那佛説聞思修慧不是顛倒了嗎如無分別智現前而不須聞思修慧的引發那也成為無因而有了不過在從修無分別觀觀自性分別不可得臨近趣入無分別智證時如著力於分別抉擇也是障礙所以經説不應念等這名為順道法愛生如食生不消化而成病這等於射箭在瞄準放箭時不可太緊張太著意太緊張著意反而會不中的的從前有人寫信給有地位的人生怕錯誤封了又開這樣的開開封封結果是將空信封寄了去成為大笑話所以在觀心成就純運而轉時不可再作意去分別抉擇其實這也還是不著相不作意分別的意思以無性正見觀察及安住止觀互相應善入於寂滅想修學般若契悟真實先要對於一切是世俗假名有自性不可得深細抉擇而得空有無礙的堅固正見假名有與無性空是相成不相礙的所以説宛然有而畢竟空畢竟空而宛然有有極無自性的正見而不壞世俗緣起有的一切這就是聞思慧的學習如定心沒有修成那還只是散心分別的觀察如修止而已得到輕安已經成就正定就可以不礙假有的空性正見依定修觀入於修慧階段那時以無性空為所緣而修觀察名有分別影像觀察久了就以無性空為所緣而修安住定名為無分別影像這是不加觀察的無分別如安住了再修觀察這樣的止觀雜修都是以無性空為所緣的觀心純熟時安住明顯澄淨如淨虛空的離一切雲翳一樣那時一切法趣空觀一切法相無一法可當情而住的都如輕煙一樣修觀將成就時應緩功力等到由觀力而重發輕安才名修觀成就以後就止觀互相應名為止觀雙運以無分別觀慧能起無分別住心無分別住心能起無分別觀慧止觀均等觀力深徹末了空相也脫落不現就善入於無生的寂滅法性到此般若無分別智現前如説般若波羅蜜能滅諸邪見煩惱戲論將至畢竟空中又説慧眼都無所見唯識學也説無分別的真見道是離一切相的從凡入聖的畢竟空慧為印度大乘學者所公認這與末世的擬議圓融不知重點突破的方便不可並論善哉真般若善哉真解脫依無等聖智圓滿諸功德般若波羅蜜多已約略説明進修的方便這是超凡入聖的不二門所以特為讚歎善哉這是佛所覺證佛所開示的真般若不但不是凡夫外道的智解也不是有所得小乘與大乘學者的相似慧從凡情而點出生死的癥結所在給豫根本的重點突破這是不共世間的特法法性空義所以是甚深難見非世間學者所能夢想到的因此這是可讚歎的善哉善哉這才能得真解脫而不像外道愚夫或以生天為解脫或以深定的境界為解脫經上説菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提共聲聞的涅槃德不共二乘的大菩提德都是依此無與等倫的聖智才能圓滿諸功德所以説般若波羅蜜多是諸佛甚深的法寶藏如學佛而不進修這一法門不真是如入寶山而空回嗎法性本無二隨機説成異了義不了義智者善抉擇解脫生死成佛都是依現證法性而成就的法性一切法的真實相本來是無二無別遍一切一味相二乘菩薩佛都是證入這同樣的法性經説以無為法而有差別其實無為法説不上差別只是依智證淺深而説差別如虛空本無差別因方器圓器而説為方空圓空一樣佛是依緣起而覺證法性的也就依緣起而開示法性這雖本無差別但在隨機巧説時不能不成為別異的教説因為法性甚深如依甚深義説有些人不但不肯信受而且還會誹毀這樣佛就不能不有善巧的異説了以大乘法來説可條別為三大系太虛大師稱它為法性空慧法相唯識法界圓覺我也曾稱之為性空唯名虛妄唯識真常唯心名稱不同內容大致一樣古代賢首宗判大乘為法相宗破相宗法性宗也還是這大乘三系這三系有時會使人迷惑不免有互相乖角的情形因為都是以自系為了義以他系為不了義的如賢首宗立宗於第三系以法相破相為權教以自宗為實教瑜伽宗唯識宗立宗於第二系虛妄唯識自稱應理宗而稱第一系為惡取空者第三系為此方分別論者中國的佛教立宗於第一系之三論宗自稱無所得大乘也不免有過分彈破餘系的學者這都是以自系為了義以他系為不了義的各有經典可證也各有自稱為了義的論證所以是始終不易消解的論諍這是有關於法性的般若修證的是不可以籠統顢頇過去的到底什麼是了義不了義到底誰是了義誰是不了義智者應善巧抉擇才能徹見佛法的真實宗旨也明了佛説的方便大用關於法性般若上來雖依般若經論而略為解説如餘系的學者讀起來是會不同情的所以又不能不略説三宗現在撇開後代學者的異見直從根本經論中去求一消息雖不一定盡合讀者的口味也還不致是自己的成見諸法從緣起緣起無性空空故從緣起一切法成立現空中道義如上之所説先説依般若經中觀論等經論的大乘性空唯名系首先要説明印度的大乘教學小乘也一樣都是要安立一切法的善惡業果生死流轉的迷倒是怎樣而有的這是極根本的理論依著而開示人天善法反過來怎樣的徹悟法性斷惑證真成立三乘聖法要從怎樣的修習過程達到涅槃與菩提的圓成這實在就是苦集與滅道的二大門這雖然不是一般人所能完滿通達的而真正弘宣大乘佛教者始終是不會忘失這些問題的從經論的教證看來大乘佛法的三系不同主要在成立一切法的見地不同最根本的是業果怎樣安立無盡意經説顯示世俗的是不了義經顯示勝義的是了義經顯示名句施設的是不了義顯示甚深難見的是了義顯示有我是不了義顯示無我空無生是了義的這也如三摩地王經等説這樣般若經中觀論等深廣宣説無自性空不生滅等是了義教是義理決了究竟最徹底的教説依於這一了義的立場一切我法都是世俗的假施設的從生死業果到三乘道果就是涅槃凡是安立為有的都是唯名唯假的名言識所成立的世俗有如從勝義觀察起來一切是無自性而不能安立的這就是於無住本立一切法而非從真如實相中去成立一切這如般若經説世間名字故有須陀洹乃至阿羅漢辟支佛諸佛第一實義中無知無得無須陀洹乃至無佛六道別異亦世間名字故有非以第一實義第一實義中無業無報我如幻如夢佛道如幻如夢我説涅槃亦如幻如夢若當有法勝於涅槃者我説亦復如幻如夢這是一切如幻如化唯是世俗假名施設的確證中觀者貫徹了這性空唯名的深見説色心染淨世出世法都是世俗假施設的亦為是假名是從緣而起的這本是佛在勝義空經所説的根本立場凡是緣起的就是假名有以勝義觀察一切是無自性而空的沒有一法可以安立的但這不是説無性空破壞了一切不能成立一切法反而如不是無性空的有自性的那就是實有法實有自性有法就不用從緣而起這就未生的不能生未滅的不能滅凡夫決定是凡夫不能成佛了好在由於空故是極無自性的所以要從緣而起依於因緣一切法都可以成立行善得善報作惡的得惡報迷著了流轉生死悟證了就得解脫而且以性空的緣起觀一切法所以不著生死也不住涅槃廣行菩薩行而成佛不空什麼都不能成立空一切都能成立這如中論觀四諦品回諍論的堅決論證如説以有空義故一切法得成若誰有此空彼有一切義依無自性空相應的緣起義立一切法所以約世俗假施設説是如幻而現的約勝義無自性説是空的幻現不礙性空性空不礙幻現空假無礙二諦無礙的中道義為性空宗的了義説這就是如上般若波羅蜜多中所説的一切法無性善入者能入或五事不具佛復解深密次説虛妄唯識系以解深密經瑜伽師地論等為宗依玄奘所傳的法相唯識最能表達這一系的意趣般若經被説為第二時教小乘是第一時解深密經是第三時教無著傳出瑜伽師地論也是在龍樹以後所以這一系經論比般若經論要遲一些勝義是一切法的究極真性沒有更過上的所以勝義就是了義這是中觀論者承般若經無盡意經而確立的見地但解深密經以了義與深密不了義相對論説得顯明易了的是了義説得深隱微密的是不了義因此在勝義諦中又有深密與了義的分別依佛説的解深密經去理解勝義法空性所以有深密與了義是根機的問題如經上説一切法皆無自性無生無滅本來寂靜自性涅槃於是經中若諸有情已種上品善根已清淨諸障已成熟相續已多修勝解已能積集上品福德智慧資糧彼若聽聞如是法已於我甚深密意言説如實解了於如是法深生信解於如是義以無倒慧如實通達依此通達善修習故速疾能證最極究竟這可見對於一切法無性的教説像這類根機成熟的已有善入甚深法性的能力就能以無倒修慧能證能入也就不需要佛説解深密經了但或有五事不具足的對於一切法無性的教説就有了問題經上説種上品善根清淨諸障成熟相續多修勝解但還沒有積集上品的福智資糧這一類有情有的聽了就覺得甚深甚深雖能信仰但不能解了有的聽了雖能信仰不能解了卻要照著自己的意見去解説以為一切法無自性空就是什麼都沒有龍樹稱之為方廣道人結果是對自己毫無利益反而退失智慧從他聽法的人有的跟著他執著無見有的就反對一切法性空教還有五事都不具足的聽了一切法無性空的教説不信不解説此非佛語是魔所説正如龍樹所説聲聞五百部聞説般若諸法畢竟空如刀傷心對於這信而不解的信而誤解的不信又不解的鈍根佛所以又説解深密經我依三種無自性性密意説言一切諸法皆無自性簡單的説依三無性遣除遍計所執性説一切法無自性其實緣起法依他起性寂滅法性圓成實性是有自性的並非一切都沒有有的是非有有的是實有這才不信不解的也不反對了誤解以為什麼都沒有的也不誤解了有信而不解的也可依著進修了依經文的敘述去了解在五事具足的於一切法無自性空能成立一切法能修能證的根機來説這還不是了義教嗎如根機不夠五事不具足於一切法無自性空不能成立一切法或者破壞一切法這才成為深密難解而需要佛的淺顯解釋了龍樹論意也如此如大海人以為極深而羅睺羅阿修羅王站在大海裡水不過臍這深個什麼呢又如山民聽説鹽能美味就抓一把鹽來吃結果是鹹苦不堪鹽能美味這在一般人是怎樣的明白而在無知的山民心裡卻成為祕密難懂了所以深與不深密與不密不在乎法的本身而在乎聽衆的根機這樣般若經等説一切法無性空一切唯名唯假對般若法會的根性來説是究竟的了義教不過在五事不具的根性看來深而又密這所以又要解釋一番淺顯明了能信能解覺得這才是了義法門或是無自性或是自相有無著所傳的瑜伽法門依解深密經的顯了説站在五事不具的根性來説話以為一切無自性一切假有這是等於説什麼都沒有是不能成立一切法的所以應有假有無自性實有自性的二類依實立假才對如説譬如要有色等諸蘊方有假立補特伽羅非無實事而有假立補特伽羅如是要有色等諸法實有唯事方可得有色等諸法假説所表非無唯事而有色等假説所表若唯有假無有實事既無依處假亦無有是則名為壞諸法者這在解深密經中就分世俗為二類云何諸法遍計所執相謂一切法假名安立自性差別乃至為令隨起言説云何諸法依他起相謂一切法緣生自性遍計所執相此由假名安立為相非由自相安立為相是故説名相無自性性而依他起是此由依他緣力故有非自然有是故説名生無自性性所以這一系的根本立場或是無自性的假有叫做假説自性遍計所執相或是自相有的實有唯事叫做離言自性依他起性因緣生法是自相有的是一切法的緣生自性或説為十八界性界也就是自性不失的意義這不是執著而實有性的從因緣生時就是這樣自性有的這與中觀者看作戲論相似有而實非有的見地有著根本不同至於依法而執為實有是無自性的那是二家公認的了依佛的教説來看是毫無諍論的五事具足的於一切法無自性空一切唯假名了解得空是不礙有的依空所以成有的能成立一切法也就能信解而如實通達了五事不具足的以為一切空是什麼都沒有空就是沒有這當然不能成立一切法不免誤解那麼依淺顯明了的新解説説有自相有的實有唯事也就可以信解一切法空而漸入佛道了但後代的瑜伽學者不能體解如來説教的意趣不知彌勒無著的教説是為了五事不具的根性而説反而以為不問根機怎樣非要依解深密經的了義説不可這樣問題就來了一以為般若經的一切法空説佛當然如實通達但説得不明顯容易誤會所以非依解深密經的新解説不可二雖不敢指斥龍樹但解説為龍樹的意思與自己解深密説一樣反而堅決反對中觀者一切法性空一切唯假名的了義説甚至説不應共語不應共住掀起宗派的鬥爭假使能想起還有五事具足的根機有以有空義故一切法得成的深見那也許可以各適其機各弘其道而不必爭執了緣起自相有即虛妄分別依識立緣起因果善成立緣起而自相有的就是依他起性依他起是一切緣起法但唯識大乘是以唯識為宗所以依他起是以虛妄分別為性的也就是有漏識衆生從來沒有無漏現行識有八種但根本分別為一切法所依止的是稱為所知依的阿賴耶識依阿賴耶根本識為依而立緣起所生的一切法阿賴耶識譯為藏識含藏有無量種子依種子生起現行七識及相應心所根塵器世界一切法生起時又熏習成種藏在阿賴耶識裡這樣阿賴耶識為種子性一切因果都能善巧地成立了唯識學者是以自相有立一切法的所以因果也是自相有的阿賴耶識為種子性名為分別自性緣起如眼識種子生眼識耳根種子生耳根貪種子生貪青色種子生青色黃色種子生黃色有漏種子生有漏無漏種子生無漏什麼種子生什麼現行什麼現行又熏成什麼種子這種種子性稱為親生自果功能差別是自性生自性的因果觀不過自種子而外還要其他的現緣才能生果所以叫依他起這可見依自相有種子生自相有現行的唯識因果觀與無自性空的因果觀是怎樣的差別了心外法非有心識理非無達無境唯識能入於真實依虛妄分別識種子生現行現行熏種子的因果來説心外法是非有的衆生直覺得外境實有是客觀存在的色物質甚至反省起來心也好像是所對的境界這是無始來的錯亂妄執由此而執我執法都是遍計所執相的是空無自性的然假必依實自相有而為一切假所依的心識論理是非無的如心識也沒有自性那就一切都不能成立了識是虛妄的但是自相有的由於無始以來心境相應熏習成種子所以識從自種子生時那以識為性的境相種子也就生現行而現起能分別所分別二相好像是心境獨立的其實境不離心以心識為性的心外的境相雖沒有而不離心識的境相也是有的從自種子生的這名為性境如依心識的想像妄執而成的才是沒有的所以依他起的一切因果都能成立不過説一切以識為性罷了這都是自相有的不可説是空無自性了依唯識而成立因果也就依唯識而立迷悟衆生不了解外境是唯識的是顛倒錯亂為執我執法的根源因妄執起煩惱造業這都熏習在阿賴耶識裡業種成熟時隨業受報阿賴耶識就名為異熟識成為生死輪回的主體了反之如依觀而通達實無外境是無自性的是唯識所現而立的這就能於依他起而知遍計所執空如境相空不可得虛妄分別識也就因失去對象而不生境無所得識也就無所得就能悟入於唯識真實性空相真相真實性是依他起自性離執所顯的所以也不能説是空的如説唯所執依他及圓成實性境故分別故及二空故説依識有所得境無所得生依境無所得識無所得生由識有得性亦成無所得故知二有得無得性平等識有所得有自相依此而成立因果迷悟為虛妄唯識系的要義這對於五事不具的根性真可説是善巧極了而且依實立假本是小乘一切有系的根本立場一切法的實有性十八界的實有性以唯識義來解説這對於攝化小乘有宗而向於大乘一切法空性的教説不能不説是佛菩薩的難思方便或以生滅法縛脫難可立畏於無我句佛又方便攝再説真常唯心系這是依如來藏如來界衆生界自性清淨心等為本依的如如來藏經勝鬘經楞伽經等經寶性論大乘起信論等論説在印度及中國這一系的弘揚是比般若經論遲一些中觀者依徹底的我法無自性無我説緣起是如幻的生滅與無常無我的法印相合唯識者依自相有的立場説一切法是生滅無常的種子六義中第一就是剎那滅對於沒有補特伽羅我也是徹底的小乘説一切有及經部也與唯識相近但這在稱為附佛法外道及神教徒是極難信解的沒有我體怎麼會有輪回剎那生滅那前生與後生又怎樣連繫這是佛法中的古老問題如説我若實無誰於生死輪回諸趣楞伽經説陰界入生滅彼無有我誰生誰滅愚夫者依於生滅不覺苦盡不識涅槃大慧菩薩這一段問話就是代表了一般愚夫覺得無常無我不能成立輪回也不能成立解脫在愚夫的心想中一切是生滅的生滅無常是苦的那就不能發現盡苦得樂的希望了這似乎非有常住不變的我才成所以佛法內佛法外都或有這一類衆生以為生滅法對於繫縛生死與解脫涅槃都是難可安立的這類衆生佛説是畏於無我句的就是聽了無我而怕繫縛解脫不能成立死後斷滅而畏怯的根性對於這佛又不能不適應他們以善巧方便來攝化了這就是如來藏法門如來藏説佛説的經典不少會使人生起一種意解在生死衆生或衆生心中有如來那樣的體性存在而具足智慧德相或説相好莊嚴的這與印度的神我説很接近所以西藏的覺囊巴派就依十部大乘經如來藏説教典成立神我體系的大乘佛教中國內地也有這一類以真我的體驗作為最高的法門好在佛知道衆生愚癡預先在楞伽經裡抉擇了如來藏説的真意義這是攝化計我外道而實際與大乘法空性是一脈相通的甚深如來藏是善不善因大慧菩薩所代表的衆生要求生死輪回的主體本有涅槃佛體佛適應這類根性所以説如來藏如説如來之藏是善不善因能遍興造一切趣生譬如伎兒變現諸趣自性無垢畢竟清淨如伎兒的變現諸趣可説是輪回主體自性無垢畢竟清淨就開示了佛身與涅槃的本有這如一切如來藏經廣説如來藏是甚深的如來徹底體證了了明見其他利根深智的大菩薩才能分證為什麼叫如來藏呢圓滿究竟的佛在衆生因地可説本來就成就了的如説如來藏自性清淨轉三十二相入於一切衆生身中如大價寶垢衣所纏如來之藏常住不變亦復如是而陰界入垢衣所纏貪欲恚癡不實妄想塵勞所污所以如來藏可解説為含攝如來一切功德而主要是為雜染法所覆藏因此如離了煩惱藏如來藏也就名為法身了以如來藏為輪回解脫的主體來説即此法身過於恆沙無邊煩惱所纏從無始世來隨順世間波浪漂流往來生死名為衆生這就是楞伽經的譬如伎兒變現諸趣衆生界即法身法身即衆生界衆生與佛平等無差別所以在衆生叫衆生界在菩薩叫菩薩界在如來叫如來界這一法門在外表上與印度的吠檀多哲學大梵法身小我衆生界是非常類似的依如來藏成立生死與涅槃衆生與佛所以説是善不善因就是為不善的生死雜染因也為善的清淨佛果因但因是多種多樣的如唯識學有十因有部立六因這到底是怎樣的因呢有些學者受到一本萬殊從常無而生妙有的玄學影響以為善與不善是如來藏所本具的以如來藏為體的從如來藏所生的關於這這裡不能多説總之印度的如來藏為因是自有意義的如勝鬘經説如來藏離有為相如來藏常住不變是故如來藏是依是持是建立世尊不離不斷不脫不異不思議佛法世尊斷脫異外有為法依持建立者是如來藏這樣的文句無上依經寶性論都是一樣的是依是持是建立這就是因是增上緣能作因例如四大能造造色決非以四大為體而發生造色是依生依立持養五因而説造是説不離四大而造色才可以生起楞伽經的能遍興造一切趣生也是這樣的造五因中的依立持三因也就是經説的是依是持是建立了所以善與不善依如來藏而有而不是以如來藏為體從如來藏生出來的為什麼如來藏可以為因依持建立就因為是常住不變的儘管輪回諸趣解脫涅槃如來藏是常住不變的為這一切所依止的有了常住不變的那些聽説無常無我而怕輪回與解脫無著落的也就可安心了如來藏為依止因可以舉例解説如太陽烏雲依止虛空而有與虛空不相離但太陽與烏雲並不是以虛空為體也決非從虛空生出來的如來藏為生死涅槃因也就是這樣如來藏怎樣的為不善因無始以來就有那些與如來藏不相應的相離的有為法陰界入貪瞋癡等無邊煩惱都依如來藏而有如灰塵的依明鏡而有一樣有了這些生死雜染就流轉不息了這些都是依如來藏而有的所以説依如來藏故有生死怎樣為善因呢無始以來就有那些與如來藏相應的不可説異不可分離的不思議佛法也依如來藏而有這就是佛性了但這與如來藏相應而不異的為什麼不説生而説依呢第一這是無為法不可以説生還有如有漏種子在阿賴耶識中是不可説有別異的但只能説從賴耶中的有漏種子生有漏現行不能説從阿賴耶識生如説一切從阿賴耶識生就有一因多果的過失了所以説不異不離也不能就説是一同樣的衆生本具的能為無漏清淨德性因的與如來藏不能説有別異的也只能説依如來藏為依為持為建立總之佛是説有常住不變的如來藏為善與不善所依而一切法都能成立無始習所熏名為阿賴耶由此有生死及涅槃證得佛説如來藏主要是以常住不變自性清淨的法體作為生死與涅槃的所依如來藏在陰界入中也就是在衆生身心中所以如來藏説不一定與唯識的阿賴耶識相結合但是衆生是一切由心的阿賴耶識是所知依的根本識所以自然地形成依如來藏而有阿賴耶識依阿賴耶識而有一切法的思想體系自性清淨的如來藏在阿賴耶識阿賴耶識是一切法的根本或中心深處所以到了勝鬘經如來藏也就被稱做自性清淨心與心性本淨説相合展開了真心論的思想系但這是真實心是核心心髓的心切勿誤作一般的心阿毗達磨大乘經説無始時來界一切法等依由此有諸趣及涅槃證得界是如來藏也是阿賴耶識這裡面的聯絡是如來藏是自性清淨的但無始以來就為虛妄雜染的戲論習氣所熏染這就名為阿賴耶識這如太空而為浮雲所蔽成為不明淨的空界一樣所以分析阿賴耶識的內容有真相如來藏與業相戲論熏習這二者的和合就是阿賴耶這在無著世親的唯識學裡是不容易信解的但這是依如來藏而有的阿賴耶識呀由此阿賴耶識的雜染種子不離如來藏真相的業相就有生死流轉的諸趣如來藏常住不變不離生死所以也可説如來藏流轉諸趣這正像虛空的隨方器而方隨圓器而圓一樣同時由於阿賴耶識真相如來藏有不離不異的清淨性這不是阿賴耶識所攝而是法界所攝的唯識宗的無漏種子也這樣説與經義相合但説是有為生滅就與經相違所以能厭生死欣涅槃能發心修行破煩惱而有涅槃的證得如徹底離一切妄染成就一切清淨功德那就是如來藏出纏名為法身也不再叫做阿賴耶識了虛妄唯識與真常唯心二系是適應不同的根性開示不同的教説但時間是前後相近同以實有法為依而立一切法同以心識為中心所以又時常起著相互的影響佛説法空性以為如來藏真如無差別勿濫外道見如來適應凡夫外道及一分執我小乘説如來藏常住不變流轉生死又説如來智慧德相相好莊嚴在衆生身中成就如來藏是什麼呢真的是無邊相好的如來具體而微的在衆生身中嗎真的是外道之我一樣成為衆生而體性就是常住清淨的梵嗎如來慈悲方便特在楞伽經中抉擇分明佛是説那一切法空性稱之為如來藏的如説我説如來藏不同外道所説之我大慧有時説空無相無願如實際法性法身涅槃離無自性不生不滅本來寂靜自性涅槃如是等句説如來藏已如來應供等正覺為斷愚夫畏無我句故説離妄想無所有境界如來藏門譬如陶家於一泥聚以人工水木輪繩方便作種種器如來亦復如是於法無我離一切妄想相以種種智慧善巧方便或説如來藏或説無我所以如來藏就是甚深法空性是直指衆生身心的當體本性空寂性所以要花樣新翻叫做如來藏似乎神我一樣無非適應畏無我句的外道們免得聽了人法空無我不肯信受還要誹毀不能不這樣説來誘化他這是如來的苦口婆心如來的善巧在此聽起來宛然是神我樣子可是信受以後漸次深入才知以前是錯用心了原來就是以前聽了就怕的空無我性法空性真如是無差別的如寶性論説佛法身遍滿真如無差別皆實有佛性是故説衆生常有如來藏從無差別來説在衆生就叫衆生界在佛就叫如來界了無差別法性是常恆清涼不變的佛以此為性以此為身所以叫佛性法身約真如法性的無差別説佛是這樣衆生也還是這樣所以説一切衆生成就如來藏了楞伽經説為斷愚夫畏無我句故開引計我諸外道故説如來藏寶性論説使衆生遠離五種過所以説佛性第五種是計身有神我這點是如來藏教學的信行者應深刻注意勿自以為究竟了義而其實是濫於外道見才好方便轉轉勝法空性無二智者善貫攝一道一清淨解説般若波羅蜜多順便略觀法海的波瀾現在作一結束從大乘三系看來不得不讚歎如來的善巧方便一轉一轉的越來越殊勝如來藏説可説是不可思議的方便了但考求內容真實始終是現證法空性無二無別如性空唯名系以現觀法性空為主要目的是不消説了虛妄唯識系雖廣説法相而説到修證先以識有遣境無然後以境無而識也不起這才到達心境的都無所得因為説依他有自相所以離執所顯空性也非實在不可但到底可破無邊煩惱可息種種妄執如能進步到五事具足還不又歸入極無自性的現觀嗎所以清辨闢實有空性為似我真如大可不必真常唯心系雖立近似神我的如來藏説但在修學過程中佛早開示了無我如來之藏修持次第也還是先觀外境非實有性名觀察義禪進達二無我而不生妄想識名攀緣如禪等到般若現前就是於法無我離一切妄想的如來禪這與虛妄唯識者的現觀次第一樣所以三系是適應衆生的方便不同而歸宗於法空性的現證毫無差別説到方便第一性空唯名系能於畢竟空中立一切法不能成立的要以依實立假為方便説依他自相有這是最能適應小乘根性依此而引導回小向大的但一般凡夫外道不信無常無我空不能於無常無我立一切法佛就不能不別出方便説一切衆生身中有如來藏了這對於怖畏空無我攝引執我的凡夫外道是非常有效的攝化衆生的根機從五事具足到五事不具的小乘等再到一般凡夫外道攝機越來越廣所以説方便以如來藏説為最勝也就是最能通俗流行的理由近見外道的景風説如來藏佛性與上帝及靈性相近應特為貫通這當然是外道想以此誘化佛弟子值得大家警覺但還是由於形式上類似的緣故第二於一切法空性立一切法真是擔草束過大火而不燒的大作略原非一般所能但事實上離此並無第二可為一切法依的所以為了攝化計我外道就密説法空性為如來藏這是好像有我為依而其實還是無我的法空性對於五事不具近於小乘的根性經上又説佛説如來藏以為阿賴耶惡慧不能知藏即賴耶識原來阿賴耶還是如來藏依如來藏而有無始虛妄熏習名阿賴耶識為雜染清淨法所依不知其實是依法空性如來藏可惜有些學者不能自覺罷了如約有漏的阿賴耶識這只能説是生死雜染法的中心阿賴耶識也還是依轉識要依轉識的熏習與轉識有互為因果的關係所以阿賴耶識只是相對的依止如賣藥一樣楞伽經有醫師處方陶家作器比喻賣的是救命金丹性空唯名系是老店不講究裝璜老實賣藥只有真識貨的人才來買藥救命可是有人嫌它不美觀氣味重不願意買這才新設門面講求推銷術裝上精美的瓶子盒子包上糖衣膠囊這樣藥的銷路大了救的命應該也多了這如第三時教虛妄唯識系一樣可是幼稚的孩子們還是不要這才另想方法滲和大量的糖做成飛機洋娃娃玩具形式滿街兜售這樣買的更多照理救的命也更多了這如真常唯心系一樣其實吃到肚裡一樣的救命但能救命的並非瓶子盒子糖衣膠囊更不是糖和洋娃娃而還是那救命金丹這叫做方便以方便而至究竟方便是手段不是目的所以方便為究竟的謬譯真是害盡衆生假使盒子瓶子精美竟然買盒子瓶子而不要藥不吃藥那可錯了假使買了飛機洋娃娃越看越好真的當作玩具玩那真該死了而且糖和得太多有時會藥力不足有時會藥性變質吃了也救不到命所以老實賣藥也有他的好處三系原是同歸一致的智者應善巧地貫攝使成為一道一清淨一味一解脫的法門免得多生爭執最要緊的是不能執著方便忘記真實讀者到底什麼是如來出世説法的大意成熟衆生道佛説以四攝布施及愛語利行與同事在菩提道中自成熟佛道的六波羅蜜多已經説過説到成熟衆生的利他道佛説要以四攝來攝化衆生四攝是四種攝受衆生的方法在家或出家的無論是家庭社會國家或在僧團中在信徒中要集成群的關係起著領導作用得到大衆的信任肯接受教化見於實行就決不能離開這