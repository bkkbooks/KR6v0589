者多集諸佛功德樂多集諸佛功德者至一乘清淨無量壽世界這是信增上菩薩如聲聞的信行人一樣在初學時有此三類的不同因為習以成性所以直到地上雖一定是三德齊修但也還流露不同風格的如觀音悲文殊智普賢願等如約根性來分別貪行人是悲增上的瞋行人是智增上的癡行人是信願增上的或依聲聞入或天或人入約所依的身行而趣入佛道來説就有或依聲聞行入佛道的或依天行入佛道的或依人行入佛道的三類這本是大乘經所説的但經太虛大師的判攝正法時期多依聲聞乘行而入大乘像法時期多依天乘行而入大乘末法時期多依人乘行而入大乘意義更充分的顯示出來其中依聲聞乘而入佛道的依經論所説都是先修聲聞緣覺乘法或沒有證果或已經證果然後回心而向佛道的專修聲聞行的有些自以為究竟但利根深智的行者早是內祕菩薩行外現是聲聞不等佛的開權顯實心已安住大乘道了依天乘行而入佛道的又有二類一淨土行者專心一意的求生天淨土然後在淨土中漸修佛道但依觀經所説上品利根早是發菩提心讀誦大乘解法空性所以一登淨土不久就能徹悟無生回入娑婆來廣行菩薩道二祕密行者著重修欲天色身就是以金剛夜叉為本尊修成持明仙人然後久住世間修行佛道雖然劣慧所不堪為應彼等故兼存有相説而有些就專在修精練氣的色身上作活計而利根是菩提心相應大慈悲為根本以方便而至究竟的依天乘行而向佛道的二類都重於瑜伽或三昧定本為天乘行的特質但以此普攝初機也只能口頭誦持持咒稱名而已依人乘行而入佛道的就是發菩提心修十善行不廢人間正行廣修人間安國利人的正業但以此普及初機大乘的外凡夫位實等於人間的君子善人如來的出現人間教化人類本意是令人開示悟入佛之知見所以依人菩薩行而向佛道不但是適應時代的機感也實在是佛乘的根本坦道趣入大乘者直入或回入相應諸教法實説方便説趣入大乘的修學者一向分為直入菩薩回入菩薩二類直入是直向菩薩道的回入是先修別道然後轉入大乘道的二乘的回心向大如法華經的開權顯實便是回入大乘的確證與直入或回入相應的教法就是實説及方便説了佛為什麼不直示大乘道不普為一切衆生説佛乘而要説方便教呢佛説方便教是有非常意義的因為不説方便的誘化他是不能進入佛道的如小乘的經歷修證會發覺還有不知不能不淨的就能受佛的教化回向佛道而且小乘證果到底生死已了不必再為生死流轉而憂慮了所以方便説是值得尊重的在大乘教中也是有方便説的這叫做異方便即勝方便有些人雖不是厭患生死的二乘根性而趣入大乘也還有點障礙因此佛説殊勝的方便以淨樂國土淨樂色身的法門來化導這就是先以欲鉤牽後令入佛智以樂得樂的法門如真能往生淨樂國土也就不必再憂慮退墮在佛菩薩的教導下可以發菩提心而入佛道了如真能修得淨樂色身也可依此天色身深修勝慧了所以佛出人間而教化人類雖本意在即人乘而向佛道即人成佛但為了適應衆生不能不善施方便或為厭苦根性説依聲聞行而回入大乘的教説這大都是智慧增上的重於自力的或為欲樂的根機説依天行而入大乘的教説這大都是信願增上的重於他力的如來雙開權實二門這才能使一切衆生同歸佛道回入直入依聲聞乘行而入佛道依天乘行而入佛道依人乘行而入佛道智慧增上信願增上慈悲增上同歸佛道衆生有佛性理性亦行性初以習成性次依性成習以是待修習一切佛皆成一切衆生有佛性為大乘佛教的重要教説是一切衆生同成佛道的原理所在什麼是佛性呢可以有二個意義一佛性是佛的體性如黃石中有金性白石中有銀性一樣衆生雖在生死迷妄當中但不是沒有佛的成分如礦中有金性所以可鍊成黃金如沒有金性那怎麼也鍊不出金來當然這是一般的説法在科學進步的時代可以非金屬的物質而化合成同樣的金質佛性説也如此衆生本有佛的體性或説衆生本有如來勝德相好莊嚴或者説衆生本來是佛所以修行就可以成佛這一本有佛性的教説確是一般人所容易信解的也就成為佛法中最通俗的學派二佛性是成佛的可能性也就是成佛的因緣但這是佛性的深義有些人是不易信解的那到底什麼是成佛的可能性呢這如法華經説諸佛兩足尊知法常無性佛種從緣起是故説一乘這可以方便分別為二種佛性一理佛性二行佛性二佛性是印度舊説今依中觀義説什麼叫理佛性一切法是從本以來無自性的也就是本性空寂的法法常無性古人別説常與無性是附合三諦的解説法法畢竟空這無性即空空即不生滅的法性可稱為佛性的因為如一切法是有自性的不是性空的那麼凡夫是實有的將永遠是凡夫雜染是實有的將永遠是雜染已經現起的不能轉無沒有現起的不能轉有那就是無可斷無可修也就不可能成佛了如中論説好在一切法是空無性的才能轉染成淨轉迷成悟轉凡成聖此法空性就是可凡可聖可染可淨的原理也就是可能成佛的原理所以説以有空義故一切法得成這是稱空性為佛性的深義同時法空性雖是一切法成立的普遍理性但空性就是勝義是悟而成聖依而起淨的法性實為成佛的要因這雖是遍一切法而與迷妄不相應與無漏淨德是相應的所以為了引發一般的信解方便説此法空性為如來藏佛性而説為本有如來智慧德相等法空性是遍一切一味的於一切衆生無差別所以説一切衆生都可以成佛什麼叫行佛性這是依修習發心而成為成佛的因性如唯識者説依法界等流的聞熏習成為成佛的種子法華經的佛種從緣起也就是約行性説的一切法空性為可能成佛的理性依佛菩薩的教化發心成聞熏習為可能成佛的行性事理是一致的如不是緣起的就不是空的不是空無自性的也就不會是從緣起的因為無性空所以從緣而起從緣而起所以是無性空的無性而緣起緣起而無性佛在坐道場時就是這樣的通達觀無明等如虛空無盡是諸菩薩不共妙觀依此而成佛佛也就依此而説一乘説一切衆生有佛性約理佛性説一切衆生都是有佛性的約行佛性説待緣而成所以是或有或無的大乘法種是菩提心發菩提心與菩提心相應的一切功德就是行性佛性法華經的佛種從緣起就是約菩提心種説的如在從前大通智勝佛法會中發菩提心的有些人是退修小乘了如親友的為他繫上無價寶珠他竟不覺不知弄得貧困不堪其實一切智願菩提願猶在不失在醉酒時親友為他繫上無價寶珠如在無明生死中遇佛菩薩的化導而發菩提心有人解説繫珠為本有佛性與經義相違發菩提心就成大乘法器能展轉出生無邊功德所以十地經大集經等都喻菩提心為寶珠經修治而圓成佛的果德這樣的行性佛性依經所説略有二位一性種性位二習種性位這是説起初以見佛聞法為因緣發大菩提心熏習成大乘佛性如下種一樣名性種性菩提心一發起永為成佛的因緣是不會失去的如法華經繫珠喻所説但這不能説是本有的因為是依發心而熏習成的法界等流的聞熏習其次有了菩提心種就依這佛性而漸漸修發使佛種的清淨功能由下成中由中成上大乘的功德淨能不斷熏習而增勝起來名為習種性等到久久熏修引發無漏清淨功德那就不但是佛的因性而且已分得佛的體性了以是法空性理佛性雖凡聖一如衆生界菩薩界佛界平等平等而成佛或不成佛還待修習來分別是否熏發了菩提心是否依菩提心種而不斷熏習增長如不修習凡夫還是凡夫如能依大乘而熏修那不問是誰一切衆生的佛果都是可以成就的發心名菩薩衆生之上首世出世功德悉由菩薩有約一切法空性説一切衆生有佛性但並不因此説一切衆生是菩薩要發菩提心才名為菩薩菩薩是梵語菩提薩埵的簡譯意義為覺有情從上求菩提覺下化衆生有情得名也可解説為求大菩提的有情發了菩提心就是菩薩菩薩是修學大乘道的通稱從初學久學到最後身菩薩真是淺深萬類但一般人總是想到觀音等大菩薩這才不敢自稱菩薩了初發心菩薩雖還沒有大功德可是已經是一切衆生之上首不但為凡夫而且為二乘賢聖所尊敬了經中比喻為如王子初生就為耆年的大臣所尊敬獅子兒初生就為百獸所畏敬迦陵頻伽鳥在㲉中音聲已勝過了一切鳥類新月的微明就為人類所愛敬菩薩發心以來就是這樣可尊可敬的大菩薩們是更不必説了為什麼這樣呢因為世出世間的一切功德悉由菩薩而有的這是説世間善法聲聞緣覺等善法都依佛菩薩而有佛功德也是依菩薩而有的所以菩薩為一切善法的根源以世間善法來説如説菩薩受身種種或時受業因緣身或受變化身於世間教化説諸善法及世界法王法世俗法等有些修菩薩行而暫時失敗了的名敗壞菩薩亦有悲心治以國法無所貪利雖有所惱所安者多治一惡人以成一家等菩薩為一切善法的根源可尊可敬而菩薩是從發菩提心而來的所以大乘經中無邊讚歎菩提心的功德説它是一切佛法種子初發菩提心重在立定上求佛道下化衆生的大誓願名為願菩提心廣説如四弘誓願衆生無邊誓願度煩惱無邊誓願斷法門無邊誓願學無上佛道誓願成但是發菩提心並非偶然想起成佛利生而是要一番修習達到堅固成就的菩提心的修習為修學大乘道趣入大乘道的第一要著菩提心從慈悲心起或是緣慈母的孝敬救度擴大到願度一切衆生而上求佛道或是設想他人與自己一樣利濟衆生應如愛護自己一樣進修到願意為利他而犧牲自己修菩提心的動機方法近於儒家的仁道恕道但菩提心修習圓滿成就深廣是與世間法大大不同的這是大乘道的基石修學大乘道的應先多多的修學菩薩之所乘菩提心相應慈悲為上首空慧是方便依此三要門善修一切行一切行皆入成佛之一乘趣入大乘道的不同根性佛性發菩提心的尊勝都已説到了大乘道發願以後就應該見於實行説到菩薩的正行就要先論到菩薩行所不可少的要素聲聞乘與緣覺乘是通於因果的但大乘中重於因行的名菩薩乘重於果德的名佛乘因圓果滿為大乘法的全體現在從成佛之道因行來説大乘是菩薩所乘的法門依此法門從凡夫地而趣入大菩提也叫一切智海菩薩行中不論修持什麼有必不可少的三要則例如布施一要與菩提心相應就是為了上求下化的志願而布施二施時要以慈悲心為上首為先導就是從慈悲心而引發布施三法空慧是方便方便是善巧的別名如不著施者受者所施的物件名為有方便如沒有法空慧著相布施名為不善巧無方便不能出離生死而趣向一切智海可以説菩提心是志願所在慈悲心是動機法空慧是做事的技巧如依此三要門為本善巧的修習一切行世間善法的五戒十善三福業也好出世善法的四諦緣起三學八正道三十七道品也好大乘法的六度四攝百八三昧四十二字門等也好這一切行皆就歸入於成佛之道的一乘法了簡單地説有了這三心一切善行都是大乘法如離了這三心或缺少了什麼也不是成佛的法門了大般若經説到菩薩的修行時總是説一切智智相應作意大悲為首用無所得而為方便這就是本文所説的三心依此龍樹的寶鬘論説本謂菩提心堅固如山王大悲遍十方不依二邊慧大日經也大體相同説大菩提為因悲為根本以方便而至究竟漢譯誤作方便為究竟一切智智相應作意就是法華經的一切智願也就是菩提心的別名大悲是遍十方一切衆生而起所以説遍十方際無所得是般若就是不依有無二邊的空性慧大日經兼存有相説所以説以種種的方便而到達究竟但成佛的主要方便不能不説是都無所得的空慧因為如取著相什麼都不能到於究竟了在大乘法中這三者是同等的重要不可或少的但大乘經是各有所宗重的或特重菩提心或特重大悲心或特重般若的都無所得每把它説作首要的這是依所宗要而巧説其實這三者初學是可以偏重而不可偏廢的這三心是大乘的通行正與儒者的三達德智仁勇一樣這本是人類的特勝憶念勝梵行勝堅忍勝也就是理智的情感的意志的特勝重於人乘正行的儒者也就揭示了人乘通德的智仁勇大乘法本是著重依人乘而直入佛道的所以也就揭示了究竟無上的志願菩提心普遍平等的同情慈悲徹法源底的智慧空慧為大乘行必備的通德因此大乘法行就是使人類特勝的德性淨化俗稱升華使它融和進展而到達完成成佛時菩提心成法身德慈悲心成解脫德法空慧成般若德如來的三德祕藏不是別的只是人生德行的最高完成大乘的真義與帶有隱遁傾向的小乘行帶有神祕氣息的天乘行是不大相同的大乘的真義實是人生的趣向於究竟即人成佛的法門菩薩之學處十善行為本攝為三聚戒七衆所通行大乘道只是菩提心的修治歷程上面所説的發菩提心是願菩提心以大乘的信願為體也就是大乘的歸依所以發菩提心時先受大乘歸依這不是盡形壽的歸依而是從今日乃至菩提的歸依歸依於佛法不退菩薩僧歸依表示了信心的所在再發菩提願願將所有的一切善根如諸佛菩薩那樣的為無上大菩提而發心未度者令度未解者令解未安者令安未涅槃者令得涅槃這也就是一般歸依文中從今日始乃至命終護生的究極意義論理説歸依表示了信願就依歸依得戒再受五戒等不過開示戒相而已然在如來的善巧漸化中也有但受歸依而不受戒的弟子同樣的受大乘歸依而發菩提心就依菩提心而得菩薩戒名為菩薩其後再受菩薩戒也不過開示戒相而已但如來善巧化導在大乘法中也有但受願菩提心而沒有受菩薩戒的然經論中説菩提以正行而為堅實若無正行不得菩提不但以信願而能成佛所以立菩提願以後應進一步的受持菩提正行行菩提心也就是受持大乘菩薩的學處比丘戒名比丘學處菩薩戒名菩薩學處説到菩薩戒是以十善行為根本的不但菩薩初學從十善學起名為十善菩薩如説十善菩薩發大心長別三界苦輪海就是大地菩薩也就是十善正行的深廣實踐除身語的正行清淨外如不邪見而得甚深的正慧不瞋恚而具廣大的慈悲不貪欲而成無量三摩地現從菩薩戒來説就是十善正行不過從善行的不同意義總攝為三聚淨戒一從離惡防非來説名律儀戒二從廣集一切善行來説名攝善法戒三從利益救濟一切衆生來説名饒益有情戒總之菩薩的戒行是無惡不除無善不行無一衆生而不加利濟的在聲聞法中律儀戒有男女僧俗等差別分為優婆塞戒優婆夷戒沙彌戒沙彌尼戒比丘戒比丘尼戒式叉摩那尼戒因戒的不同分佛弟子為七衆但菩薩戒是不分男女及僧俗小差別的所以是七衆弟子所共通奉行的要受菩薩戒應先受七衆的律儀戒如優婆塞受五戒的男衆而受菩薩戒就名菩薩優婆塞沙彌尼而受菩薩戒就名菩薩沙彌尼比丘而受菩薩戒就名菩薩比丘説到戒法聲聞藏中有廣律菩薩藏雖傳説有菩薩的戒藏但從傳譯到中國西藏在內來説菩薩戒都是附見於經中的現有傳説為羅什譯的梵網經戒本列十重四十八輕戒曇無讖譯的優婆塞戒經列六重二十八輕戒玄奘譯的瑜伽菩薩戒本列舉四重四十三輕戒輕戒多少有出入菩薩的重戒大致相同如虛空藏經菩薩瓔珞本業經勝鬘經等也都有説到我國一向採用梵網經戒本但廣説開遮持犯犯輕犯重戒相的瑜伽菩薩戒要明確得多退失菩提心嫉慳與瞋慢障於利他行違失大乘戒在菩薩的律儀中現在略説最重要的禁戒一衆多的大乘經中以菩提心為菩薩戒如對於利益衆生起了厭倦棄捨的意念不想求證無上菩提而想證得自利的阿羅漢果或者但求世間的欲樂不再想上求下化這樣的一念退失菩提心就是違犯了菩薩的淨戒菩提心可説是菩薩的根本戒總相戒是大乘學人所應該特別護持的二依詳廣開示的菩薩戒來説殺盜淫妄等共聲聞重戒不消説是犯菩薩戒的不共聲聞的菩薩重戒諸經及各種戒本中雖舉事小有出入而內容都説到了嫉慳瞋慢的四項重戒現在且依瑜伽戒説一嫉為了貪求個人的利養恭敬因此嫉妒別人故意的自讚毀他二慳有來求布施的由於慳吝心雖然有法有財而不肯修法施財施三瞋瞋心極重不但罵詈傷害別人別人來懺悔請求諒解也不受懺謝永遠的怨恨他四慢不虛心自以為了不起這才宣揚一些似是而非的佛法反而毀謗別人弘揚的正法這四項重戒都是障於利他的菩薩行只要犯了其中的一戒就是違失了大乘菩薩的淨戒不成其為菩薩了這如比丘的犯了四波羅夷戒就不成為比丘一樣但比丘犯了四波羅夷戒就要退出僧伽不準重受菩薩戒是可以如法重受的換言之發了菩提心受了菩薩戒怎麼也不會退失的犯戒的是暫時失卻作用所以應如法再受給以新的熏發恢復菩提心戒的功德也就因此發了菩提心受過菩薩戒即使是退證小果或者退墮到三惡道中終究要依此菩提心戒的清淨善根回入大乘道而成佛的這樣看來在大乘法中沒有比菩提心菩薩戒更重要了總攝菩提道六度與四攝漸入於諸地圓滿佛功德佛的功德究竟圓滿從菩薩的修行而成所以菩薩所修學的也是無量法門誓願學而不是部分的少量的法門但總舉大綱而統攝起來證得無上菩提的道品不外乎六度與四攝六度是六波羅蜜多的意譯波羅蜜多譯義為到彼岸也就是度施戒忍精進禪那般若為從世間而達佛道彼岸的法門所以叫六度四攝是布施愛語利行同事攝是攝受這四法能攝化衆生所以叫四攝菩薩修學的道品不外乎為了自成佛道利益衆生六度是成熟佛道的要目四攝是利濟衆生的方便所以大乘的菩提道也就是六度與四攝了但這不過是約特點而作分別的説明其實六度也可分自利利他二道如施戒忍是利他的福德道禪慧是自利的智慧道精進通於二道進一步説六度都有自利與利他的二種意義這裡要特別説到的佛果決不是一行一法門而可以圓成的佛在經中有時約重點説修行什麼法就能速得無上菩提有時約融攝説修布施或般若時即具足六波羅蜜多如因此妄執只要修某法某行就可以成佛不需要修其他功德那就是顛倒誤解了修學的法門不是部分的少量的修學成佛的道品也不是一天一生所能完成的由淺而深的修學歷程經中分為種種行位其中主要的是歡喜地等十地菩薩在修行的過程中不斷進修引發無邊功德如地一樣能長萬物所以叫地十地圓滿了就成佛初地是歡喜地在進修入初地時應修三十心所以在初地前豎列十住十行十回向三十位十住的初住名發心住發心住是修習信等十心已經圓滿成就了信心等修習而未成就時就列為十信位菩薩的修行位次是這樣的展布開來總之由淺入深是可以分為多少階段的這一進修的歷程就是漸入於歡喜等諸地就能圓滿佛果的一切功德達成了菩薩發心修學的究竟目的這一頌總列了修學的法門經歷的地位圓滿的佛果以下就這樣的依次説明身及諸受用三世一切善為利諸衆生無惜而行施先説六度中的施度在五乘共法中布施為三福業的一項在三乘共法的道品中是沒有布施的因為對於厭離世間急求自證的聲聞布施是沒有重要意義的但在這大乘菩提道中布施又恢復為修道的項目而且居於第一位捨己利他是布施的真正意義這與利他為先的菩薩心行相合可知布施在大乘道中的重要性了大乘的布施是一般布施的深化廣化如上面説到一定要與菩提心相應大悲為上首無所得為方便而修習布施度如此其他一切菩薩行都要與此三心相應而修習以下不再重説布施的意義是捨己為他所以不但是破除慳貪而且是銷除我我所執達成無我我所無我執法執的大捨一般人不容易布施問題在執取為自己的不知道攝取為己有的過失也就不知道施與衆生的利益例如財物世間為了積集與占有造成人間的無邊苦難國際間的無窮糾紛然而到底是無常過去了拿人類來説吧財物雖經自己的功力而成為自己所攝取的但實與一切人有關如沒有社會的關係怎麼也不會得到現有的財富及物質的豐富生活如真的獨居深山即使無盡的山地是屬於你的也許對你沒有什麼用處還是貧乏不堪不但是外物就是身體賴父母的養育師長的訓導朋友的扶助公共的醫藥衛生國家的法律秩序才能好好的生存如專知自己把身體看成唯一的自己那不但徒增苦惱也多增罪惡就是豐富的學識科學的發明道德與宗教的進修也都是受到人類的恩德所以如執為自己的為罪惡與苦痛的根源而施與他人則可為功德與安樂的因緣了能這樣的理解學習施心就會增長廣大起來因此本頌説一自己的身身心全體或以自己的身體去為人服務或將自己身體的部分甚至生命為國家為人類的利益而犧牲二諸受用就是可為自己受用的一切資財能在悲田敬田中如法的施與三善法自己在過去世現在世及未來世三世所有的一切善法或是世間善法或是出世間善法或是出世間上上的大乘善法這一切不占為己有而願意施與衆生這是法施與功德的回向衆生這三類一般都是看作自己的以為屬於自己才有意義但菩薩能為了利益諸衆生毫無顧惜的修行布施捨給衆生拿修行的功德來説菩薩是願意修集一切功德回施一切衆生使衆生因而成佛等一切衆生成佛再修集功德而利益自己自己成佛能這樣為他忘己而布施才是菩薩的布施下士為己施中士解脫施利他一切施是則名大士同樣的施捨由於施者的動機觀念不同功德也就不一樣發增上生心而求人天功德的名下士下士的布施看來是道德的其實出於功利心為自己的人天福樂而布施布施的功德是有的但極其有限發出離心的名中士中士是厭離生死苦為求解脫而施的著重於解脫不受財物等所纍而不重視利人的積極意義所以聲聞法中有人寧可將財寶投入大海卻不想用來利濟貧窮發菩提心的名大士就是菩薩菩薩的布施是一為利他而施這不是説否定自己的布施功德而是不從自己的功德著想專為與樂拔苦的利他而布施二一切施菩薩是內而身心外而財物一切功德善法什麼都是施捨了的一切施是菩薩的淨施在發菩提心時即將自己所有的一切無條件的捨與衆生雖然還在保有使用一切但菩薩不再作自己私有想覺得這是一切衆生的自己如雇員或公僕一樣代為管理經營如物主需要時有人來乞求時就無條件的奉上自己的享受正像雇員的取得合法的生活費一樣能這樣的布施才名為大士大士的利他一切施才是最可稱歎的財法無畏施難施殷勤施聞施心歡喜勝於寂滅樂從所施的種類