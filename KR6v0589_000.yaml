front:
  text: 自序佛法是理智的宗教不僅是信仰的所以義理的開導或是修持的指示都是通過理性而有豐富的正確的內容由於通過理性的隨機適應自由抉擇所以弘傳中的佛法可說是多彩多姿的但這在一般人的心目中容易引起二項觀念不能完整的把握佛法那二項是一佛的教說菩薩與祖師們的弘傳都是適應不同的時間地區不同的根性好樂而給以適宜的教導所以方便多門或淺或深或事或理有些是不相同的有些還似乎是矛盾的適應不同根性的不同教法真是萬花筒一樣初學者不能統攝條貫每有不知如何是好的感覺二由於眾多的教說有內在的關聯性常從一端而說到其他如衣服一樣提起衣領當然這是最適當的拉住袖口或扯到衣襟都可以得到衣服的全體但在一般人對一一法門的應機特性一一法門的淺深次第一一法門的相互關聯每被忽略而籠統的覺得都是差不多的這種雜多而又差不多的觀感會引起相反的同一傾向有以為彼此相同所以一法就等於一切這樣不需要廣修遍學一經一佛一咒的佛法大大的發展起來其實是不能完滿的把握佛法取一滴水而棄大海卻自以為大海都在這裡有的不能完滿的總持佛法對自己多少理會的法門讚揚到極點覺得這是最殊勝的最究竟的有了這就有了一切或以為有了這就不需要別的總之佛法的多彩多姿適化無方凡不能統攝總貫不能始終條理都會犯上偏取部分而棄全體的過失這種家風使佛教走上空疏貧乏的末運佛法的統貫條理對於一般信眾的持行來說原是不能苛求的但弘傳佛法的大德們是不能不有的必要勝解這才能應機說法而始終保持佛法的完整性不致於落入雜亂與偏向的窠臼對於這天臺與賢首宗是有功績的因為臺賢大師們統攝了全部佛法而組成淺深的進修歷程顯出彼此間的差別又顯出彼此間的關聯這難怪過去學教的法師不是天臺四教就是賢首五教了但臺賢的重心在圓教直入圓教才是臺賢大師們的真正意趣所以仍不免偏取這如太虛大師說賢台雖可以小始終頓藏通別圓位攝所餘佛言然既為劣機而設非勝根所必須縱曰圓人無不可用為圓法亦唯俟不獲已時始一援用之而學者又誰肯劣根自居於是亦皆被棄虛大師深感於中國佛教末流的空疏貧乏所以以五乘共法三乘共法大乘不共法統攝一切佛法開顯由人而成佛的正道這與西藏宗喀巴大師宗承印度的中觀與瑜伽以共下士道共中士道上士道而綜貫成佛的菩提道次第恰好相合所以對福德資糧則人天俱攝智慧資糧則聲緣相協律及經論皆所依止僅取一分不成菩提的全體佛教虛大師給以非常的讚仰這樣的圓滿佛教應該是值得積極弘揚的佛教如來說法總是先說端正法布施持戒離欲生天定然後對有出世可能的授以出世法門由於佛法的重心在出世出世是勝過世間一般的意思所以集經者對於佛的端正法總是略而不詳古典阿毘曇還以五戒為首而後起的阿毘曇也就不見了這種以二乘法為本的傾向宗喀巴大師也不能免所以他說的共下士法把念死作為入道的要門其實不念死未嘗不能熏修人天善業這樣的下士道雖順於厭離的二乘但不一定順於悲濟的大乘道對於這虛大師深入佛乘獨具隻眼揭示了如來出世的真實意趣教導人類由人生而直趣佛道所以著重熏修十善正行不廢世間資生事業依人乘正行而趣向佛乘而不以厭離如念死為初學的法門人乘正行而趣向佛道也就是攝得五乘共法三乘共法功德而趣入佛道但由於某些眾生的根性偏狹怯弱佛及古德們這才對於大乘旁立二乘究竟的方便道在大乘法中也旁開由天乘行而入佛乘由二乘行而入佛乘的方便道所以從虛大師抉擇開示的全體佛教來說一切無非成佛的法門這不但綜貫了五乘共法三乘共法大乘不共法的三階而且還綜貫了正常道與方便道的一切圓滿顯示了佛道次第的全貌導歸於究竟無上的佛地從前在香港時就想依據虛大師的開示參考宗喀巴的菩提道次綜合在法藏中的管窺一斑寫一部簡要的成佛之道綜貫一切佛法而歸於一乘這一直到民國四十三年在臺灣善導寺的共修會中才由淺而深編幾句偈頌一面編一面講但為了事緣特別是大乘部分非常的簡略四十六年秋把過去編的偈頌修正補寫為女眾佛學院講說四十七年冬再加修正刪補開始為自己所編的偈頌寫下簡單的解說去年底在善光寺度舊曆年這才全部脫稿算起來已經過六個年頭了這部二十萬字的成佛之道正在排印流通所以略說本書的意趣綜貫一切佛法而向於佛道以為序中華民國四十九年十月序成佛之道偈頌第一章歸敬三寶有海無邊際世間多憂苦流轉起還沒何處是依怙積聚皆銷散崇高必墮落合會要當離有生無不死國家治還亂器界成復毀世間諸可樂無事可依怙鬼神好凶殺欲天耽諸欲獨梵依慢住亦非歸依處歸依處處求求之遍十方究竟歸依處三寶最吉祥正法以為身淨慧以為命智月朗秋空禮佛兩足尊三世佛無量十方佛亦爾悲願來濁世禮佛釋迦文智圓悲無極斷障無餘習三德等究竟方便示差別丘井空聚落朽故寂無人彼岸林泉樂禮法離欲尊正法妙難思善淨常安樂依古仙人道能入於涅槃依法以攝僧和樂淨為本事和或理和禮僧眾中尊敬僧莫呵僧亦莫衡量僧隨佛修行者住持正法城三寶真實德無漏性清淨化世真亦俗佛法得長存自誓盡形壽歸依佛法僧至心修供養時念諸勝利此歸依最尊此歸依最勝不由餘歸依得樂得安隱所說歸依者信願以為體歸彼及向彼依彼得救濟若人自歸命自力自依止是人則能契歸依真實義第二章聞法趣入由聞知諸法由聞遮眾惡由聞斷無義由聞得涅槃如器受於水如地植於種應離三種失諦聽善思念病想醫藥想殷重療治想隨聞如說行佛說法如鏡趣入正法者應親近善士證教達實性悲愍巧為說觀德莫觀失隨順莫違逆佛說滿梵行學者應尊敬離彼三途苦不生長壽天佛世生中國根具離邪見生死流轉中人身最難得憶梵行勤勇三事勝諸天難得今已得精勤修法行莫使入寶山垂手歎空歸聞法而發心隨機成差別下求增上生現樂後亦樂中發出離心涅槃解脫樂最上菩提心悲智究竟樂依下能起上依上能攝下隨機五三異歸極唯一大不滯於中下亦不棄中下圓攝向佛乘不謗於正法第三章五乘共法正信歸依者應修於正見及修於正命勝進不為難所說正見者人生之正觀心淨或不淨利他或損他善行不善行佛子應諦察有報必由業微小轉廣大能引或能滿決定或不定現生或後報諸業不失壞隨業報善惡五趣常流轉隨重或隨習或復隨憶念由業往後有薪盡火相傳生死常相續聖者得解脫凡聖縛脫異深信勿疑惑流轉五趣中身心多苦迫大地獄極熱近邊遍遊歷八寒及孤獨是諸苦中極旁生種種異吞噉驅使苦餓鬼常饑渴不淨以為食悉由三不善惡行之所感人中苦樂雜升沈之樞紐人本誤鬼本習俗謬相沿天趣初欲界色及無色界身勝壽亦勝樂勝定亦勝諸苦由惡業樂由善業集苦樂隨業盡修善宜積極若時能行善而未作善業一旦苦果臨爾時復何為求人而得人修天不生天勤修三福行願生佛陀前依資具得樂依施得資具故佛為眾生先讚布施福施以捨以利由悲由敬別心田事不同功德分勝劣施應如法施勿隨至怖報求報及習先希天要名等克己以利他堅忍持淨戒以己度他情莫殺莫行杖勿盜勿邪淫勿作虛誑語飲酒敗眾德佛子應受持五戒盡形壽眾福之所歸加行日夜戒隨順出離者不殺盜邪淫不妄語兩舌不惡口綺語離貪瞋邪見諸善之根本佛說十善業人天善所依三乘聖法立欲樂不可著散亂多眾苦依慈住淨戒修定最為樂調攝於三事心一境名定漸離於分別苦樂次第盡四禪四空處慈等四無量佛說諸定法次第而修習布施多雜染禪定向獨善依人向佛道戒行為宗要心性怯畏者佛說應修念繫念佛法僧戒施天功德如入光明聚陰暗一時失正念彌勒尊求生彼淨土法門最希有近易普及故見佛時聞法何憂於退墮第四章三乘共法一切行無常說諸受皆苦緣此生厭離向於解脫道隨機立三乘正化於聲聞解脫道遠離苦樂之二邊順攝樂行者在家修法行順攝苦行者出家作沙門此或樂獨住或樂人間住或是隨信行或是隨法行雖復種種性同修出離行佛說解脫道四諦與緣起甚深諸佛法由是而顯示苦集與滅道是謂四聖諦苦者求不得怨會愛別離生老與病死總由五蘊聚所謂五蘊者色受想行識取識處處住染著不能離此復由六處取境而生識或六界和合世間苦唯爾苦生由業集業集復由惑發業與潤生緣會感苦果業有身語意善惡及不動業滅如種習百千劫不失隨業感生死不出於三界煩惱貪瞋癡不善之根本癡如醉如迷瞋重貪過深佛攝諸煩惱見愛慢無明我我所攝故死生永相續苦集相鉤纏死生從緣起佛說十二支如城如果樹無明之所覆愛結之所繫有識身相續相續而不已緣識有名色從是有六處根境相涉觸從觸生於受緣受起於愛愛增則名取因是集後有生老死相隨滅應滅於惑惑滅則苦滅解脫於癡愛現證寂滅樂能滅苦集者唯有一乘道三學八正道能入於涅槃初增上尸羅心地淨增上護心令不犯別別得解脫在家五八戒如前之所說出家戒類五沙彌沙彌尼比丘比丘尼及式叉摩那於中具足戒戒法之最勝殷重所受得護持莫失壞極重戒有四淫行不與取殺人大妄語破失沙門性餘戒輕或重犯者勿覆藏出罪還清淨不悔得安樂能持於淨戒三業咸清淨密護於根門飲食知節量勤修寤瑜伽依正知而住知足心遠離順於解脫乘此能淨尸羅亦是定方便進修於定學離五欲五蓋不淨及持息是名二甘露依此而攝心攝心得正定能發真慧者佛說有七依增上慧學者即出世正見佛為阿難說緣起義甚深此有故彼有此生故彼生無常空無我惟世俗假有此無故彼無此滅故彼滅緣起空寂性義倍復甚深此是佛所說緣起中道義不著有無見正見得解脫又復正見者即是四諦慧如實知四諦應斷及應修惑苦滅應證由滅得涅槃先得法住智後得涅槃智依俗契真實正觀法如是正思向於厭向離欲及滅正語業及命淨戒以為性始則直其見次則淨其行足目兩相成能達於彼岸正勤遍策發由念得正定依定起證慧慧成得解脫佛說諸道品總集三十七道同隨機異或是淺深別此是聖所行此是聖所證三乘諸聖者一味涅槃城通論解脫道經於種熟脫修證有遲速非由利鈍別見此正法者初名須陀洹三結斷無餘無量生死息二名斯陀含進薄修斷惑三名阿那含離欲不復還斷惑究竟者名曰阿羅漢畢故不造新生死更無緣此或慧解脫或是俱解脫六通及三明世間上福田明淨恒不動如日處晴空一切世間行不染如蓮華或不由他覺從於遠離生名辟支迦佛合說為二乘第五章大乘不共法恥有所不知恥有所不能恥有所不淨迴入於大乘不忍聖教衰不忍眾生苦緣起大悲心趣入於大乘或以信願入或智或悲入或依聲聞入或天或人入趣入大乘者直入或迴入相應諸教法實說方便說眾生有佛性理性亦行性初以習成性次依性成習以是待修習一切佛皆成發心名菩薩眾生之上首世出世功德悉由菩薩有菩薩之所乘菩提心相應慈悲為上首空慧是方便依此三要門善修一切行一切行皆入成佛之一乘菩薩之學處十善行為本攝為三聚戒七眾所通行退失菩提心嫉慳與瞋慢障於利他行違失大乘戒總攝菩提道六度與四攝漸入於諸地圓滿佛功德身及諸受用三世一切善為利諸眾生無惜而行施下士為己施中士解脫施利他一切施是則名大士財法無畏施難施殷勤施聞施心歡喜勝於寂滅樂或有不應施自他及所為施以捨心勝常修於意樂三輪處處著是施名世間三輪空相應出世波羅蜜戒斷於損他普施無所畏失戒眾患本惡趣亦貧困持戒三善本增上決定勝為他淨尸羅則入於大乘受持淨戒者如護於浮囊不輕於毀犯持犯俱不著攝護於眾生菩薩修忍度耐怨安受苦及諦察法忍瞋他有何益自他增憂苦瞋火燒善根忍則五德具施戒及安忍多為在家說廣聚福資糧是佛色身因佛說精進度福智之資糧無厭心如海力盡而不止推延著世樂自輕心怯弱滿果亦難行久處於生死資糧廣無邊練心勿退屈怯弱下劣者希求易行道佛有勝方便攝護於初心於中殊勝者往生極樂土彌陀佛力持不退於菩提不捨現法樂而向於菩提藥師大悲願東方現淨土勝解堅固力歡喜休息力能修於四力精進不為難三乘諸勝德悉由定慧生修習止觀者應先修習止止成觀乃成次第法如是依住堪能性能成所作事由滅五過失勤修八斷行懈怠為定障信勤等對治正念曾習緣令心不餘散明記不忘念安住而明顯聖說是所緣能淨惑障者或順於正理能向於出離大乘多修習念佛與念息念佛由意念真佛非像佛觀相而持心善識於方便念息數隨止非風非喘氣覺了沈與掉正知不散亂為斷而作行切勿隨彼轉滅時正直行斷於功行失內住亦續住安住復近住調順及寂靜次最極寂靜專注於一趣等持無作行聖說止方便不越九住心若得輕安樂是名止成就明顯無分別及妙輕安樂是道內外共由觀成差別般若波羅蜜最尊最第一解脫之所依諸佛所從出現證由修得修復由思聞善友及多聞實為慧所依般若本無二隨機行有別般若諸經論於此最親切諸佛依二諦為眾生說法依俗得真諦依真得解脫世俗假施設名言識所識名假受法假正倒善分別自性如何有是觀順勝義苦因於惑業業惑由分別分別由戲論戲論依空滅諸法因緣生緣生無性空空故不生滅常住寂靜相法不自他生不共不無因觀是法空性一切本不生我不即是蘊亦復非離蘊不屬不相在是故知無我若無有我者何得有我所諸法性尚空何況於彼我惑業由分別分別由於心心復依於身是故先觀身無我無我所內外一切離盡息諸分別是為契真實真實無分別勿流於邪計修習中觀行無自性分別以無性正見觀察及安住止觀互相應善入於寂滅善哉真般若善哉真解脫依無等聖智圓滿諸功德法性本無二隨機說成異了義不了義智者善抉擇諸法從緣起緣起無性空空故從緣起一切法成立現空中道義如上之所說一切法無性善入者能入或五事不具佛復解深密或是無自性或是自相有緣起自相有即虛妄分別依識立緣起因果善成立心外法非有心識理非無達無境唯識能入於真實或以生滅法縛脫難可立畏於無我句佛又方便攝甚深如來藏是善不善因無始習所熏名為阿賴耶由此有生死及涅槃證得佛說法空性以為如來藏真如無差別勿濫外道見方便轉轉勝法空性無二智者善貫攝一道一清淨成熟眾生道佛說以四攝布施及愛語利行與同事初修菩提心習行十善業成就心不退入於大乘道以諸勝解行廣集二資糧經一無數劫證入於聖位初住極喜地生諸如來家斷除三種結施德最增勝戒德滿清淨名為離垢地發光地忍勝慧火除諸冥進滿修覺分燄慧見無餘難勝靜慮勝善達諸諦理第六現前地慧勝住滅定佛法皆現見緣起真實性常寂常悲念勝出於二乘遠行於滅定念念能起入方便度熾然二僧祇劫滿進入不動地無相無功用盡斷三界惑大願極清淨以如幻三昧三有普現身善慧無礙解圓淨一切力第十法雲地諸佛光灌頂智增澍法雨長善如大雲菩薩所修道三祇歷十地頓入與漸入隨機有差別三僧祇劫滿登於妙覺地佛身最寂滅平等無分別如彼摩尼珠妙用利群生法性所流身念念現一切佛事菩薩事二乘眾生事三世盡十方依正悉無礙於一現一切一切入於一十力四無畏十八不共法大悲三不護妙智佛功德佛住於淨土十八事圓滿與諸菩薩眾受用於法樂諸法真實義及證真實慧無變異差別是故無別乘佛得不動身悲願化三有示淨或示穢咸令入涅槃為除眾疲乏化作可愛城終示真實相故唯一佛乘一切諸善法同歸於佛道所有眾生類究竟得成佛
